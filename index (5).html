<!-- Firebase SDK for group/multiplayer mode -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, set, get, update, onValue, onDisconnect, remove, push, child, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAbRsjWhqeyYuvpQreJlMtTGHq0HYHnNMc",
    authDomain: "maashir-yeda.firebaseapp.com",
    databaseURL: "https://maashir-yeda-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "maashir-yeda",
    storageBucket: "maashir-yeda.firebasestorage.app",
    messagingSenderId: "260414981701",
    appId: "1:260414981701:web:561a1747d3a6412b38c52c",
    measurementId: "G-C768Z7PE63"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Expose Firebase helpers to global scope for the quiz code
  window.FB = {
    db,
    ref: (path) => ref(db, path),
    set: (path, value) => set(ref(db, path), value),
    get: (path) => get(ref(db, path)),
    update: (path, updates) => update(ref(db, path), updates),
    onValue: (path, callback) => onValue(ref(db, path), callback),
    onDisconnect: (path) => onDisconnect(ref(db, path)),
    remove: (path) => remove(ref(db, path)),
    push: (path) => push(ref(db, path)),
    child,
    serverTimestamp
  };
  window.FB_READY = true;
  document.dispatchEvent(new CustomEvent('firebase-ready'));
</script>

  body {
    background-image:
      radial-gradient(circle at 15% 15%, rgba(56,189,248,0.15) 0%, transparent 45%),
      radial-gradient(circle at 85% 75%, rgba(14,165,233,0.12) 0%, transparent 50%),
      radial-gradient(circle at 50% 100%, rgba(30,64,175,0.08) 0%, transparent 60%);
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 10px 16px 28px;
    position: relative;
  }

  /* Screen shake animation for wrong answers */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
    20%, 40%, 60%, 80% { transform: translateX(10px); }
  }

  body.shake {
    animation: shake 0.5s ease-in-out;
  }

  /* Success flash animation */
  @keyframes successFlash {
    0% { background: transparent; }
    50% { background: rgba(61, 124, 79, 0.2); }
    100% { background: transparent; }
  }

  body.success-flash::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(61, 124, 79, 0.15);
    animation: successFlash 0.6s ease-out;
    pointer-events: none;
    z-index: 1000;
  }

  /* Copyright notice at bottom */
  .copyright-bottom {
    text-align: center;
    padding: 6px 12px;
    margin: 6px -16px 0;
    background: linear-gradient(90deg, rgba(14,165,233,0.1) 0%, rgba(30,64,175,0.1) 50%, rgba(8,145,178,0.1) 100%);
    border-top: 2px solid var(--ocean-light);
    font-family: 'Assistant', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--ocean);
    letter-spacing: 0.02em;
  }

  @media (max-width: 540px) {
    .copyright-bottom {
      margin: 6px -16px 0;
      font-size: 10px;
      padding: 5px 12px;
    }
  }

  /* When in home view (flex), copyright stays pinned inside viewport */
  body.home-view .copyright-bottom {
    margin: 0;
  }

  /* Header */
  header {
    text-align: center;
    padding: 2px 0 4px;
    position: relative;
  }

  header::after {
    content: "";
    display: none;
  }

  .brand-small {
    font-family: 'Heebo', sans-serif;
    font-size: 9px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1px;
    font-weight: 500;
  }

  .brand-title {
    font-family: 'Assistant', sans-serif;
    font-size: clamp(18px, 4vw, 24px);
    font-weight: 900;
    line-height: 1.1;
    color: var(--ink);
  }

  .brand-title em {
    color: var(--burgundy);
    font-style: italic;
    font-weight: 500;
  }

  /* Tabs */
  .tabs {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-bottom: 6px;
    background: rgba(255,255,255,0.4);
    border-radius: 100px;
    padding: 2px;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.06);
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
  }

  .tab {
    flex: 1;
    background: transparent;
    border: none;
    padding: 6px 10px;
    border-radius: 100px;
    font-family: 'Heebo', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.25s;
  }

  .tab:hover { color: var(--ink); }

  .tab.active {
    background: var(--ink);
    color: var(--paper);
  }

  /* Category picker on home screen */
  .category-intro {
    text-align: center;
    margin-bottom: 28px;
  }

  .category-intro-title {
    font-family: 'Assistant', sans-serif;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .category-intro-sub {
    color: var(--muted);
    font-size: 14px;
  }

  .categories-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }

  .category-card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 22px 16px;
    cursor: pointer;
    transition: all 0.25s;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .category-card::before {
    content: "";
    position: absolute;
    top: 0;
    right: 0;
    width: 100%;
    height: 4px;
    background: var(--gold);
    opacity: 0.8;
  }

  .category-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow);
    border-color: var(--gold);
  }

  .category-card-emoji {
    font-size: 36px;
    margin-bottom: 10px;
    line-height: 1;
  }

  .category-card-name {
    font-family: 'Assistant', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 4px;
  }

  .category-card-count {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* Mixed category special style */
  .category-card.mixed {
    background: linear-gradient(135deg, var(--ink) 0%, var(--burgundy-dark) 100%);
    color: var(--paper);
  }

  .category-card.mixed .category-card-name { color: var(--paper); }
  .category-card.mixed .category-card-count { color: rgba(242,234,216,0.7); }
  .category-card.mixed::before { background: var(--gold-light); }

  /* Question area */
  .question-area {
    animation: fadeInUp 0.4s ease-out;
  }

  /* ==== IN-GAME QUICK CONTROLS ==== */
  .in-game-controls {
    margin: 14px auto 0;
    padding: 10px 12px;
    background: rgba(255,255,255,0.7);
    border: 1px solid var(--line);
    border-radius: 12px;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .in-game-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .in-game-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    flex-shrink: 0;
    min-width: 48px;
  }

  .in-game-btns {
    display: flex;
    gap: 4px;
    flex: 1;
  }

  .in-game-btn {
    flex: 1;
    padding: 6px 2px;
    border: 1.5px solid var(--line);
    background: white;
    color: var(--ink);
    border-radius: 8px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    min-height: 30px;
    white-space: nowrap;
  }

  .in-game-btn.active {
    background: linear-gradient(135deg, var(--burgundy), var(--ocean));
    color: white;
    border-color: transparent;
  }

  .in-game-btn.active.diff-easy { background: linear-gradient(135deg, #10b981, #059669); }
  .in-game-btn.active.diff-med { background: linear-gradient(135deg, #f59e0b, #d97706); }
  .in-game-btn.active.diff-hard { background: linear-gradient(135deg, #ef4444, #dc2626); }

  .in-game-mixed-btn {
    width: 100%;
    padding: 8px 12px;
    margin-top: 4px;
    background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 50%, var(--ocean) 100%);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 3px 10px rgba(99,102,241,0.3);
  }

  .in-game-mixed-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 5px 14px rgba(99,102,241,0.4);
  }

  .in-game-mixed-btn:active {
    transform: scale(0.98);
  }

  body.night-mode .in-game-controls {
    background: rgba(30,41,59,0.7);
    border-color: #334155;
  }

  body.night-mode .in-game-btn:not(.active) {
    background: #0f172a;
    color: #e2e8f0;
    border-color: #334155;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .question-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    font-size: 13px;
  }

  .question-category {
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .question-counter {
    font-family: 'Assistant', sans-serif;
    font-style: italic;
    color: var(--gold);
    font-size: 14px;
  }

  .question-card {
    background: linear-gradient(180deg, #fbf7ea 0%, #f4ecd6 100%);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 36px 28px;
    box-shadow: var(--shadow-lg);
    position: relative;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .question-card::before,
  .question-card::after {
    content: "";
    position: absolute;
    width: 40px;
    height: 40px;
    border: 2px solid var(--gold);
    opacity: 0.5;
  }

  .question-card::before {
    top: 12px;
    right: 12px;
    border-left: none;
    border-bottom: none;
  }

  .question-card::after {
    bottom: 12px;
    left: 12px;
    border-right: none;
    border-top: none;
  }

  .question-text {
    font-family: 'Assistant', sans-serif;
    font-size: clamp(20px, 3.5vw, 26px);
    font-weight: 700;
    line-height: 1.4;
    color: var(--ink);
    text-align: center;
    position: relative;
    z-index: 1;
  }

  /* Answer buttons */
  .answers {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 24px;
  }

  .answer-btn {
    background: #fff;
    border: 2px solid var(--line);
    padding: 24px 28px;
    border-radius: 14px;
    font-family: 'Heebo', sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.25s;
    text-align: right;
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
    overflow: hidden;
    min-height: 70px;
  }

  .answer-btn:hover:not(:disabled) {
    border-color: var(--gold);
    transform: translateX(-4px);
    box-shadow: var(--shadow);
    background: linear-gradient(90deg, #fffdf5 0%, #fff 100%);
  }

  .answer-btn:disabled {
    cursor: default;
  }

  .answer-letter {
    flex-shrink: 0;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--paper-dark);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Assistant', sans-serif;
    font-size: 22px;
    font-weight: 700;
    transition: all 0.25s;
  }

  .answer-btn.correct {
    background: rgba(61, 124, 79, 0.1);
    border-color: var(--success);
    color: var(--success);
  }

  .answer-btn.correct .answer-letter {
    background: var(--success);
    color: #fff;
  }

  /* Yellow highlight shown for the correct answer after a WRONG selection */
  .answer-btn.correct-highlight {
    background: rgba(251, 191, 36, 0.22);
    border-color: #f59e0b;
    color: #78350f;
    box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.35), 0 4px 14px rgba(245, 158, 11, 0.25);
    animation: highlightPulse 1.2s ease-in-out infinite;
  }

  .answer-btn.correct-highlight .answer-letter {
    background: #f59e0b;
    color: #fff;
  }

  @keyframes highlightPulse {
    0%, 100% {
      box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.35), 0 4px 14px rgba(245, 158, 11, 0.25);
    }
    50% {
      box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.5), 0 6px 20px rgba(245, 158, 11, 0.4);
    }
  }

  /* Night mode variant */
  body.night-mode .answer-btn.correct-highlight {
    background: rgba(251, 191, 36, 0.18);
    border-color: #fbbf24;
    color: #fef3c7;
  }

  body.night-mode .answer-btn.correct-highlight .answer-letter {
    background: #fbbf24;
    color: #1f2937;
  }

  .answer-btn.wrong {
    background: rgba(196, 66, 62, 0.1);
    border-color: var(--error);
    color: var(--error);
  }

  .answer-btn.wrong .answer-letter {
    background: var(--error);
    color: #fff;
  }

  /* Big check/X overlay */
  .answer-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 500;
    opacity: 0;
    animation: overlayShow 1.2s ease-out forwards;
  }

  @keyframes overlayShow {
    0% { opacity: 0; transform: scale(0.5); }
    20% { opacity: 1; transform: scale(1.1); }
    30% { transform: scale(1); }
    70% { opacity: 1; }
    100% { opacity: 0; transform: scale(1); }
  }

  .answer-overlay-icon {
    font-size: 160px;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.2));
  }

  .answer-overlay.correct .answer-overlay-icon {
    color: var(--success);
  }

  .answer-overlay.wrong .answer-overlay-icon {
    color: var(--error);
  }

  /* Explanation card (shown after answering) */
  .explanation {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 24px 26px;
    margin-bottom: 20px;
    animation: fadeInUp 0.4s ease-out;
    border-right: 4px solid var(--gold);
  }

  .explanation-label {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 8px;
  }

  .explanation-text {
    font-family: 'Assistant', sans-serif;
    font-size: 17px;
    line-height: 1.7;
    color: var(--ink);
  }

  /* Next button */
  .next-btn {
    width: 100%;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 16px 24px;
    border-radius: 12px;
    font-family: 'Heebo', sans-serif;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .next-btn:hover {
    background: var(--burgundy-dark);
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }

  .next-btn svg { width: 18px; height: 18px; fill: currentColor; }

  /* Auto-advance progress bar */
  .auto-advance {
    margin-top: 16px;
    text-align: center;
    animation: fadeInUp 0.4s ease-out;
  }

  .auto-advance-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }

  .auto-advance-bar {
    height: 3px;
    background: var(--paper-dark);
    border-radius: 100px;
    overflow: hidden;
    max-width: 200px;
    margin: 0 auto;
  }

  .auto-advance-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold) 0%, var(--burgundy) 100%);
    border-radius: 100px;
    width: 100%;
    animation: countdownFill 2s linear forwards;
    transform-origin: right;
  }

  @keyframes countdownFill {
    from { transform: scaleX(1); }
    to { transform: scaleX(0); }
  }

  .skip-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    margin-top: 10px;
    text-decoration: underline;
    font-family: inherit;
  }

  .skip-btn:hover { color: var(--burgundy); }

  .back-btn {
    background: transparent;
    border: 1px solid var(--line);
    padding: 10px 20px;
    border-radius: 100px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    margin-bottom: 20px;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .back-btn:hover {
    border-color: var(--ink);
    color: var(--ink);
  }

  /* Stats view */
  .stats-section {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
  }

  .stats-title {
    font-family: 'Assistant', sans-serif;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .stats-subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 24px;
  }

  .stats-main {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    background: var(--paper-dark);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .stats-main-item {
    background: #fff;
    padding: 20px 14px;
    text-align: center;
  }

  .stats-big-num {
    font-family: 'Assistant', sans-serif;
    font-size: 32px;
    font-weight: 700;
    line-height: 1;
    color: var(--ink);
  }

  .stats-big-num.success { color: var(--success); }
  .stats-big-num.error { color: var(--error); }

  .stats-big-lbl {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .score-display {
    text-align: center;
    padding: 30px 0;
  }

  .score-number {
    font-family: 'Assistant', sans-serif;
    font-size: 72px;
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, var(--burgundy) 0%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .score-label {
    color: var(--muted);
    font-size: 14px;
    margin-top: 8px;
  }

  /* Category breakdown */
  .cat-breakdown {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-top: 20px;
  }

  .cat-row {
    display: grid;
    grid-template-columns: 36px 1fr auto;
    align-items: center;
    gap: 14px;
  }

  .cat-emoji {
    font-size: 22px;
    text-align: center;
  }

  .cat-bar-wrap {
    background: var(--paper-dark);
    border-radius: 100px;
    height: 8px;
    overflow: hidden;
  }

  .cat-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold) 0%, var(--success) 100%);
    border-radius: 100px;
    transition: width 0.6s ease-out;
  }

  .cat-label {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .cat-count {
    font-family: 'Assistant', sans-serif;
    font-size: 15px;
    font-weight: 700;
    min-width: 40px;
    text-align: center;
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--line);
    font-size: 10px;
    color: var(--muted);
  }

  .reset-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    text-decoration: underline;
    font-size: 10px;
    font-family: inherit;
    margin-right: 8px;
  }

  .reset-btn:hover { color: var(--burgundy); }

  .loading {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 60vh;
    color: var(--muted);
    font-family: 'Assistant', sans-serif;
    font-size: 18px;
    font-style: italic;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--muted);
  }

  .empty-icon {
    font-size: 56px;
    margin-bottom: 14px;
    opacity: 0.5;
  }

  /* Mobile */
  @media (max-width: 540px) {
    .container { padding: 20px 14px 60px; }
    .question-card { padding: 28px 20px; }
    .answer-btn { padding: 16px 18px; font-size: 15px; }
    .categories-grid { grid-template-columns: repeat(2, 1fr); }
    .answer-overlay-icon { font-size: 120px; }
  }
  /* ==== NEW FEATURES STYLING ==== */

  /* Settings panel (difficulty + timer mode) */
  .settings-panel {
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 22px;
    margin-bottom: 26px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .settings-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .settings-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .difficulty-buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .diff-btn {
    padding: 12px 6px;
    border: 2px solid var(--line);
    background: #fff;
    border-radius: 12px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .diff-btn:hover {
    border-color: var(--ocean-light);
    color: var(--ink);
  }

  .diff-btn.active {
    background: linear-gradient(135deg, var(--ocean) 0%, var(--ocean-light) 100%);
    color: #fff;
    border-color: var(--ocean);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(30,64,175,0.3);
  }

  .diff-emoji {
    font-size: 16px;
  }

  /* Timer toggle */
  .timer-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .timer-btn {
    padding: 14px 16px;
    border: 2px solid var(--line);
    background: #fff;
    border-radius: 12px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.25s;
  }

  .timer-btn:hover {
    border-color: var(--teal-light);
    color: var(--ink);
  }

  .timer-btn.active {
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-light) 100%);
    color: #fff;
    border-color: var(--teal);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(8,145,178,0.3);
  }

  /* Timer circle on question */
  .timer-display {
    display: flex;
    justify-content: center;
    margin: 20px 0 24px;
  }

  .timer-circle {
    position: relative;
    width: 90px;
    height: 90px;
  }

  .timer-circle svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .timer-circle .timer-bg {
    fill: none;
    stroke: var(--paper-dark);
    stroke-width: 7;
  }

  .timer-circle .timer-progress {
    fill: none;
    stroke: var(--ocean);
    stroke-width: 7;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.3s;
  }

  .timer-circle.urgent .timer-progress {
    stroke: var(--error);
    animation: pulse 0.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .timer-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Assistant', sans-serif;
    font-size: 32px;
    font-weight: 800;
    color: var(--ink);
  }

  .timer-circle.urgent .timer-text {
    color: var(--error);
  }

  /* Difficulty badge on question */
  .meta-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .difficulty-badge {
    padding: 4px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.03em;
  }

  .difficulty-badge.diff-easy {
    background: rgba(16,185,129,0.12);
    color: #059669;
  }

  .difficulty-badge.diff-medium {
    background: rgba(245,158,11,0.12);
    color: #d97706;
  }

  .difficulty-badge.diff-hard {
    background: rgba(239,68,68,0.12);
    color: #dc2626;
  }

  /* Mobile optimization for new elements */
  @media (max-width: 540px) {
    .settings-panel {
      padding: 16px;
      margin-bottom: 20px;
    }
    .difficulty-buttons {
      gap: 6px;
    }
    .diff-btn {
      font-size: 12px;
      padding: 10px 4px;
    }
    .timer-btn {
      font-size: 13px;
      padding: 12px;
    }
    .timer-circle {
      width: 70px;
      height: 70px;
    }
    .timer-text {
      font-size: 26px;
    }
    .meta-right {
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }
  }

  /* ==== STREAK ==== */
  .best-streak-display {
    margin-top: 12px;
    padding: 10px 16px;
    background: linear-gradient(135deg, rgba(249,115,22,0.1) 0%, rgba(239,68,68,0.1) 100%);
    border: 1px solid rgba(249,115,22,0.25);
    border-radius: 100px;
    font-size: 13px;
    color: #c2410c;
    font-weight: 500;
    display: inline-block;
  }

  .streak-badge {
    background: linear-gradient(135deg, #f97316 0%, #dc2626 100%);
    color: #fff;
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 700;
    box-shadow: 0 2px 8px rgba(249,115,22,0.3);
    animation: streak-pulse 1s ease-in-out infinite;
  }

  @keyframes streak-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .streak-toast {
    position: fixed;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: linear-gradient(135deg, #f97316 0%, #dc2626 100%);
    color: #fff;
    padding: 24px 40px;
    border-radius: 20px;
    text-align: center;
    z-index: 900;
    box-shadow: 0 12px 40px rgba(249,115,22,0.4);
    animation: streak-toast-in 0.4s ease-out, streak-toast-out 0.4s ease-in 1.6s forwards;
  }

  @keyframes streak-toast-in {
    from { opacity: 0; transform: translate(-50%, -80%) scale(0.5); }
    to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }

  @keyframes streak-toast-out {
    to { opacity: 0; transform: translate(-50%, -30%) scale(0.8); }
  }

  .streak-fire {
    font-size: 60px;
    margin-bottom: 8px;
    animation: fire-bounce 0.5s ease-in-out infinite alternate;
  }

  @keyframes fire-bounce {
    from { transform: scale(1); }
    to { transform: scale(1.15); }
  }

  .streak-msg {
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 4px;
  }

  .streak-sub {
    font-size: 14px;
    opacity: 0.9;
  }

  /* ==== SPECIAL MODES (Exam + Custom) ==== */
  .special-modes {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }

  .special-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 20px;
    border-radius: 16px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.25s;
    text-align: right;
    font-family: inherit;
  }

  .exam-btn {
    background: linear-gradient(135deg, var(--ocean) 0%, var(--ocean-light) 100%);
    color: #fff;
  }

  .custom-btn {
    background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
    color: #fff;
  }

  .special-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(30,64,175,0.3);
  }

  .custom-btn:hover {
    box-shadow: 0 8px 24px rgba(139,92,246,0.3);
  }

  .special-icon {
    font-size: 36px;
    line-height: 1;
  }

  .special-text {
    flex: 1;
  }

  .special-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 2px;
  }

  .special-sub {
    font-size: 12px;
    opacity: 0.85;
  }

  /* ==== EXAM MODE ==== */
  .exam-progress-bar {
    height: 8px;
    background: var(--paper-dark);
    border-radius: 100px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .exam-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--ocean) 0%, var(--ocean-light) 100%);
    border-radius: 100px;
    transition: width 0.5s ease-out;
  }

  .exam-counter {
    background: var(--ocean);
    color: #fff;
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 600;
  }

  /* ==== EXAM RESULT ==== */
  .exam-result {
    background: #fff;
    border-radius: 20px;
    padding: 40px 30px;
    text-align: center;
    box-shadow: var(--shadow-lg);
    margin-bottom: 24px;
  }

  .exam-result.excellent {
    background: linear-gradient(135deg, #fef9c3 0%, #fef08a 100%);
    border: 3px solid #eab308;
  }

  .exam-result.very-good {
    background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
    border: 3px solid #3b82f6;
  }

  .exam-result.good {

  /* ==== ACHIEVEMENTS PAGE ==== */

    text-align: center;

  /* Achievement toast notification */
  .achievement-toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
    color: #7c2d12;
    padding: 16px 24px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 12px 40px rgba(245,158,11,0.4);
    z-index: 950;
    min-width: 280px;
    max-width: 400px;
    animation: ach-toast-in 0.4s ease-out, ach-toast-out 0.4s ease-in 3.6s forwards;
  }

  @keyframes ach-toast-in {
    from { opacity: 0; transform: translate(-50%, -80px); }
    to { opacity: 1; transform: translate(-50%, 0); }
  }

  @keyframes ach-toast-out {
    to { opacity: 0; transform: translate(-50%, -80px); }
  }

  .achievement-toast-icon {
    font-size: 44px;
    line-height: 1;
    flex-shrink: 0;
  }

    font-size: 11px;
    font-weight: 600;
    opacity: 0.8;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .achievement-toast-name {
    font-size: 18px;
    font-weight: 800;
    margin: 2px 0;
  }

  .achievement-toast-desc {
    font-size: 12px;
    opacity: 0.85;
  }

  /* ==== INFO TOAST ==== */
  .info-toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, var(--burgundy), var(--ocean));

    border-radius: 12px;

    font-size: 15px;

  }

  @keyframes info-toast-in {
    from { opacity: 0; transform: translate(-50%, -20px); }
    to { opacity: 1; transform: translate(-50%, 0); }
  }

  @keyframes info-toast-out {
    to { opacity: 0; transform: translate(-50%, -20px); }
  }

  /* ==== DAILY CHALLENGE CARD ==== */
  .daily-card {
    background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #d97706 100%);
    border-radius: 18px;

    content: "";

    top: -30px;

    border-radius: 50%;

  .daily-card.done {

    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
    position: relative;
  }

  .daily-card-icon {
    font-size: 32px;
  }

  .daily-card-title {
    font-weight: 800;

  }

  .daily-card-sub {

  /* ==== NEW HOME LAYOUT ==== */
  .home-v2 {

  /* ==== ARC STAGE (icons in semi-circles around the start button) ==== */
  .arc-stage {
    position: relative;
    width: min(330px, 94vw);
    height: 260px;

  .big-start-btn {
    position: absolute;
    bottom: 0;
    left: 50%;
    margin-left: -60px;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--burgundy) 0%, var(--ocean) 50%, var(--teal) 100%);
    color: white;
    font-family: 'Heebo', sans-serif;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    box-shadow: 0 10px 26px rgba(14,165,233,0.38), 0 4px 10px rgba(15,30,46,0.15);
    transition: transform 0.2s, box-shadow 0.2s;
    animation: start-pulse 2.5s ease-in-out infinite;
    z-index: 3;
  }

  .big-start-btn::before {
    content: "";
    position: absolute;
    inset: 3px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.25);
    pointer-events: none;
  }

  @keyframes start-pulse {

    50% { box-shadow: 0 14px 36px rgba(14,165,233,0.58), 0 4px 10px rgba(15,30,46,0.15); }
  }

  .big-start-btn:hover { transform: scale(1.04); }
  .big-start-btn:active { transform: scale(0.96); animation: none; }

  .big-start-icon { font-size: 24px; line-height: 1; margin-top: 2px; }
  .big-start-text { font-size: 19px; font-weight: 800; letter-spacing: 0.02em; line-height: 1.1; }
  .big-start-sub { font-size: 9.5px; opacity: 0.92; font-weight: 500; padding: 0 8px; text-align: center; line-height: 1.3; }

  /* Inner arc: categories (10 items, -80 to +80 deg, smaller radius) */
  .cat-arc-icon {
    position: absolute;
    bottom: 60px; /* button center Y (button height / 2) */
    left: 50%;
    width: 44px;
    height: 44px;
    margin: 0 0 -22px -22px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ffffff 0%, #e8f1fa 100%);

    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    padding: 0;
    transform: rotate(var(--a)) translateY(-100px) rotate(calc(-1 * var(--a)));
    transition: box-shadow 0.2s, border-color 0.2s;
    z-index: 2;
    font-family: inherit;
    line-height: 1;
  }

  .cat-arc-icon:hover {
    transform: rotate(var(--a)) translateY(-100px) rotate(calc(-1 * var(--a))) scale(1.15);
    box-shadow: 0 6px 16px rgba(14,165,233,0.32);
    border-color: var(--gold);
    z-index: 10;
  }

  .cat-arc-icon:active {
    transform: rotate(var(--a)) translateY(-100px) rotate(calc(-1 * var(--a))) scale(0.92);
  }

  /* Outer arc: settings (difficulty + timer, 8 items) */
  .set-arc-icon {
    position: absolute;
    bottom: 60px;
    left: 50%;
    width: 38px;
    height: 38px;
    margin: 0 0 -19px -19px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ffffff 0%, #f0f7ff 100%);
    border: 2px solid rgba(100, 116, 139, 0.22);
    box-shadow: 0 2px 7px rgba(15,30,46,0.1);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    padding: 0;
    transform: rotate(var(--a)) translateY(-148px) rotate(calc(-1 * var(--a)));
    transition: box-shadow 0.2s, border-color 0.2s, background 0.2s;
    z-index: 1;
    font-family: inherit;
    line-height: 1;
    color: var(--muted);
    font-weight: 700;
  }

  .set-arc-icon:hover {
    transform: rotate(var(--a)) translateY(-148px) rotate(calc(-1 * var(--a))) scale(1.18);
    box-shadow: 0 5px 14px rgba(14,165,233,0.28);

  .set-arc-icon:active {

  .set-arc-icon.active.diff-med {
    background: linear-gradient(135deg, #f59e0b, #d97706);
    box-shadow: 0 4px 12px rgba(217,119,6,0.45);
  }

  .set-arc-icon.active.diff-hard {
    background: linear-gradient(135deg, #ef4444, #dc2626);
    box-shadow: 0 4px 12px rgba(220,38,38,0.45);
  }

  /* Labels for arc icons */
  .cat-arc-label, .set-arc-label {
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%) scale(0.9);
    background: linear-gradient(135deg, var(--burgundy), var(--ocean));
    color: white;
    padding: 6px 12px;
    border-radius: 10px;
    font-size: 12px;
    white-space: nowrap;
    margin-bottom: 8px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s, transform 0.15s;
    font-weight: 700;
    box-shadow: 0 4px 12px rgba(15,30,46,0.25);
    z-index: 50;
  }

  .cat-arc-label::after, .set-arc-label::after {
    content: "";
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--ocean);
  }

  /* Show label on both hover (desktop) AND active (mobile touch) */
  .cat-arc-icon:hover .cat-arc-label,
  .cat-arc-icon:active .cat-arc-label,
  .set-arc-icon:hover .set-arc-label,
  .set-arc-icon:active .set-arc-label {
    opacity: 1;
    transform: translateX(-50%) scale(1);
  }

  /* When actively pressed, also lift the icon up prominently to show selection */
  .cat-arc-icon:active {
    z-index: 20;

    box-shadow: 0 8px 22px rgba(14,165,233,0.55);

  .set-arc-icon:active {

    .set-arc-icon {

    .set-arc-icon:active { transform: rotate(var(--a)) translateY(-125px) rotate(calc(-1 * var(--a))) scale(0.92); }
    .big-start-text { font-size: 17px; }

  /* Night mode for arc icons */
  body.night-mode .cat-arc-icon,
  body.night-mode .set-arc-icon {
    background: linear-gradient(135deg, #1e293b 0%, #172033 100%);

    box-shadow: 0 3px 10px rgba(0,0,0,0.3);
    color: #e2e8f0;
  }

  /* ==== CATEGORY WHEEL (rotating) ==== */
  .wheel-area {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    width: 100%;
    max-width: 360px;
    margin: 2px auto 0;
  }

  .wheel-container {
    position: relative;
    width: 160px;
    height: 160px;
    flex-shrink: 0;
    touch-action: none; /* prevent browser scrolling while dragging */
    user-select: none;
    -webkit-user-select: none;
  }

  /* Pointer indicator at the top of the wheel */
  .wheel-pointer {
    position: absolute;
    top: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 14px solid var(--burgundy);
    z-index: 10;
    filter: drop-shadow(0 2px 3px rgba(15,30,46,0.25));
  }

  .wheel-pointer::after {
    content: "";
    position: absolute;
    top: -18px;
    left: -6px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--burgundy);
    box-shadow: 0 2px 4px rgba(15,30,46,0.2);
  }

  /* Outer ring - the rotating wheel */
  .wheel {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at center, rgba(14,165,233,0.05) 0%, transparent 70%);
    border: 2px dashed rgba(14,165,233,0.2);
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.3, 1);
    transform-origin: center;
  }

  .wheel.dragging {
    transition: none; /* immediate response while dragging */
  }

  /* Inner circle (center hub with start button) */
  .wheel-hub {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 68px;
    height: 68px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--burgundy) 0%, var(--ocean) 50%, var(--teal) 100%);
    color: white;
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    box-shadow: 0 5px 14px rgba(14,165,233,0.4), 0 2px 6px rgba(15,30,46,0.15);
    font-family: inherit;
    z-index: 5;
    animation: start-pulse 2.5s ease-in-out infinite;
    padding: 0;
  }

  .wheel-hub::before {
    content: "";
    position: absolute;
    inset: 3px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.25);
    pointer-events: none;
  }

  .wheel-hub:active {
    transform: translate(-50%, -50%) scale(0.94);
    animation: none;
  }

  .wheel-hub-icon {
    font-size: 16px;
    line-height: 1;
  }

  .wheel-hub-text {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.02em;
    line-height: 1;
    margin-top: 2px;
  }

  /* Category icon on the wheel */
  .wheel-icon {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 32px;
    height: 32px;
    margin: -16px 0 0 -16px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ffffff 0%, #e8f1fa 100%);
    border: 2px solid rgba(14,165,233,0.3);
    box-shadow: 0 2px 6px rgba(15,30,46,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transform: rotate(var(--a)) translateY(-60px);
    transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    pointer-events: none; /* the wheel handles all touch; icons are decorative */
  }

  .wheel-icon > span {
    display: inline-block;
    transform: rotate(calc(-1 * var(--a)));
  }

  .wheel-icon.selected {
    background: linear-gradient(135deg, var(--burgundy), var(--ocean));
    border-color: var(--gold);
    box-shadow: 0 0 0 3px var(--gold), 0 6px 18px rgba(14,165,233,0.55);
    z-index: 2;
    color: white;
  }

  /* Side panel showing selected category */
  .wheel-side-panel {
    flex: 1;
    background: linear-gradient(135deg, var(--burgundy) 0%, var(--ocean) 100%);
    border-radius: 14px;
    padding: 8px 10px;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    min-height: 160px;
    box-shadow: 0 5px 16px rgba(14,165,233,0.32);
    position: relative;
    overflow: hidden;
  }

  .wheel-side-panel::before {
    content: "";
    position: absolute;
    top: -20px;
    right: -20px;
    width: 80px;
    height: 80px;
    background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  .wheel-side-emoji {
    font-size: 38px;
    line-height: 1;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.2));
    position: relative;
  }

  .wheel-side-label {
    font-size: 10px;
    opacity: 0.85;
    font-weight: 500;
    position: relative;
  }

  .wheel-side-name {
    font-size: 13px;
    font-weight: 800;
    line-height: 1.2;
    text-align: center;
    position: relative;
    padding: 0 4px;
  }

  .wheel-side-play {
    background: white;
    color: var(--burgundy);
    border: none;
    padding: 8px 10px;
    border-radius: 10px;
    font-family: inherit;
    font-weight: 800;
    font-size: 13px;
    cursor: pointer;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    position: relative;
    box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    transition: transform 0.15s;
    margin-top: 2px;
  }

  .wheel-side-play:active {
    transform: scale(0.96);
  }

  .wheel-hint {
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 500;
  }

  /* Difficulty/Timer row - below the wheel */
  .wheel-settings-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    width: 100%;
    max-width: 360px;
    margin: 4px auto 0;
  }

  .wheel-setting-group {
    background: white;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 5px 8px 6px;
  }

  .wheel-setting-title {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 4px;
    text-align: center;
  }

  .wheel-setting-btns {
    display: grid;
    gap: 3px;

  .wheel-setting-btns.cols-4 { grid-template-columns: repeat(4, 1fr); }

  .wheel-setting-btn {

    background: var(--paper);
    color: var(--ink);
    border-radius: 7px;

    font-size: 11px;

    align-items: center;
    justify-content: center;
    gap: 3px;
  }

  .wheel-setting-btn.active {
    background: linear-gradient(135deg, var(--burgundy), var(--ocean));
    color: white;
    border-color: transparent;
  }

  .wheel-setting-btn.active.diff-easy {
    background: linear-gradient(135deg, #10b981, #059669);

  .wheel-setting-btn.active.diff-med {
    background: linear-gradient(135deg, #f59e0b, #d97706);
  }
  .wheel-setting-btn.active.diff-hard {
    background: linear-gradient(135deg, #ef4444, #dc2626);
  }

  /* Small screen tweaks */
  @media (max-height: 700px) {
    .wheel-container { width: 190px; height: 190px; }
    .wheel-hub { width: 78px; height: 78px; }
    .wheel-hub-text { font-size: 14px; }

    .wheel-icon {

  body.night-mode .wheel-icon:not(.selected) {

  /* ==== MIXED ALL CATEGORIES BUTTON ==== */

    max-width: 360px;

  /* ==== ARC SELECTION PANEL ==== */
  .arc-selection-panel {
    background: linear-gradient(135deg, var(--burgundy) 0%, var(--ocean) 100%);

  .arc-sel-name {

  { cat: "judaism", q: "מה זה 'תשליך'?", a: ["תפילת ראש השנה", "נטילת ידיים", "השלכת עבירות למים", "תפילת מוסף"], correct: 2, exp: "תשליך - הליכה לנהר או לים ביום הראשון של ראש השנה, כסמל להשלכת העוונות." },
{ cat: "judaism", q: "מתי חל יום הכיפורים?", a: ["ט״ו בתשרי", "א׳ בתשרי", "י׳ בתשרי", "כ״ה כסלו"], correct: 2, exp: "י׳ בתשרי - 'יום הכיפורים הוא' - צום של 25 שעות, היום הקדוש ביותר בשנה." },
  { cat: "judaism", q: "כמה תפילות ביום כיפור?", a: ["שלוש", "ארבע", "שש", "חמש"], correct: 3, exp: "חמש תפילות: ערבית, שחרית, מוסף, מנחה ונעילה - תפילה נוספת ייחודית ליום כיפור." },
  { cat: "judaism", q: "מה המיוחד בנעילה?", a: ["תפילה של סוכות", "תפילה בראש השנה", "תפילה אחרונה ביום כיפור", "התחלת ערבית"], correct: 2, exp: "נעילה - התפילה החמישית והאחרונה ביום כיפור, לפני שערי התשובה ננעלים." },
  { cat: "judaism", q: "איזה צום ארוך יותר, תשעה באב או יום כיפור?", a: ["תשעה באב ארוך יותר", "רק יום כיפור יותר ארוך", "שניהם 25 שעות", "רק כיפור ארוך יותר"], correct: 2, exp: "שניהם צומות של 25 שעות, מחמת שני הצומות היחידים שמדאורייתא או קרוב לכך." },
{ cat: "judaism", q: "מה זה 'כל נדרי'?", a: ["תפילת ראש השנה", "תפילה פותחת ליום כיפור", "סיום יום כיפור", "תפילה בראש השנה"], correct: 1, exp: "תפילת 'כל נדרי' פותחת את יום הכיפורים - התרת נדרים מהשנה החולפת." },
{ cat: "judaism", q: "מתי חל סוכות?", a: ["ט״ו בתשרי", "ט״ו בניסן", "א׳ בתשרי", "כ״ה בכסלו"], correct: 0, exp: "חג הסוכות מתחיל בט״ו בתשרי, חמישה ימים לאחר יום הכיפורים, ונמשך שבעה ימים." },
  { cat: "judaism", q: "כמה ימים סוכות בארץ?", a: ["8 ימים", "6 + שמחת תורה", "7 ימים + שמיני עצרת", "10 ימים"], correct: 2, exp: "שבעה ימי סוכות + שמיני עצרת = 8 ימי יו״ט בארץ ישראל. בחו״ל 9 ימים." },
  { cat: "judaism", q: "מה הם 4 המינים?", a: ["תאנה, גפן, זית, רימון", "לולב, אתרוג, הדס, ערבה", "חמישה", "שישה"], correct: 1, exp: "לולב (תמר), אתרוג, הדסים (3) וערבות (2) - ארבעת המינים שנאגדים ונענעים בסוכות." },
  { cat: "judaism", q: "מה סדר הצמדת ארבעת המינים?", a: ["ערבות במרכז", "כולם יחד", "לולב במרכז, הדסים ימין וערבות שמאל", "אתרוג עם לולב יחד"], correct: 2, exp: "לולב באמצע, שלושה הדסים בימין ושתי ערבות בשמאל. האתרוג בנפרד בידי שמאל." },
  { cat: "judaism", q: "מה זה 'הושענא רבה'?", a: ["היום השביעי של סוכות", "ערב סוכות", "יום ראשון של סוכות", "שמיני עצרת"], correct: 0, exp: "היום השביעי של חג הסוכות - חבטת ערבות, ונחשב ליום חתימה של הדין." },
{ cat: "judaism", q: "מה זה 'שמיני עצרת'?", a: ["יום ראשון של סוכות", "יום 8 של סוכות", "חג נפרד לפני סוכות", "חג נפרד בעל אופי מיוחד"], correct: 3, exp: "'שמיני עצרת' - חג בפני עצמו ביום השמיני, יש בו שמחה אך בלי סוכה (בארץ)." },
  { cat: "judaism", q: "מה זה 'שמחת תורה'?", a: ["חג ראש השנה", "חג שבועות", "חג סיום התורה", "חג פסח"], correct: 2, exp: "שמחת תורה - ביום שמיני עצרת (בחו״ל ביום תשיעי) מסיימים וחוזרים להתחיל את התורה." },
{ cat: "judaism", q: "מתי חל חנוכה?", a: ["ט״ו בכסלו", "כ״ה בכסלו", "כ״ה בטבת", "ט״ו בשבט"], correct: 1, exp: "חנוכה מתחיל בכ״ה בכסלו ונמשך שמונה ימים, לזכר הנס בבית המקדש השני." },
  { cat: "judaism", q: "כמה ימים חנוכה?", a: ["10", "9", "7", "8"], correct: 3, exp: "שמונה ימים - כנגד השמן שהספיק לשמונה ימים במקום ליום אחד." },
  { cat: "judaism", q: "איזה נס קרה בחנוכה?", a: ["הצלת אסתר", "הצלה מהיוונים", "נפילת החומות", "נס פח השמן"], correct: 3, exp: "מצאו פח שמן טהור, שהספיק להדליק מנורה רק יום אחד, ונעשה נס ודלק שמונה ימים." },
  { cat: "judaism", q: "מי הם החשמונאים?", a: ["משפחה מלכותית בבבל", "משפחת נביאים", "שבט פלוני", "משפחת כהנים שהתמרדה נגד היוונים"], correct: 3, exp: "משפחת מתתיהו הכהן ובניו, שמרדה במלכות סלווקוס והצליחה לגרש את היוונים." },
  { cat: "judaism", q: "כמה בנים היו למתתיהו?", a: ["ארבעה", "שבעה", "חמישה", "שלושה"], correct: 2, exp: "יהודה, יונתן, שמעון, אלעזר ויוחנן - חמשת המכבים שהנהיגו את המרד." },
{ cat: "judaism", q: "מה היה הכינוי של יהודה?", a: ["החזק", "הגיבור", "המכבי", "הקדוש"], correct: 2, exp: "יהודה המכבי - כינויו. יש האומרים שראשי תיבות 'מי כמוך באלים ה''." },
  { cat: "judaism", q: "מה זה 'חנוכייה'?", a: ["מנורת שמונה קני שמן", "כוס קידוש", "מנורה בבית המקדש", "נר אחד בלבד"], correct: 0, exp: "חנוכייה/מנורת חנוכה - שמונה נרות + שמש להדלקת חנוכה." },
  { cat: "judaism", q: "היכן מדליקים חנוכייה?", a: ["בפתח הבית/חלון", "רק בבית כנסת", "רק בבית הכנסת", "בתוך בית המדרש"], correct: 0, exp: "פרסומי ניסא - מעיקר הדין ליד הפתח מבחוץ, או בחלון, שיראוה עוברים ושבים." },
  { cat: "judaism", q: "מהי 'מצוות נר חנוכה'?", a: ["נר לכל אחד", "נר אחד לכל הלילות", "3 נרות בכל לילה", "נר איש וביתו"], correct: 3, exp: "מעיקר הדין - נר אחד לבית; מהדרין - נר לכל אחד; מהדרין מן המהדרין - מוסיפים נר בכל לילה." },
{ cat: "judaism", q: "מתי חל ט״ו בשבט?", a: ["ט״ו בשבט", "ט״ו באדר", "ט״ו בניסן", "א׳ בתשרי"], correct: 0, exp: "ט״ו בשבט - ראש השנה לאילנות, על פי בית הלל במשנה במסכת ראש השנה." },
  { cat: "judaism", q: "כמה ראשי שנים יש לפי המשנה?", a: ["שניים", "2", "6", "ארבעה"], correct: 3, exp: "א׳ בניסן (למלכים ורגלים), א׳ באלול (מעשר בהמה), א׳ בתשרי (שנים), ט״ו בשבט (לאילנות)." },
{ cat: "judaism", q: "מה מנהג אכילת פירות בט״ו בשבט?", a: ["מנהג תלמודי", "מנהג עתיק מהמקרא", "מנהג של הבעל שם טוב", "מנהג קבלי"], correct: 3, exp: "מנהג 'סדר ט״ו בשבט' התפתח בקבלת צפת על ידי האר״י ותלמידיו." },
{ cat: "judaism", q: "מתי חל פורים?", a: ["ט״ו בניסן", "ט׳ באב", "י״ד באדר", "ט״ו באדר"], correct: 2, exp: "פורים חל בי״ד באדר, ובערים המוקפות חומה (כירושלים) - בט״ו באדר ('שושן פורים')." },
  { cat: "judaism", q: "כמה מצוות בפורים?", a: ["שלוש", "ארבע", "שתיים", "שש"], correct: 1, exp: "מקרא מגילה, משלוח מנות, מתנות לאביונים, משתה ושמחה." },
  { cat: "judaism", q: "מה זה 'משלוח מנות'?", a: ["תרומה לבית כנסת", "3 מנות", "צדקה מיוחדת", "2 מאכלים לאדם 1"], correct: 3, exp: "משלוח שני סוגי מאכל מוכנים לאכילה לאדם אחד - מצוה להרבות באהבה בין יהודים." },
  { cat: "judaism", q: "מה זה 'מתנות לאביונים'?", a: ["תפילה מיוחדת", "שק מלא", "משלוח מנות", "מתנות לשני עניים"], correct: 3, exp: "נותנים שתי מתנות ל-2 עניים לפחות - משמח את נפשות העניים ומשפחותיהם." },
  { cat: "judaism", q: "מה זה 'תענית אסתר'?", a: ["צום באב", "צום לפני פורים", "צום כיפור", "צום ט׳ באב"], correct: 1, exp: "צום ב-י״ג באדר, זכר לצום שצמו בני ישראל בימי מרדכי ואסתר." },
  { cat: "judaism", q: "מתי חל פסח?", a: ["ט״ו בתשרי", "א׳ בניסן", "א׳ בתשרי", "ט״ו בניסן"], correct: 3, exp: "חג הפסח מתחיל בט״ו בניסן ונמשך 7 ימים בארץ ישראל ו-8 בחו״ל." },
  { cat: "judaism", q: "מה הוא 'ליל הסדר'?", a: ["ערב שבת הגדול", "הלילה הראשון של פסח", "ליל סוכות", "ליל שבועות"], correct: 1, exp: "ליל הסדר - הלילה הראשון של פסח (בחו״ל גם שני) - סדר קבוע של חמש עשרה מצוות." },
  { cat: "judaism", q: "כמה כוסות בליל הסדר?", a: ["שבע", "חמש", "4", "שלוש"], correct: 2, exp: "ארבע כוסות יין כנגד ארבע לשונות גאולה ('והוצאתי, והצלתי, וגאלתי, ולקחתי')." },
  { cat: "judaism", q: "מה זה 'אפיקומן'?", a: ["תבלין", "חצי מצה שמחביאים לסוף", "חצי מצה לקידוש", "עוגת שוקולד"], correct: 1, exp: "חצי מהמצה האמצעית שמחביאים בתחילת הסדר ואוכלים בסופו - זכר לקרבן פסח." },
  { cat: "judaism", q: "מה הוא 'חמץ'?", a: ["ענב מחמצן", "קמח בלבד", "תבואה שתפחה", "חמוץ"], correct: 2, exp: "תבואה מחמשת מיני דגן שספגה מים והתחילה לתפוח - אסורה בפסח." },
  { cat: "judaism", q: "מתי בודקים חמץ?", a: ["כל הפסח", "בערב פסח", "חודש לפני", "אור לי״ד בניסן"], correct: 3, exp: "בודקים חמץ בליל י״ד בניסן (ליל הפסח בערב) לאור הנר, לפני ביעור חמץ." },
{ cat: "judaism", q: "מה זה 'ביטול חמץ'?", a: ["שריפה פיזית", "שריפת חמץ", "מכירת חמץ", "הכרזה שמבטלים בעלות"], correct: 3, exp: "אומרים 'כל חמירא' ומבטלים בלב את הבעלות על החמץ - הסרת איסור בעל חמץ." },
  { cat: "judaism", q: "מה זה 'מכירת חמץ'?", a: ["מכירה רגילה", "ניקיון הבית", "הסכם משפטי למכור לגוי", "השמדה"], correct: 2, exp: "מכירת חמץ לגוי על ידי הרב לפני פסח, ואחר החג נחזיר אותו - פתרון שימושי במיוחד למי שיש חמץ רב." },
  { cat: "judaism", q: "מה הם 'קטניות'?", a: ["תבלינים", "סוכריות", "מאכלי בשר", "מאכלים שאשכנזים נמנעים בפסח"], correct: 3, exp: "קטניות (אורז, תירס, שעועית) - נוהג באשכנז למנוע אכילתם בפסח. ספרדים אוכלים." },
{ cat: "judaism", q: "למה אוכלים מצה בפסח?", a: ["מצה טעימה", "זכר למצרים", "כי זה טעים", "לזכר יציאת מצרים במהירות"], correct: 3, exp: "'כי בחיפזון יצאת מארץ מצרים' - לא הספיק הבצק להחמיץ, ולכן אוכלים מצה." },
  { cat: "judaism", q: "מה זה 'מרור'?", a: ["ירק מתוק", "תבלין מתוק", "סוג לחם", "ירק מר בליל הסדר"], correct: 3, exp: "מרור - ירק מר (חסה או חזרת) זכר למרירות עבודת מצרים." },
  { cat: "judaism", q: "מה זה 'חרוסת'?", a: ["תערובת של תפוחים ואגוזים", "סוג מאכל", "סוג של ירק מר", "מאכל מנה ראשונה"], correct: 0, exp: "חרוסת - תערובת של פירות, אגוזים ויין. זכר לטיט שבו עבדו בני ישראל במצרים." },
{ cat: "judaism", q: "מתי חל ל״ג בעומר?", a: ["ט״ו באייר", "י׳ באב", "ל״ג באייר", "י״ח באייר"], correct: 3, exp: "ל״ג בעומר - היום ה-33 לספירת העומר, י״ח באייר, יום שפסקו להסתלק תלמידי ר׳ עקיבא." },
  { cat: "judaism", q: "מה עושים בל״ג בעומר?", a: ["צמים", "ימי צער", "מדליקים מדורות ועולים למירון", "לא עושים דבר"], correct: 2, exp: "יום שמחה בו פוסקים מנהגי אבלות. נהוג לעלות למירון לקבר רשב״י ולהדליק מדורות." },
{ cat: "judaism", q: "מתי חל שבועות?", a: ["ו׳ באייר", "כ״ה בטבת", "א׳ באייר", "ו׳ בסיון"], correct: 3, exp: "שבועות - בו׳ בסיון, יום מתן תורה, חמישים יום אחרי פסח." },
  { cat: "judaism", q: "מה מיוחד בשבועות?", a: ["יום יציאת מצרים", "יום מתן תורה", "שמחה פרטית", "זיכרון אבות"], correct: 1, exp: "זמן מתן תורתנו - שבועות מציין את קבלת התורה בהר סיני." },
{ cat: "judaism", q: "מה הוא 'תיקון ליל שבועות'?", a: ["לימוד כל הלילה", "תפילה מיוחדת", "פיוטים ותפילות", "צום"], correct: 0, exp: "מנהג קבלי ללמוד כל הלילה - 'תיקון' על שבני ישראל ישנו בליל מתן תורה." },
  { cat: "judaism", q: "מה אוכלים בשבועות?", a: ["מוצרי חלב", "מצה", "לחם", "בשר"], correct: 0, exp: "נהוג לאכול מאכלי חלב - כמה טעמים: ציון הטהרה, רמז ל'חלב ודבש', ועוד." },
  { cat: "judaism", q: "מה אוכלים בראש השנה?", a: ["סימנים - תפוח בדבש, ראש דג", "מצה", "מצות", "אוכל בשרי"], correct: 0, exp: "אוכלים סימני טוב ללא שנה חדשה - תפוח בדבש, ראש דג ('נהיה לראש'), רימון ועוד." },
  { cat: "judaism", q: "מתי חל תשעה באב?", a: ["ט׳ בטבת", "ט׳ בכסלו", "ט׳ באב", "ט׳ בשבט"], correct: 2, exp: "ט׳ באב - צום על חורבן בית המקדש הראשון והשני, וכן אירועים טרגיים נוספים." },

function checkAchievements() {
  const newlyUnlocked = [];
  ACHIEVEMENTS.forEach(ach => {
    if (!state.unlockedAchievements[ach.id] && ach.check(state)) {
      state.unlockedAchievements[ach.id] = Date.now();
      newlyUnlocked.push(ach);
    }
  });
  return newlyUnlocked;
}

function showAchievementUnlock(ach) {
  const toast = document.createElement('div');
  toast.className = 'achievement-toast';
  toast.innerHTML = `
    <div class="achievement-toast-icon">${ach.icon}</div>
    <div class="achievement-toast-text">
      <div class="achievement-toast-label">הישג חדש נפתח!</div>
      <div class="achievement-toast-name">${ach.name}</div>
      <div class="achievement-toast-desc">${ach.desc}</div>
    </div>
  `;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
}

// ============ DAILY CHALLENGE ============
function getTodayString() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function getYesterdayString() {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

// Deterministic question for today based on date
function getDailyQuestionId() {
  const today = getTodayString();
  // Simple hash from date string
  let hash = 0;
  for (let i = 0; i < today.length; i++) {
    hash = ((hash << 5) - hash + today.charCodeAt(i)) | 0;
  }
  hash = Math.abs(hash);
  return hash % QUESTIONS.length;
}

function isDailyPlayedToday() {
  return state.dailyChallenge.lastPlayedDate === getTodayString();
}

// Get unique mistakes (latest occurrence per question)
function getMistakeQuestionIds() {
  // Build a map: questionId -> most recent attempt for QUESTIONS only (not custom)
  const latestAttempt = {};
  state.answered.forEach(a => {
    // Only include real question IDs (not custom)
    if (typeof a.questionId === 'number' && a.questionId >= 0 && a.questionId < QUESTIONS.length) {
      if (!latestAttempt[a.questionId] || a.timestamp > latestAttempt[a.questionId].timestamp) {
        latestAttempt[a.questionId] = a;
      }
    }
  });
  // Return questionIds where the latest attempt was wrong
  return Object.entries(latestAttempt)
    .filter(([_, a]) => !a.correct)
    .map(([id, _]) => parseInt(id));
}

// ============ BACKUP / RESTORE ============
function exportData() {
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    answered: state.answered,
    lastQuestions: state.lastQuestions,
    difficulty: state.difficulty,
    timerMode: state.timerMode,
    timerSeconds: state.timerSeconds,
    currentStreak: state.currentStreak,
    bestStreak: state.bestStreak,
    customQuestions: state.customQuestions,
    unlockedAchievements: state.unlockedAchievements,
    nightMode: state.nightMode,
    learningMode: state.learningMode,
    dailyChallenge: state.dailyChallenge,
    _mistakesFixed: state._mistakesFixed || 0,
  };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const today = getTodayString();
  a.download = `quiz-backup-${today}.json`;
  document.body.appendChild(a);
  a.click();

  URL.revokeObjectURL(url);

  showInfoToast('✅ הגיבוי הורד בהצלחה');
}

function importData(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data || typeof data !== 'object') {
        throw new Error('Invalid file');
      }
      if (!confirm('האם אתה בטוח? פעולה זו תחליף את כל הנתונים הנוכחיים שלך בנתונים מהקובץ.')) {
        return;
      }
      // Restore state
      if (Array.isArray(data.answered)) state.answered = data.answered;
      if (Array.isArray(data.lastQuestions)) state.lastQuestions = data.lastQuestions;
      if (data.difficulty) state.difficulty = data.difficulty;
      if (typeof data.timerMode === 'boolean') state.timerMode = data.timerMode;
      if ([10, 15, 20].includes(data.timerSeconds)) state.timerSeconds = data.timerSeconds;
      if (typeof data.currentStreak === 'number') state.currentStreak = data.currentStreak;
      if (typeof data.bestStreak === 'number') state.bestStreak = data.bestStreak;
      if (Array.isArray(data.customQuestions)) state.customQuestions = data.customQuestions;
      if (data.unlockedAchievements && typeof data.unlockedAchievements === 'object') {
        state.unlockedAchievements = data.unlockedAchievements;
      }
      if (typeof data.nightMode === 'boolean') {
        state.nightMode = data.nightMode;
        if (state.nightMode) document.body.classList.add('night-mode');
        else document.body.classList.remove('night-mode');
      }
      if (typeof data.learningMode === 'boolean') state.learningMode = data.learningMode;
      if (data.dailyChallenge && typeof data.dailyChallenge === 'object') {
        state.dailyChallenge = {
          lastPlayedDate: data.dailyChallenge.lastPlayedDate || null,
          dailyStreak: data.dailyChallenge.dailyStreak || 0,
          bestDailyStreak: data.dailyChallenge.bestDailyStreak || 0,
          lastQuestionId: data.dailyChallenge.lastQuestionId || null,
          lastCorrect: data.dailyChallenge.lastCorrect !== undefined ? data.dailyChallenge.lastCorrect : null,
        };
      }
      if (typeof data._mistakesFixed === 'number') state._mistakesFixed = data._mistakesFixed;
      await saveState();
      render();
      showInfoToast('✅ הנתונים שוחזרו בהצלחה!');
    } catch (err) {
      alert('שגיאה בקריאת הקובץ. ודא שזהו קובץ גיבוי תקין.');
      console.error(err);
    }
  };
  reader.readAsText(file);
}

function showInfoToast(msg) {
  const toast = document.createElement('div');
  toast.className = 'info-toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

// ============ MUSIC ENGINE (Millionaire-style tension) ============
const MusicEngine = {
  ctx: null,
  master: null,
  active: false,
  timers: [],
  loopId: null,
  oscillators: [],

  init() {
    if (this.ctx) return;
    try {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      this.ctx = new AudioCtx();
      this.master = this.ctx.createGain();
      this.master.gain.value = (state.musicStyle === 'off' || state.musicStyle === 'effects') ? 0 : this._volumeForStyle();
      this.master.connect(this.ctx.destination);
    } catch (e) {
      console.warn('Audio not supported:', e);
    }
  },

  _volumeForStyle() {
    // Effective music volume based on current style
    if (state.musicStyle === 'calm') return 0.16;
    if (state.musicStyle === 'tension') return 0.28;
    return 0; // off or effects - no background music
  },

  // Play a single tone with envelope
  tone(freq, start, dur, type = 'sine', peakGain = 0.25, attack = 0.02, release = 0.3) {
    if (!this.ctx || !this.master) return;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.value = 0;
    gain.gain.setValueAtTime(0, start);
    gain.gain.linearRampToValueAtTime(peakGain, start + attack);
    gain.gain.setValueAtTime(peakGain, start + dur - release);
    gain.gain.linearRampToValueAtTime(0, start + dur);
    osc.connect(gain);
    gain.connect(this.master);
    osc.start(start);
    osc.stop(start + dur + 0.05);
    this.oscillators.push(osc);
  },

  // Tension loop: Millionaire-style, pulsing heartbeat + minor chord pads
  playTensionLoop() {
    if (!this.ctx || !this.active) return;
    const now = this.ctx.currentTime;
    const bar = 4.0; // 4 second bar

    // Low drone (D1)
    this.tone(36.7, now, bar, 'sine', 0.18, 0.4, 0.4);
    this.tone(36.7, now, bar, 'triangle', 0.08, 0.4, 0.4);

    // Heartbeat pulses - 4 beats per bar
    for (let b = 0; b < 4; b++) {
      const beatTime = now + b;
      this.tone(55, beatTime, 0.25, 'sine', 0.3, 0.005, 0.15);
      this.tone(73.4, beatTime, 0.18, 'triangle', 0.15, 0.005, 0.12);
    }

    // Am chord first half
    this.tone(110, now + 0.1, 2.0, 'sawtooth', 0.035, 0.8, 0.6);
    this.tone(220, now + 0.1, 2.0, 'sawtooth', 0.022, 0.8, 0.6);
    this.tone(261.6, now + 0.1, 2.0, 'sawtooth', 0.018, 0.8, 0.6);
    this.tone(329.6, now + 0.1, 2.0, 'sawtooth', 0.014, 0.8, 0.6);

    // Dm chord second half
    this.tone(146.8, now + 2.1, 1.8, 'sawtooth', 0.035, 0.8, 0.6);
    this.tone(293.6, now + 2.1, 1.8, 'sawtooth', 0.022, 0.8, 0.6);
    this.tone(174.6, now + 2.1, 1.8, 'sawtooth', 0.018, 0.8, 0.6);
    this.tone(220, now + 2.1, 1.8, 'sawtooth', 0.014, 0.8, 0.6);

    // Sparse high tinkle
    this.tone(587.3, now + 1.0, 0.15, 'sine', 0.08, 0.005, 0.1);
    this.tone(440, now + 3.0, 0.15, 'sine', 0.06, 0.005, 0.1);

    const timerId = setTimeout(() => {
      this.oscillators = [];
      this.playTensionLoop();
    }, bar * 1000 - 50);
    this.timers.push(timerId);
  },

  // Calm loop: gentle C→F major chord pad, slow breathing rhythm
  playCalmLoop() {
    if (!this.ctx || !this.active) return;
    const now = this.ctx.currentTime;
    const bar = 8.0; // slow, breath-like

    // First half: C major chord (C, E, G, C)
    this.tone(130.8, now, 4.2, 'sine', 0.22, 1.2, 1.2);
    this.tone(164.8, now, 4.2, 'sine', 0.18, 1.2, 1.2);
    this.tone(196.0, now, 4.2, 'sine', 0.15, 1.2, 1.2);
    this.tone(261.6, now, 4.2, 'sine', 0.11, 1.2, 1.2);

    // Second half: F major chord (F, A, C, F) - gentle resolution
    this.tone(174.6, now + 4.0, 4.2, 'sine', 0.22, 1.2, 1.2);
    this.tone(220.0, now + 4.0, 4.2, 'sine', 0.18, 1.2, 1.2);
    this.tone(261.6, now + 4.0, 4.2, 'sine', 0.15, 1.2, 1.2);
    this.tone(349.2, now + 4.0, 4.2, 'sine', 0.11, 1.2, 1.2);

    // Soft shimmer
    this.tone(523.3, now + 2.0, 1.2, 'sine', 0.05, 0.4, 0.8);  // C5
    this.tone(783.9, now + 6.0, 1.2, 'sine', 0.04, 0.4, 0.8);  // G5

    const timerId = setTimeout(() => {
      this.oscillators = [];
      this.playCalmLoop();
    }, bar * 1000 - 50);
    this.timers.push(timerId);
  },

  // Dispatcher - picks the right loop based on current music style
  playLoop() {
    if (state.musicStyle === 'tension') return this.playTensionLoop();
    if (state.musicStyle === 'calm') return this.playCalmLoop();
    // 'off' or 'effects' - no background music loop
  },

  stop() {
    this.active = false;
    // Clear all scheduled timers
    this.timers.forEach(id => clearTimeout(id));
    this.timers = [];
    this.oscillators = [];
    // Note: we don't fade the master here because result sounds follow immediately.
    // Individual tones will finish their own envelopes. The master stays at its level
    // so result sounds can play on top. Next start() is a no-op if already started;
    // the pattern naturally ends because active=false prevents new loop scheduling.
  },

  start() {
    this.init();
    if (!this.ctx || this.active) return;
    // No background loop for 'off' or 'effects' modes
    if (state.musicStyle === 'off' || state.musicStyle === 'effects') return;
    // Resume context (required after user interaction)
    if (this.ctx.state === 'suspended') {
      this.ctx.resume();
    }
    // Ensure master gain at proper level
    if (this.master && this.ctx) {
      const now = this.ctx.currentTime;
      this.master.gain.cancelScheduledValues(now);
      this.master.gain.setValueAtTime(this._volumeForStyle(), now);
    }
    this.active = true;
    this.playLoop();
  },

  setMuted(muted) {
    if (!this.master || !this.ctx) return;
    const now = this.ctx.currentTime;
    this.master.gain.cancelScheduledValues(now);
    const target = muted ? 0 : this._volumeForStyle();
    this.master.gain.linearRampToValueAtTime(target, now + 0.15);
  },

  // Correct answer: happy, bouncy sound (plays in all modes except 'off')
  playCorrectSound() {
    this.init();
    if (!this.ctx || state.musicStyle === 'off') return;
    if (this.ctx.state === 'suspended') this.ctx.resume();
    const now = this.ctx.currentTime;
    // Make sure gain isn't muted for the sound
    if (this.master) {
      this.master.gain.cancelScheduledValues(now);
      this.master.gain.setValueAtTime(0.35, now);
    }
    // Happy bouncy chime: C-E-G-C (bright C major arpeggio, xylophone-like)
    // Using short, bright sine+triangle tones with slight echo via layered notes
    // Note 1: C5 (medium)
    this.tone(523.25, now, 0.12, 'sine', 0.28, 0.003, 0.09);
    this.tone(1046.5, now, 0.10, 'triangle', 0.08, 0.003, 0.07); // bright shimmer
    // Note 2: E5 (up a third)
    this.tone(659.25, now + 0.09, 0.12, 'sine', 0.28, 0.003, 0.09);
    this.tone(1318.5, now + 0.09, 0.10, 'triangle', 0.08, 0.003, 0.07);
    // Note 3: G5 (up a fifth)
    this.tone(783.99, now + 0.18, 0.14, 'sine', 0.3, 0.003, 0.10);
    this.tone(1568, now + 0.18, 0.12, 'triangle', 0.09, 0.003, 0.08);
    // Note 4: high C6 - triumphant finish, slightly louder and longer
    this.tone(1046.5, now + 0.28, 0.35, 'sine', 0.34, 0.003, 0.22);
    this.tone(2093, now + 0.28, 0.25, 'triangle', 0.10, 0.003, 0.18); // sparkle on top
    // Little "ding" at the end for joy
    this.tone(1568, now + 0.40, 0.25, 'sine', 0.15, 0.003, 0.20);
  },

  // Wrong answer: gentle, playful "oops" sound (not sad/dramatic)
  playWrongSound() {
    this.init();
    if (!this.ctx || state.musicStyle === 'off') return;
    if (this.ctx.state === 'suspended') this.ctx.resume();
    const now = this.ctx.currentTime;
    if (this.master) {
      this.master.gain.cancelScheduledValues(now);
      this.master.gain.setValueAtTime(0.32, now);
    }
    // Playful "boing" - descending but in a friendly cartoonish way
    // Quick descending glissando: D5 -> B4 (just two gentle notes)
    this.tone(587.33, now, 0.14, 'triangle', 0.25, 0.005, 0.09);       // D5
    this.tone(493.88, now + 0.10, 0.22, 'triangle', 0.28, 0.005, 0.15); // B4 (small drop, not dramatic)
    // Soft low "pop" as a fun cartoon touch
    this.tone(164.81, now + 0.08, 0.18, 'sine', 0.15, 0.003, 0.12);    // E3 - soft bass bump
  },
};

function setMusicStyle(style) {
  if (!['off', 'effects', 'calm', 'tension'].includes(style)) return;
  const wasPlaying = MusicEngine.active;
  state.musicStyle = style;
  // Keep musicMuted in sync for backward compat
  state.musicMuted = (style === 'off');
  saveState();

  // If currently in a game, restart the music engine with new style
  if (wasPlaying || state.currentView === 'question' || state.currentView === 'exam') {
    MusicEngine.stop();
    MusicEngine.start();
  }

  const styleNames = {
    off: '🔇 שקט מלא',
    effects: '🔔 רק אפקטים',
    calm: '🎵 מוזיקה רגועה',
    tension: '🎹 מוזיקת מתח',
  };
  showInfoToast(styleNames[style] || style);
  render();
}

function toggleMusicMute() {
  // Quick cycle through styles: off → effects → calm → tension → off
  const order = ['off', 'effects', 'calm', 'tension'];
  const currentIdx = order.indexOf(state.musicStyle);
  const nextStyle = order[(currentIdx + 1) % order.length];
  setMusicStyle(nextStyle);
}

// Generate a shuffled order of answer indices for a question
function generateAnswerOrder(numAnswers) {
  const arr = Array.from({ length: numAnswers }, (_, i) => i);
  // Fisher-Yates shuffle
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Ensure we have a valid shuffled order for the current question
function ensureAnswerOrder(numAnswers) {
  if (!state.currentAnswerOrder || state.currentAnswerOrder.length !== numAnswers) {
    state.currentAnswerOrder = generateAnswerOrder(numAnswers);
  }
  return state.currentAnswerOrder;
}

// Calculate difficulty for a question (automatic based on content)
function getQuestionDifficulty(q) {
  const qLen = q.q.length;
  const expLen = q.exp.length;
  const totalLen = qLen + expLen;

  // Thresholds tuned to the actual question corpus (median ~88, max ~165),
  // giving a roughly balanced split across easy/medium/hard.
  // Easy: short questions, simple answers
  if (totalLen < 85) return 'easy';
  // Medium: moderate length
  if (totalLen < 105) return 'medium';
  // Hard: long and detailed questions
  return 'hard';
}

// ============ STORAGE ============
async function loadState() {
  try {
    if (window.storage) {
      const result = await window.storage.get('quiz_app_state');
      if (result && result.value) {
        const saved = JSON.parse(result.value);
        state.answered = saved.answered || [];
        state.lastQuestions = saved.lastQuestions || [];
        if (saved.difficulty) state.difficulty = saved.difficulty;
        if (typeof saved.timerMode === 'boolean') state.timerMode = saved.timerMode;
        if ([10, 15, 20].includes(saved.timerSeconds)) state.timerSeconds = saved.timerSeconds;
        state.currentStreak = saved.currentStreak || 0;
        state.bestStreak = saved.bestStreak || 0;
        state.customQuestions = saved.customQuestions || [];
        state.unlockedAchievements = saved.unlockedAchievements || {};
        if (typeof saved.nightMode === 'boolean') state.nightMode = saved.nightMode;
        if (typeof saved.learningMode === 'boolean') state.learningMode = saved.learningMode;
        if (saved.dailyChallenge) {
          state.dailyChallenge = {
            lastPlayedDate: saved.dailyChallenge.lastPlayedDate || null,
            dailyStreak: saved.dailyChallenge.dailyStreak || 0,
            bestDailyStreak: saved.dailyChallenge.bestDailyStreak || 0,
            lastQuestionId: saved.dailyChallenge.lastQuestionId || null,
            lastCorrect: saved.dailyChallenge.lastCorrect !== undefined ? saved.dailyChallenge.lastCorrect : null,
          };
        }
        if (typeof saved._mistakesFixed === 'number') state._mistakesFixed = saved._mistakesFixed;
        if (typeof saved.musicMuted === 'boolean') state.musicMuted = saved.musicMuted;
        // Load music style, or migrate from legacy musicMuted
        if (['off', 'effects', 'calm', 'tension'].includes(saved.musicStyle)) {
          state.musicStyle = saved.musicStyle;
        } else if (typeof saved.musicMuted === 'boolean') {
          // Migration: if user had music muted before -> 'off', otherwise 'tension' (their old music)
          state.musicStyle = saved.musicMuted ? 'off' : 'tension';
        }
        if (typeof saved.selectedCategory === 'string') state.selectedCategory = saved.selectedCategory;
      }
    }
  } catch (e) {
    // First time - that's fine
  }

  // Apply night mode on load
  if (state.nightMode) {
    document.body.classList.add('night-mode');
  }
}

async function saveState() {
  try {
    if (window.storage) {
      await window.storage.set('quiz_app_state', JSON.stringify({
        answered: state.answered,
        lastQuestions: state.lastQuestions.slice(-30),
        difficulty: state.difficulty,
        timerMode: state.timerMode,
        timerSeconds: state.timerSeconds,
        currentStreak: state.currentStreak,
        bestStreak: state.bestStreak,
        customQuestions: state.customQuestions,
        unlockedAchievements: state.unlockedAchievements,
        nightMode: state.nightMode,
        learningMode: state.learningMode,
        dailyChallenge: state.dailyChallenge,
        _mistakesFixed: state._mistakesFixed || 0,
        musicMuted: state.musicMuted,
        musicStyle: state.musicStyle,
        selectedCategory: state.selectedCategory,
      }));
    }
  } catch (e) {
    console.error('Save error:', e);
  }
}

// ============ HELPERS ============
function getQuestionId(q) {
  return QUESTIONS.indexOf(q);
}

function pickRandomQuestion(category) {
  // Build category pool
  let catPool;
  if (category === 'mixed') {
    catPool = QUESTIONS.map((q, i) => i);
  } else {
    catPool = QUESTIONS.map((q, i) => ({ q, i })).filter(x => x.q.cat === category).map(x => x.i);
  }

  // Apply difficulty filter
  let pool = catPool;
  if (state.difficulty !== 'all') {
    pool = catPool.filter(i => getQuestionDifficulty(QUESTIONS[i]) === state.difficulty);

    // If no questions in this category match the difficulty:
    // - When a specific category is selected: respect the category and
    //   relax the difficulty filter (use all questions from that category).
    // - Only when 'mixed' is selected do we fall back to all questions
    //   matching the difficulty (which is already all questions in 'mixed').
    if (pool.length === 0) {
      if (category === 'mixed') {
        pool = QUESTIONS.map((q, i) => i).filter(i => getQuestionDifficulty(QUESTIONS[i]) === state.difficulty);
      } else {
        pool = catPool;
      }
    }
  }

  // Ultimate fallback: if still empty, use everything
  if (pool.length === 0) {
    pool = QUESTIONS.map((q, i) => i);
  }

  // Exclude recently answered questions to avoid repetition
  const recent = new Set(state.lastQuestions);
  let freshPool = pool.filter(i => !recent.has(i));

  // If all have been seen recently, use the full pool (cycle starts again)
  if (freshPool.length === 0) {
    freshPool = pool;
    state.lastQuestions = [];
  }

  const chosen = freshPool[Math.floor(Math.random() * freshPool.length)];
  state.lastQuestions.push(chosen);
  if (state.lastQuestions.length > 30) state.lastQuestions.shift();

  return chosen;
}

function getCategoryCount(category) {
  if (category === 'mixed') return QUESTIONS.length;
  return QUESTIONS.filter(q => q.cat === category).length;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
