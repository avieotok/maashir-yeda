// ============ WHEEL DRAG HANDLING ============
function attachWheelHandlers() {
  const container = document.getElementById('wheel-container');
  const wheel = document.getElementById('wheel');
  if (!container || !wheel) return;

  // Avoid double-binding by checking a marker
  if (container._wheelBound) return;
  container._wheelBound = true;

  let startAngle = 0;    // the angle between finger and center at the moment drag began
  let startRot = 0;      // the wheel rotation at drag start
  let isDragging = false;
  let lastAngle = 0;
  let lastTime = 0;
  let velocity = 0;      // deg per ms
  let momentumRaf = null;

  const cats = Object.entries(CATEGORIES);
  const n = cats.length;
  const anglePerCat = 360 / n;

  function getPointAngle(clientX, clientY) {
    const rect = container.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = clientX - cx;
    const dy = clientY - cy;
    // atan2 returns radians, 0 = right, -90 = up. Convert to degrees where 0 = up, 90 = right.
    return Math.atan2(dx, -dy) * 180 / Math.PI;
  }

  function normalizeAngleDelta(delta) {
    // Bring to -180..180 range for smooth wrap
    while (delta > 180) delta -= 360;
    while (delta < -180) delta += 360;
    return delta;
  }

  function onStart(clientX, clientY) {
    // cancel any running momentum
    if (momentumRaf) {
      cancelAnimationFrame(momentumRaf);
      momentumRaf = null;
    }
    isDragging = true;
    wheel.classList.add('dragging');
    startAngle = getPointAngle(clientX, clientY);
    startRot = state.wheelAngle || 0;
    lastAngle = startAngle;
    lastTime = performance.now();
    velocity = 0;
    lastTickIdx = getSelectedCatIdx();
    lastMicroVibrateRot = startRot; // for continuous ticking feedback
    // Strong vibrate on grab
    if (navigator.vibrate) navigator.vibrate(30);
  }

  let lastTickIdx = 0; // tracks which category was selected last, for per-tick vibration
  let lastMicroVibrateRot = 0; // last rotation value when we fired a micro-vibration

  function onMove(clientX, clientY) {
    if (!isDragging) return;
    const currentAngle = getPointAngle(clientX, clientY);
    const delta = normalizeAngleDelta(currentAngle - startAngle);
    const newRot = startRot + delta;
    state.wheelAngle = newRot;
    wheel.style.transform = `rotate(${newRot}deg)`;

    // Continuous subtle haptic feedback every ~8 degrees of rotation -
    // this gives a "ticking wheel" tactile feel as the user rotates.
    const MICRO_STEP = 8; // degrees
    if (Math.abs(newRot - lastMicroVibrateRot) >= MICRO_STEP) {
      if (navigator.vibrate) navigator.vibrate(10);
      lastMicroVibrateRot = newRot;
    }

    // Stronger haptic "click" when the selected category changes
    const curIdx = getSelectedCatIdx();
    if (curIdx !== lastTickIdx) {
      if (navigator.vibrate) navigator.vibrate(35);
      lastTickIdx = curIdx;
      // Reset micro-vibrate anchor so the next micro-tick is measured from here
      lastMicroVibrateRot = newRot;
    }

    updateWheelSelection();

    // track velocity for momentum
    const now = performance.now();
    const dt = now - lastTime;
    if (dt > 0) {
      const instDelta = normalizeAngleDelta(currentAngle - lastAngle);
      velocity = instDelta / dt;
    }
    lastAngle = currentAngle;
    lastTime = now;
  }

  function onEnd() {
    if (!isDragging) return;
    isDragging = false;
    wheel.classList.remove('dragging');
    startMomentumOrSnap();
  }

  function startMomentumOrSnap() {
    // If velocity is significant, do momentum; otherwise snap immediately
    if (Math.abs(velocity) > 0.05) {
      momentumStep();
    } else {
      snapToNearest();
    }
  }

  function momentumStep() {
    if (!isDragging) {
      // Apply velocity to rotation, with friction
      const friction = 0.94;
      velocity *= friction;
      state.wheelAngle = (state.wheelAngle || 0) + velocity * 16; // 16ms frame
      wheel.style.transform = `rotate(${state.wheelAngle}deg)`;

      // Vibrate when passing from one category to the next during momentum
      const curIdx = getSelectedCatIdx();
      if (curIdx !== lastTickIdx) {
        if (navigator.vibrate) navigator.vibrate(20);
        lastTickIdx = curIdx;
      }

      updateWheelSelection();
      if (Math.abs(velocity) > 0.02) {
        momentumRaf = requestAnimationFrame(momentumStep);
      } else {
        snapToNearest();
      }
    }
  }

  function snapToNearest() {
    // Find nearest category angle (multiples of anglePerCat)
    // The visual angle of each icon i is (i*anglePerCat + rotation) mod 360.
    // We want the nearest one to 0 deg (top).
    // Equivalent: find i minimizing |(i*anglePerCat + rot) mod 360 - 0|
    // Simpler: compute what `rot` should be so that (i*anglePerCat + rot) mod 360 = 0
    //        -> rot = -i*anglePerCat (for each i)
    // But we want to be close to current rotation. Find nearest -i*anglePerCat.
    const rot = state.wheelAngle || 0;
    // Normalize rot to -180..180
    let r = rot % 360;
    if (r > 180) r -= 360;
    if (r < -180) r += 360;

    // Find best target (multiple of anglePerCat) closest to r
    let bestTarget = 0;
    let bestDiff = Infinity;
    for (let i = 0; i < n; i++) {
      const target = -i * anglePerCat;
      // wrap target to -180..180
      let t = target % 360;
      if (t > 180) t -= 360;
      if (t < -180) t += 360;
      const diff = Math.abs(normalizeAngleDelta(t - r));
      if (diff < bestDiff) {
        bestDiff = diff;
        bestTarget = t;
      }
    }

    // Animate smoothly via CSS transition to the target
    // Keep continuity: adjust bestTarget by full-turn multiples to be close to rot
    let finalAngle = bestTarget + (rot - r);
    // Update state and re-render so selectedIdx updates too
    state.wheelAngle = finalAngle;
    wheel.classList.remove('dragging'); // ensure transition is on
    wheel.style.transform = `rotate(${finalAngle}deg)`;

    // Strong haptic feedback pattern on snap (vibrate-pause-vibrate for noticeable "click")
    if (navigator.vibrate) navigator.vibrate([50, 30, 40]);

    // After animation completes, re-render to update the side panel's selection
    setTimeout(() => {
      updateWheelSelection();
      // Light re-render only if we're still on home
      if (state.currentView === 'home') {
        // Just update the DOM without full re-render to avoid losing the transform
        const sidePanel = document.querySelector('.wheel-side-panel');
        if (sidePanel) {
          const sel = getSelectedCatFromAngle();
          if (sel) {
            const emoji = sidePanel.querySelector('.wheel-side-emoji');
            const name = sidePanel.querySelector('.wheel-side-name');
            const play = sidePanel.querySelector('.wheel-side-play');
            if (emoji) emoji.textContent = sel.cat.emoji;
            if (name) name.textContent = sel.cat.name;
            if (play) play.setAttribute('onclick', `startQuiz('${sel.key}')`);
          }
        }
        // Update icon highlighting
        const selIdx = getSelectedCatIdx();
        document.querySelectorAll('.wheel-icon').forEach(el => {
          const idx = parseInt(el.getAttribute('data-cat-idx'));
          el.classList.toggle('selected', idx === selIdx);
        });
      }
    }, 420);
  }

  function getSelectedCatIdx() {
    const rot = state.wheelAngle || 0;
    let best = 0;
    let bestDiff = Infinity;
    for (let i = 0; i < n; i++) {
      let v = (i * anglePerCat + rot) % 360;
      if (v > 180) v -= 360;
      if (v < -180) v += 360;
      const diff = Math.abs(v);
      if (diff < bestDiff) { bestDiff = diff; best = i; }
    }
    return best;
  }

  function getSelectedCatFromAngle() {
    const idx = getSelectedCatIdx();
    if (idx == null || !cats[idx]) return null;
    return { key: cats[idx][0], cat: cats[idx][1] };
  }

  function updateWheelSelection() {
    const sel = getSelectedCatFromAngle();
    if (sel) {
      window._wheelSelCat = sel.key;
      // Update side panel live
      const sidePanel = document.querySelector('.wheel-side-panel');
      if (sidePanel) {
        const emoji = sidePanel.querySelector('.wheel-side-emoji');
        const name = sidePanel.querySelector('.wheel-side-name');
        const play = sidePanel.querySelector('.wheel-side-play');
        if (emoji && emoji.textContent !== sel.cat.emoji) emoji.textContent = sel.cat.emoji;
        if (name && name.textContent !== sel.cat.name) name.textContent = sel.cat.name;
        if (play) play.setAttribute('onclick', `startQuiz('${sel.key}')`);
      }
      // Update selected icon
      const selIdx = getSelectedCatIdx();
      document.querySelectorAll('.wheel-icon').forEach(el => {
        const idx = parseInt(el.getAttribute('data-cat-idx'));
        el.classList.toggle('selected', idx === selIdx);
      });
    }
  }

  // Bind events - using both touch (for iOS) and pointer (for other devices)
  container.addEventListener('touchstart', (e) => {
    // Don't start drag if touching the center hub button
    if (e.target.closest('.wheel-hub')) return;
    const t = e.touches[0];
    onStart(t.clientX, t.clientY);
  }, { passive: true });

  container.addEventListener('touchmove', (e) => {
    if (!isDragging) return;
    if (e.cancelable) e.preventDefault(); // prevent page scroll while dragging wheel
    const t = e.touches[0];
    onMove(t.clientX, t.clientY);
  }, { passive: false });

  container.addEventListener('touchend', onEnd, { passive: true });
  container.addEventListener('touchcancel', onEnd, { passive: true });

  // Mouse events (for desktop testing)
  container.addEventListener('mousedown', (e) => {
    // Don't drag if clicking center hub
    if (e.target.closest('.wheel-hub')) return;
    e.preventDefault();
    onStart(e.clientX, e.clientY);
    const moveHandler = (ev) => onMove(ev.clientX, ev.clientY);
    const upHandler = () => {
      onEnd();
      document.removeEventListener('mousemove', moveHandler);
      document.removeEventListener('mouseup', upHandler);
    };
    document.addEventListener('mousemove', moveHandler);
    document.addEventListener('mouseup', upHandler);
  });

  // Init: sync window._wheelSelCat with current state
  updateWheelSelection();
}

function renderHome() {
  const totalAnswered = state.answered.length;
  const correctCount = state.answered.filter(a => a.correct).length;
  const accuracy = totalAnswered > 0 ? Math.round((correctCount / totalAnswered) * 100) : 0;
  const mistakeCount = getMistakeQuestionIds().length;

  // Categories on the wheel
  const cats = Object.entries(CATEGORIES);
  const n = cats.length;
  const anglePerCat = 360 / n;

  // Each icon sits at its base angle (i * anglePerCat), starting from top (-90 in screen coords)
  // The wheel rotates as a whole. The category at the "top" (0 deg from vertical) is selected.
  const rot = state.wheelAngle || 0;
  // Figure out which category is currently at top
  // The icon at base angle (i * anglePerCat) ends up at visual angle (i * anglePerCat + rot)
  // We want the one whose (i * anglePerCat + rot) mod 360 is closest to 0 (top)
  let selectedIdx = 0;
  let bestDiff = Infinity;
  for (let i = 0; i < n; i++) {
    const visualAngle = (i * anglePerCat + rot) % 360;
    const diff = Math.min(Math.abs(visualAngle), Math.abs(visualAngle - 360));
    if (diff < bestDiff) {
      bestDiff = diff;
      selectedIdx = i;
    }
  }
  const [selKey, selCat] = cats[selectedIdx];

  const wheelIcons = cats.map(([key, cat], i) => {
    const a = i * anglePerCat;
    const isSelected = i === selectedIdx;
    return `
      <div class="wheel-icon ${isSelected ? 'selected' : ''}"
           style="--a: ${a}deg;"
           data-cat-key="${key}"
           data-cat-idx="${i}">
        <span>${cat.emoji}</span>
      </div>
    `;
  }).join('');

  // Difficulty + timer compact rows
  const diffOpts = [
    { k: 'all', e: '🎲', cls: '' },
    { k: 'easy', e: '🟢', cls: 'diff-easy' },
    { k: 'medium', e: '🟡', cls: 'diff-med' },
    { k: 'hard', e: '🔴', cls: 'diff-hard' },
  ];
  const timerBtns = [
    { v: 0, label: '🧘' },
    { v: 10, label: '10' },
    { v: 15, label: '15' },
    { v: 20, label: '20' },
  ];

  return `
    <div class="home-v2">
      ${state.bestStreak > 0 || totalAnswered > 0 ? `
        <div class="home-v2-streak">
          ${totalAnswered > 0 ? `ענית על <strong>${totalAnswered}</strong> שאלות · דיוק <strong>${accuracy}%</strong>` : ''}
          ${state.bestStreak > 0 ? `${totalAnswered > 0 ? ' · ' : ''}🔥 שיא: <strong>${state.bestStreak}</strong>` : ''}
        </div>
      ` : ''}

      ${renderDailyCardCompact()}

      <div class="wheel-area">
        <div class="wheel-container" id="wheel-container">
          <div class="wheel-pointer"></div>
          <div class="wheel" id="wheel" style="transform: rotate(${rot}deg);">
            ${wheelIcons}
          </div>
          <button class="wheel-hub" onclick="startQuiz(window._wheelSelCat || 'mixed')">
            <span class="wheel-hub-icon">▶</span>
            <span class="wheel-hub-text">התחל</span>
          </button>
        </div>

        <div class="wheel-side-panel">
          <div class="wheel-side-emoji">${selCat.emoji}</div>
          <div class="wheel-side-label">תחום נבחר</div>
          <div class="wheel-side-name">${selCat.name}</div>
          <button class="wheel-side-play" onclick="startQuiz('${selKey}')">
            התחל ▶
          </button>
        </div>
      </div>

      <div class="wheel-hint">👆 סובב את הגלגל עם האצבע · או בחר הגדרות למטה</div>

      <button class="mixed-btn" onclick="startQuiz('mixed')">
        <span class="mixed-btn-icon">🎲</span>
        <span class="mixed-btn-text">הכל מעורב</span>
        <span class="mixed-btn-sub">${QUESTIONS.length} שאלות מכל התחומים</span>
      </button>

      <div class="wheel-settings-row">
        <div class="wheel-setting-group">
          <div class="wheel-setting-title">🎯 קושי</div>
          <div class="wheel-setting-btns cols-4">
            ${diffOpts.map(d => `
              <button class="wheel-setting-btn ${state.difficulty === d.k ? 'active ' + d.cls : ''}"
                      onclick="setDifficulty('${d.k}')">${d.e}</button>
            `).join('')}
          </div>
        </div>

        <div class="wheel-setting-group">
          <div class="wheel-setting-title">⏱️ טיימר</div>
          <div class="wheel-setting-btns cols-4">
            ${timerBtns.map(t => {
              const isActive = (t.v === 0 && !state.timerMode) || (t.v > 0 && state.timerMode && state.timerSeconds === t.v);
              const onclick = t.v === 0 ? 'disableTimer()' : `setTimerSeconds(${t.v})`;
              return `<button class="wheel-setting-btn ${isActive ? 'active' : ''}" onclick="${onclick}">${t.label}</button>`;
            }).join('')}
          </div>
        </div>
      </div>

      <div class="special-modes-compact">
        <button class="special-btn-compact exam" onclick="startExam()">
          <span class="special-btn-compact-icon">📊</span>
          <span class="special-btn-compact-label">מבחן סיום</span>
        </button>

        </button>
        <button class="special-btn-compact mistakes" onclick="switchView('mistakes')">
          <span class="special-btn-compact-icon">🔄</span>
          <span class="special-btn-compact-label">${mistakeCount > 0 ? `טעויות (${mistakeCount})` : 'ללא טעויות'}</span>
        </button>
        <button class="special-btn-compact group-mode" onclick="switchView('group-menu')">
          <span class="special-btn-compact-icon">👥</span>
          <span class="special-btn-compact-label">משחק קבוצתי</span>
        </button>
      </div>
    </div>
  `;
}

function setSelectedCategory(cat) {
  state.selectedCategory = cat;
  saveState();
  render();
}

function selectArcCategory(cat) {
  // Toggle: clicking the same icon again clears the selection
  if (state.arcSelectedCat === cat) {
    state.arcSelectedCat = null;
  } else {
    state.arcSelectedCat = cat;
  }
  render();
  // Haptic feedback
  if (navigator.vibrate) navigator.vibrate(15);
}

function renderQuestion() {
  const q = QUESTIONS[state.currentQuestion];
  // Safety: if current question is invalid, go back home instead of crashing
  if (!q) {
    console.warn('Invalid currentQuestion index:', state.currentQuestion);
    setTimeout(() => goHome(), 50);
    return '<div style="padding:40px; text-align:center;">טוען...</div>';
  }
  const category = CATEGORIES[q.cat];
  const answered = state.answerGiven !== null;
  const totalAnsweredInCategory = state.answered.filter(a =>
    state.currentCategory === 'mixed' ? true : a.category === state.currentCategory
  ).length;
  const difficulty = getQuestionDifficulty(q);
  const diffLabel = { easy: '🟢 קל', medium: '🟡 בינוני', hard: '🔴 קשה' }[difficulty];

  // Learning mode: show explanation first, then question
  if (state.learningMode && state.showingExplanation && !answered) {
    return `
      <button class="back-btn" onclick="goHome()">← חזרה לתחומים</button>

      <div class="question-area">
        <div class="question-meta">
          <span class="question-category">${category.emoji} ${category.name}</span>
          <div class="meta-right">
            <span class="difficulty-badge diff-${difficulty}">${diffLabel}</span>
            <span class="learning-badge">📖 מצב למידה</span>
          </div>
        </div>

        <div class="learning-info-card">
          <div class="learning-info-label">💡 קרא את העובדה:</div>
          <div class="learning-info-text">${q.exp}</div>
        </div>

        <button class="learning-next-btn" onclick="showLearningQuestion()">
          קראתי, תן לי את השאלה ⬅
        </button>
      </div>
    `;
  }

  return `
    <button class="back-btn" onclick="goHome()">← חזרה לתחומים</button>

    <div class="question-area">
      <div class="question-meta">
        <span class="question-category">${state.dailyMode ? '📅 אתגר יומי' : (state.mistakesMode ? '🔄 תרגול טעויות' : category.emoji + ' ' + category.name)}</span>
        <div class="meta-right">
          ${state.currentStreak >= 2 ? `<span class="streak-badge">🔥 ${state.currentStreak}</span>` : ''}
          <span class="difficulty-badge diff-${difficulty}">${diffLabel}</span>
          ${state.learningMode && !state.dailyMode && !state.mistakesMode ? `<span class="learning-badge">📖 למידה</span>` : ''}
          ${state.mistakesMode ? `<span class="learning-badge" style="background: rgba(239,68,68,0.15); color: #dc2626;">${state.mistakesQueue.length} נותרו</span>` : ''}
          ${!state.dailyMode && !state.mistakesMode ? `<span class="question-counter">שאלה ${totalAnsweredInCategory + 1}</span>` : ''}
        </div>
      </div>

      ${!state.examMode && !state.dailyMode && !state.mistakesMode && (state.quizAnswered > 0 || state.quizLength) ? `
        <div class="quiz-progress-bar">
          <div class="quiz-progress-item">
            <span>📝</span>
            <span class="quiz-progress-num">${state.quizAnswered}${state.quizLength ? '/' + state.quizLength : ''}</span>
            <span>${state.quizLength ? '' : 'שאלות'}</span>
          </div>
          <div class="quiz-progress-item">
            <span>✓</span>
            <span class="quiz-progress-num">${state.quizCorrect}</span>
            <span>נכונות</span>
          </div>
          <div class="quiz-progress-item">
            <span>🏅</span>
            <span class="quiz-progress-num quiz-progress-score">${state.quizScore}</span>
            <span>נקודות</span>
          </div>
        </div>
      ` : ''}

      ${state.timerMode && !answered && !state.learningMode ? `
        <div class="timer-display" id="timer-display">
          <div class="timer-circle ${state.timeLeft <= Math.max(3, Math.floor((state.timerSeconds || 10) * 0.3)) ? 'urgent' : ''}">
            <svg viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="45" class="timer-bg"/>
              <circle cx="50" cy="50" r="45" class="timer-progress"
                style="stroke-dasharray: ${2 * Math.PI * 45};
                       stroke-dashoffset: ${2 * Math.PI * 45 * (1 - state.timeLeft / (state.timerSeconds || 10))};"/>
            </svg>
            <div class="timer-text">${state.timeLeft}</div>
          </div>
        </div>
      ` : ''}

      <div class="question-card">
        <h2 class="question-text">${q.q}</h2>
      </div>

      <div class="answers">
        ${(() => {
          const order = ensureAnswerOrder(q.a.length);
          const letters = q.a.length === 2 ? ['א', 'ב'] : ['א', 'ב', 'ג', 'ד'];
          const userWrong = answered && state.answerGiven !== q.correct;
          return order.map((origIdx, displayPos) => {
            const ans = q.a[origIdx];
            let cls = 'answer-btn';
            if (answered) {
              if (origIdx === q.correct) cls += userWrong ? ' correct-highlight' : ' correct';
              else if (origIdx === state.answerGiven) cls += ' wrong';
            }
            return `
              <button class="${cls}"
                      onclick="answerQuestion(${origIdx})"
                      ${answered ? 'disabled' : ''}>
                <span class="answer-letter">${letters[displayPos]}</span>
                <span>${ans}</span>
              </button>
            `;
          }).join('');
        })()}
      </div>

      ${answered ? `
        <div class="explanation">
          <div class="explanation-label">ההסבר</div>
          <div class="explanation-text">${q.exp}</div>
        </div>

        <div class="auto-advance">
          <div class="auto-advance-label">מיד לשאלה הבאה...</div>
          <div class="auto-advance-bar">
            <div class="auto-advance-fill"></div>
          </div>
          <button class="skip-btn" onclick="nextQuestion()">עבור מיד</button>
        </div>
      ` : ''}
    </div>

    ${!state.examMode && !state.dailyMode && !state.mistakesMode ? `
      <div class="in-game-controls">
        <div class="in-game-row">
          <span class="in-game-label">🎯 קושי:</span>
          <div class="in-game-btns">
            <button class="in-game-btn ${state.difficulty === 'all' ? 'active' : ''}" onclick="setDifficulty('all')" title="הכל">🎲 הכל</button>
            <button class="in-game-btn ${state.difficulty === 'easy' ? 'active diff-easy' : ''}" onclick="setDifficulty('easy')" title="קל">🟢 קל</button>
            <button class="in-game-btn ${state.difficulty === 'medium' ? 'active diff-med' : ''}" onclick="setDifficulty('medium')" title="בינוני">🟡 בינ'</button>
            <button class="in-game-btn ${state.difficulty === 'hard' ? 'active diff-hard' : ''}" onclick="setDifficulty('hard')" title="קשה">🔴 קשה</button>
          </div>
        </div>
        <div class="in-game-row">
          <span class="in-game-label">⏱️ טיימר:</span>
          <div class="in-game-btns">
            <button class="in-game-btn ${!state.timerMode ? 'active' : ''}" onclick="disableTimer()" title="ללא טיימר">🧘 ללא</button>
            <button class="in-game-btn ${state.timerMode && state.timerSeconds === 10 ? 'active' : ''}" onclick="setTimerSeconds(10)" title="10 שניות">10 שנ'</button>
            <button class="in-game-btn ${state.timerMode && state.timerSeconds === 15 ? 'active' : ''}" onclick="setTimerSeconds(15)" title="15 שניות">15 שנ'</button>
            <button class="in-game-btn ${state.timerMode && state.timerSeconds === 20 ? 'active' : ''}" onclick="setTimerSeconds(20)" title="20 שניות">20 שנ'</button>
          </div>
        </div>
        <button class="in-game-mixed-btn" onclick="startQuiz('mixed')">
          🎲 התחל מחדש · הכל מעורב
        </button>
        ${!state.quizLength && state.quizAnswered > 0 ? `
          <button class="quiz-finish-btn" onclick="confirmFinishQuiz()">
            🏁 סיים חידון וראה ניקוד (${state.quizScore} נק׳)
          </button>
        ` : ''}
      </div>
    ` : ''}
  `;
}

function renderDailyCard() {
  const today = getTodayString();
  const dc = state.dailyChallenge;
  const playedToday = dc.lastPlayedDate === today;
  const streak = dc.dailyStreak || 0;
  const best = dc.bestDailyStreak || 0;

  if (playedToday) {
    const resultEmoji = dc.lastCorrect ? '✅' : '❌';
    const resultText = dc.lastCorrect ? 'ענית נכון!' : 'אולי מחר...';
    return `
      <div class="daily-card done">
        <div class="daily-card-top">
          <span class="daily-card-icon">${resultEmoji}</span>
          <div class="daily-card-title">האתגר היומי הושלם</div>
        </div>
        <div class="daily-card-sub">${resultText} חזור מחר לאתגר חדש</div>
        <div class="daily-card-streak-row">
          <div class="daily-streak-info">
            🔥 ${streak} ימים רצופים${best > streak ? ` · שיא: ${best}` : ''}
          </div>
        </div>
      </div>
    `;
  }

  // Not played today
  return `
    <div class="daily-card">
      <div class="daily-card-top">
        <span class="daily-card-icon">📅</span>
        <div class="daily-card-title">האתגר היומי</div>
      </div>
      <div class="daily-card-sub">שאלה מיוחדת אחת ליום — אל תפספס!</div>
      <div class="daily-card-streak-row">
        <div class="daily-streak-info">
          ${streak > 0 ? `🔥 ${streak} ימים רצופים${best > streak ? ` · שיא: ${best}` : ''}` : '✨ תתחיל רצף חדש'}
        </div>
        <button class="daily-play-btn" onclick="playDailyChallenge()">שחק עכשיו ←</button>
      </div>
    </div>
  `;
}

function renderMistakes() {
  const mistakeIds = getMistakeQuestionIds();

  if (mistakeIds.length === 0) {
    return `
      <button class="back-btn" onclick="goHome()">← חזרה</button>
      <div class="empty-mistakes">
        <div class="empty-mistakes-icon">🎉</div>
        <div class="empty-mistakes-title">אין טעויות כרגע!</div>
        <div class="empty-mistakes-sub">
          ${state.answered.length === 0
            ? 'התחל לשחק ונעקוב אחרי השאלות שטעית בהן'
            : 'כל הכבוד — ענית נכון על כל השאלות האחרונות'}
        </div>
      </div>
    `;
  }

  return `
    <button class="back-btn" onclick="goHome()">← חזרה</button>

    <div class="mistakes-header">
      <div class="mistakes-header-title">🔄 סקירת טעויות</div>
      <div class="mistakes-header-sub">${mistakeIds.length} שאלות שטעית בהן — תרגל אותן שוב</div>
    </div>

    <button class="mistakes-action-btn" onclick="startMistakesPractice()">
      🎯 התחל לתרגל את כל הטעויות
    </button>

    ${mistakeIds.map(id => {
      const q = QUESTIONS[id];
      if (!q) return '';
      const cat = CATEGORIES[q.cat];
      const correctAnswer = q.a[q.correct];
      return `
        <div class="mistake-item">
          <div class="mistake-cat">${cat ? cat.emoji + ' ' + cat.name : q.cat}</div>
          <div class="mistake-q">${escapeHtml(q.q)}</div>
          <div class="mistake-correct-label">✅ התשובה הנכונה:</div>
          <div class="mistake-correct-ans">${escapeHtml(correctAnswer)}</div>
          <div class="mistake-exp">${escapeHtml(q.exp)}</div>
        </div>
      `;
    }).join('')}
  `;
}

function renderStats() {
  const total = state.answered.length;

  const accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;

  // Per category stats
  const catStats = {};
  Object.keys(CATEGORIES).forEach(key => {
    const inCat = state.answered.filter(a => a.category === key);

      total: inCat.length,
      correct: inCat.filter(a => a.correct).length,

  });

  const maxCatCount = Math.max(1, ...Object.values(catStats).map(s => s.total));

  if (total === 0) {
    return `
      <div class="empty-state">
        <div class="empty-icon">🎯</div>

function renderStrengthsWeaknesses(catStats) {
  // Rank categories with at least 5 answers
  const ranked = Object.entries(CATEGORIES)
    .map(([key, cat]) => {
      const s = catStats[key];
      const acc = s.total > 0 ? (s.correct / s.total) * 100 : 0;
      return { key, cat, total: s.total, acc };
    })
    .filter(r => r.total >= 5);

  if (ranked.length < 2) return '';

  ranked.sort((a, b) => b.acc - a.acc);
  const best = ranked[0];
  const worst = ranked[ranked.length - 1];

  if (best.key === worst.key) return '';

  return `
    <div class="stats-section">
      <div class="strength-section">
        <div class="insight-title">💪 התחום החזק שלך</div>
        <div class="insight-sub">
          <strong>${best.cat.emoji} ${best.cat.name}</strong> — דיוק של ${Math.round(best.acc)}% (${best.total} שאלות). כל הכבוד!
        </div>
      </div>
      <div class="weakness-section">
        <div class="insight-title">🎯 תחום לשיפור</div>
        <div class="insight-sub">
          <strong>${worst.cat.emoji} ${worst.cat.name}</strong> — דיוק של ${Math.round(worst.acc)}% (${worst.total} שאלות). תתרגל אותו בפעם הבאה!
        </div>
      </div>
    </div>
  `;
}

function triggerImport() {
  const input = document.getElementById('import-file-input');
  if (input) input.click();
}

function handleImportFile(event) {
  const file = event.target.files[0];
  if (file) importData(file);
  event.target.value = ''; // reset so same file can be picked again
}

function renderExam() {
  const q = QUESTIONS[state.currentQuestion];
  const category = CATEGORIES[q.cat];
  const answered = state.answerGiven !== null;
  const progress = ((state.examIndex + 1) / state.examQuestions.length) * 100;

  return `
    <button class="back-btn" onclick="confirmExitExam()">← יציאה מהמבחן</button>

    <div class="exam-progress-bar">
      <div class="exam-progress-fill" style="width: ${progress}%"></div>
    </div>

    <div class="question-area">
      <div class="question-meta">
        <span class="question-category">${category.emoji} ${category.name}</span>
        <span class="exam-counter">📊 שאלה ${state.examIndex + 1} מתוך ${state.examQuestions.length}</span>
      </div>

      <div class="question-card">
        <h2 class="question-text">${q.q}</h2>
      </div>

      <div class="answers">
        ${(() => {
          const order = ensureAnswerOrder(q.a.length);
          const letters = q.a.length === 2 ? ['א', 'ב'] : ['א', 'ב', 'ג', 'ד'];
          const userWrong = answered && state.answerGiven !== q.correct;
          return order.map((origIdx, displayPos) => {
            const ans = q.a[origIdx];
            let cls = 'answer-btn';
            if (answered) {
              if (origIdx === q.correct) cls += userWrong ? ' correct-highlight' : ' correct';
              else if (origIdx === state.answerGiven) cls += ' wrong';
            }
            return `
              <button class="${cls}"
                      onclick="answerQuestion(${origIdx})"
                      ${answered ? 'disabled' : ''}>
                <span class="answer-letter">${letters[displayPos]}</span>
                <span>${ans}</span>
              </button>
            `;
          }).join('');
        })()}
      </div>

      ${answered ? `
        <div class="explanation">
          <div class="explanation-label">ההסבר</div>
          <div class="explanation-text">${q.exp}</div>
        </div>

        <div class="auto-advance">
          <div class="auto-advance-label">
            ${state.examIndex + 1 < state.examQuestions.length ? 'שאלה הבאה...' : 'מציג תוצאות...'}
          </div>
          <div class="auto-advance-bar">
            <div class="auto-advance-fill"></div>
          </div>
        </div>
      ` : ''}
    </div>
  `;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function addCustomQuestion() {
  const q = document.getElementById('custom-q').value.trim();
  const a1 = document.getElementById('custom-a1').value.trim();
  const a2 = document.getElementById('custom-a2').value.trim();
  const exp = document.getElementById('custom-exp').value.trim() || 'שאלה אישית';

  if (!q || !a1 || !a2) {
    alert('אנא מלא לפחות שאלה ושתי תשובות');
    return;
  }

  state.customQuestions.push({
    q: q,
    a: [a1, a2],
    correct: 0,
    exp: exp,
    cat: 'custom',
  });

  saveState();
  render();

  // Check for custom question achievements
  const newAch = checkAchievements();
  if (newAch.length > 0) {
    newAch.forEach((ach, idx) => {
      setTimeout(() => showAchievementUnlock(ach), idx * 800);
    });
    saveState();
  }
}

function deleteCustomQuestion(index) {
  if (confirm('למחוק את השאלה הזו?')) {
    state.customQuestions.splice(index, 1);
    saveState();
    render();
  }
}

function startCustomQuiz() {
  if (state.customQuestions.length === 0) return;
  // Initialize custom quiz state
  state.customQuizMode = true;
  state.customQuizIndex = 0;
  state.answerGiven = null;
  state.currentAnswerOrder = null;
  state.currentView = 'custom-play';
  render();
  MusicEngine.start();
}

function customAnswerQuestion(answerIndex) {
  if (state.answerGiven !== null) return;

  MusicEngine.stop();

  const cq = state.customQuestions[state.customQuizIndex];
  const isCorrect = answerIndex === cq.correct;

  state.answerGiven = answerIndex;

  if (isCorrect) {
    showCorrectFeedback();
    MusicEngine.playCorrectSound();
  } else {
    showWrongFeedback();
    MusicEngine.playWrongSound();
  }

  if (navigator.vibrate) {
    navigator.vibrate(isCorrect ? [100] : [150, 80, 150]);
  }

  render();

  // Auto-advance
  if (autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
  autoAdvanceTimer = setTimeout(() => {
    nextCustomQuestion();
  }, 2000);
}

function nextCustomQuestion() {
  if (autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
  state.customQuizIndex++;

  if (state.customQuizIndex >= state.customQuestions.length) {
    // Done - back to custom questions view
    state.customQuizMode = false;
    state.customQuizIndex = 0;
    state.currentView = 'custom-questions';
    MusicEngine.stop();
    alert('סיימת את כל השאלות האישיות שלך! 🎉');
    render();
  } else {
    state.answerGiven = null;
  state.currentAnswerOrder = null;
    render();
    MusicEngine.start();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function renderCustomPlay() {
  const cq = state.customQuestions[state.customQuizIndex];
  const answered = state.answerGiven !== null;

  return `
    <button class="back-btn" onclick="exitCustomQuiz()">← יציאה</button>

    <div class="question-area">
      <div class="question-meta">
        <span class="question-category">🎁 שאלה אישית</span>
        <span class="question-counter">${state.customQuizIndex + 1} / ${state.customQuestions.length}</span>
      </div>

      <div class="question-card">
        <h2 class="question-text">${cq.q}</h2>
      </div>

      <div class="answers">
        ${(() => {
          const order = ensureAnswerOrder(cq.a.length);
          const letters = ['א', 'ב'];
          const userWrong = answered && state.answerGiven !== cq.correct;
          return order.map((origIdx, displayPos) => {
            const ans = cq.a[origIdx];
            let cls = 'answer-btn';
            if (answered) {
              if (origIdx === cq.correct) cls += userWrong ? ' correct-highlight' : ' correct';
              else if (origIdx === state.answerGiven) cls += ' wrong';
            }
            return `
              <button class="${cls}"
                      onclick="customAnswerQuestion(${origIdx})"
                      ${answered ? 'disabled' : ''}>
                <span class="answer-letter">${letters[displayPos]}</span>
                <span>${ans}</span>
              </button>
            `;
          }).join('');
        })()}
      </div>

      ${answered ? `
        <div class="explanation">
          <div class="explanation-label">ההסבר</div>
          <div class="explanation-text">${cq.exp}</div>
        </div>

        <div class="auto-advance">
          <div class="auto-advance-label">שאלה הבאה...</div>
          <div class="auto-advance-bar">
            <div class="auto-advance-fill"></div>
          </div>
        </div>
      ` : ''}
    </div>
  `;
}

function exitCustomQuiz() {
  if (autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
  state.customQuizMode = false;
  state.customQuizIndex = 0;
  state.currentView = 'custom-questions';
  render();
}

// ============ ACTIONS ============
function setDifficulty(level) {
  // Cancel any pending auto-advance from a previous answer
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }

  const prevDifficulty = state.difficulty;
  state.difficulty = level;
  saveState();

  // If we're in the middle of an un-answered question and difficulty changed,
  // swap the question to one matching the new difficulty (if we are in regular quiz mode).
  if (state.currentView === 'question' &&
      state.answerGiven === null &&
      !state.examMode && !state.dailyMode && !state.mistakesMode &&
      prevDifficulty !== level) {

    // Check if the current category has questions at this difficulty
    const cat = state.currentCategory || 'mixed';
    if (cat !== 'mixed' && level !== 'all') {
      const available = QUESTIONS.filter(q => q.cat === cat && getQuestionDifficulty(q) === level).length;
      if (available === 0) {
        const catName = (CATEGORIES[cat] && CATEGORIES[cat].name) || cat;
        const levelName = { easy: 'קלות', medium: 'בינוניות', hard: 'קשות' }[level] || level;
        // Keep the user's chosen category; just inform them that the difficulty
        // filter couldn't be applied within this category.
        showInfoToast(`אין שאלות ${levelName} ב"${catName}" — ממשיך בתחום ללא סינון קושי`);
      }
    }

    stopCountdown();
    state.currentQuestion = pickRandomQuestion(state.currentCategory || 'mixed');
    state.currentAnswerOrder = null;
    render();
    if (state.timerMode && !state.learningMode) startCountdown();
  } else {
    render();
  }
}

function setTimerMode(enabled) {
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  state.timerMode = enabled;
  saveState();
  // Restart countdown appropriately if in middle of question
  if (state.currentView === 'question' && state.answerGiven === null && !state.learningMode) {
    stopCountdown();
    if (enabled) startCountdown();
  }
  render();
}

function setTimerSeconds(seconds) {
  if (![10, 15, 20].includes(seconds)) return;
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  state.timerSeconds = seconds;
  state.timerMode = true;
  saveState();
  // Restart countdown with new duration if in middle of question
  if (state.currentView === 'question' && state.answerGiven === null && !state.learningMode) {
    stopCountdown();
    startCountdown();
  }
  render();
}

function disableTimer() {
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  state.timerMode = false;
  saveState();
  // Stop countdown if running
  if (state.currentView === 'question') {
    stopCountdown();
  }
  render();
}

function setLearningMode(enabled) {
  state.learningMode = enabled;
  saveState();
  render();
}

function toggleNightMode() {
  state.nightMode = !state.nightMode;
  if (state.nightMode) {
    document.body.classList.add('night-mode');
  } else {
    document.body.classList.remove('night-mode');
  }
  saveState();
  render();
}

function showLearningQuestion() {
  state.showingExplanation = false;
  render();
  MusicEngine.start();
  // Start timer if applicable
  if (state.timerMode) {
    startCountdown();
  }
}

function renderAchievements() {
  const total = ACHIEVEMENTS.length;
  const unlocked = Object.keys(state.unlockedAchievements).length;
  const percentage = Math.round((unlocked / total) * 100);

  return `
    <button class="back-btn" onclick="goHome()">← חזרה</button>

    <div class="ach-page-header">
      <div class="ach-page-title">🏆 ההישגים שלך</div>
      <div class="ach-page-sub">${unlocked} מתוך ${total} הישגים נפתחו (${percentage}%)</div>
      <div class="ach-progress-bar">
        <div class="ach-progress-fill" style="width: ${percentage}%"></div>
      </div>
    </div>

    <div class="ach-list">
      ${ACHIEVEMENTS.map(ach => {
        const unlockedAt = state.unlockedAchievements[ach.id];
        const isUnlocked = !!unlockedAt;
        let dateStr = '';
        if (isUnlocked) {
          const d = new Date(unlockedAt);
          dateStr = `${d.getDate()}/${d.getMonth() + 1}/${d.getFullYear()}`;
        }
        return `
          <div class="ach-item ${isUnlocked ? 'unlocked' : 'locked'}">
            <div class="ach-icon">${isUnlocked ? ach.icon : '🔒'}</div>
            <div class="ach-content">
              <div class="ach-name">${ach.name}</div>
              <div class="ach-desc">${ach.desc}</div>
              ${isUnlocked ? `<div class="ach-date">נפתח: ${dateStr}</div>` : ''}
            </div>
            ${isUnlocked ? '<div class="ach-checkmark">✓</div>' : ''}
          </div>
        `;
      }).join('')}
    </div>
  `;
}

let countdownInterval = null;

function startCountdown() {
  if (countdownInterval) clearInterval(countdownInterval);
  const duration = state.timerSeconds || 10;
  state.timeLeft = duration;

  countdownInterval = setInterval(() => {
    state.timeLeft--;

    // Update just the timer display without full re-render
    const timerEl = document.getElementById('timer-display');
    if (timerEl) {
      const q = QUESTIONS[state.currentQuestion];
      const answered = state.answerGiven !== null;
      if (!answered) {
        const urgentThreshold = Math.max(3, Math.floor(duration * 0.3));
        timerEl.innerHTML = `
          <div class="timer-circle ${state.timeLeft <= urgentThreshold ? 'urgent' : ''}">
            <svg viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="45" class="timer-bg"/>
              <circle cx="50" cy="50" r="45" class="timer-progress"
                style="stroke-dasharray: ${2 * Math.PI * 45};
                       stroke-dashoffset: ${2 * Math.PI * 45 * (1 - state.timeLeft / duration)};"/>
            </svg>
            <div class="timer-text">${state.timeLeft}</div>
          </div>
        `;
      }
    }

    if (state.timeLeft <= 0) {
      clearInterval(countdownInterval);
      countdownInterval = null;
      // Time's up - count as wrong answer
      if (state.answerGiven === null && state.currentView === 'question') {
        handleTimeOut();
      }
    }
  }, 1000);
}

function stopCountdown() {
  if (countdownInterval) {
    clearInterval(countdownInterval);
    countdownInterval = null;
  }
}

function handleTimeOut() {
  const q = QUESTIONS[state.currentQuestion];
  // Mark as wrong - the "answer given" is -1 (none, but timed out)
  state.answerGiven = -1;
  state.answered.push({
    questionId: state.currentQuestion,
    category: q.cat,
    correct: false,
    timestamp: Date.now(),
    timedOut: true,
  });

  // Reset streak on timeout
  state.currentStreak = 0;

  showWrongFeedback();
  if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
  saveState();
  render();

  // Auto-advance
  if (autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
  autoAdvanceTimer = setTimeout(() => {
    if (state.currentView === 'question') nextQuestion();
  }, 2000);
}

// ============ QUIZ LENGTH PICKER ============

  const existing = document.querySelector('.length-picker-overlay');
  if (existing) existing.remove();

  const cat = CATEGORIES[category];
  const catName = cat ? cat.name : (category === 'mixed' ? 'הכל מעורב' : 'חידון');
  const catEmoji = cat ? cat.emoji : '🎲';

  const overlay = document.createElement('div');
  overlay.className = 'length-picker-overlay';
  overlay.innerHTML = `
    <div class="length-picker-card" onclick="event.stopPropagation()">
      <div class="length-picker-title">${catEmoji} ${catName}</div>
      <div class="length-picker-sub">בחר אורך החידון</div>
      <div class="length-picker-options">
        <button class="length-option short" onclick="_pickedLength('${category}', 20)">
          <div class="length-option-num">20</div>
          <div class="length-option-text">
            <div class="length-option-title">חידון קצר</div>
            <div class="length-option-desc">20 שאלות · כ-3 דקות · מושלם להפסקה</div>
          </div>
        </button>

          <div class="length-option-num">40</div>
          <div class="length-option-text">
            <div class="length-option-title">חידון מלא</div>
            <div class="length-option-desc">40 שאלות · כ-6 דקות · אתגר משמעותי</div>
          </div>

function _closeLengthPicker() {
  const el = document.querySelector('.length-picker-overlay');

}

function _pickedLength(category, length) {
  _closeLengthPicker();
  startQuiz(category, length);
}

// ============ QUIZ SCORING ============
function calculateAnswerPoints(isCorrect, currentStreak) {
  // 10 points per correct. +5 bonus when hitting milestones of streak 3, 5, 10.
  if (!isCorrect) return 0;
  let pts = 10;
  if (currentStreak === 3) pts += 5;       // hitting 3-in-a-row
  else if (currentStreak === 5) pts += 15; // hitting 5-in-a-row
  else if (currentStreak === 10) pts += 30; // hitting 10-in-a-row
  else if (currentStreak > 0 && currentStreak % 5 === 0) pts += 15; // every 5 after
  return pts;
}

function startQuiz(category, length) {
  // If called without an explicit length, show the length picker first.
  if (length === undefined) {
    pickQuizLength(category);
    return;
  }

  // Clear any pending operations from previous question
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  stopCountdown();
  MusicEngine.stop();

  // Reset per-session quiz stats
  state.quizLength = length;          // 20, 40, or null
  state.quizAnswered = 0;
  state.quizCorrect = 0;
  state.quizCurrentStreak = 0;
  state.quizBestStreak = 0;
  state.quizScore = 0;

  state.currentCategory = category;
  state.currentQuestion = pickRandomQuestion(category);
  state.answerGiven = null;
  state.currentAnswerOrder = null;
  state.currentView = 'question';
  state.examMode = false;
  state.dailyMode = false;
  state.mistakesMode = false;
  // Learning mode: show explanation first
  state.showingExplanation = state.learningMode;
  render();

  // Start tension music (unless in learning mode showing explanation)
  if (!state.showingExplanation) {
    MusicEngine.start();
  }

  // Start timer if in timer mode (but not in learning mode)
  if (state.timerMode && !state.learningMode) {
    startCountdown();
  }
}

// ============ DAILY CHALLENGE GAMEPLAY ============
function playDailyChallenge() {
  const today = getTodayString();
  if (state.dailyChallenge.lastPlayedDate === today) {
    showInfoToast('כבר שיחקת היום! חזור מחר 📅');
    return;
  }
  const qId = getDailyQuestionId();
  state.currentQuestion = qId;
  state.currentCategory = QUESTIONS[qId].cat;
  state.answerGiven = null;
  state.currentAnswerOrder = null;
  state.currentView = 'question';
  state.examMode = false;
  state.mistakesMode = false;
  state.dailyMode = true;
  state.showingExplanation = false; // daily always direct - no learning mode
  render();
  MusicEngine.start();
}

function finalizeDailyChallenge(isCorrect) {
  const today = getTodayString();
  const yesterday = getYesterdayString();
  const dc = state.dailyChallenge;

  // Update streak
  if (dc.lastPlayedDate === yesterday) {
    dc.dailyStreak = (dc.dailyStreak || 0) + 1;
  } else {
    dc.dailyStreak = 1;
  }
  if (dc.dailyStreak > (dc.bestDailyStreak || 0)) {
    dc.bestDailyStreak = dc.dailyStreak;
  }
  dc.lastPlayedDate = today;
  dc.lastQuestionId = state.currentQuestion;
  dc.lastCorrect = isCorrect;

  // Note: dailyMode is reset inside nextQuestion after showing the answer
  saveState();
}

// ============ MISTAKES PRACTICE ============
function startMistakesPractice() {
  const ids = getMistakeQuestionIds();
  if (ids.length === 0) {
    showInfoToast('אין טעויות לתרגול כרגע 🎉');
    return;
  }
  // Shuffle
  const shuffled = [...ids].sort(() => Math.random() - 0.5);
  state.mistakesQueue = shuffled;
  state.mistakesMode = true;
  state.dailyMode = false;
  state.examMode = false;
  state.currentQuestion = state.mistakesQueue[0];
  state.currentCategory = QUESTIONS[state.currentQuestion].cat;
  state.answerGiven = null;
  state.currentAnswerOrder = null;
  state.currentView = 'question';
  state.showingExplanation = false;
  state._mistakesFixed = state._mistakesFixed || 0;
  render();
  MusicEngine.start();
}

function nextMistakeQuestion() {
  // Remove current from queue
  state.mistakesQueue.shift();
  if (state.mistakesQueue.length === 0) {
    state.mistakesMode = false;
    MusicEngine.stop();
    showInfoToast('🎉 סיימת לתרגל את כל הטעויות!');
    goHome();
    return;
  }
  state.currentQuestion = state.mistakesQueue[0];
  state.currentCategory = QUESTIONS[state.currentQuestion].cat;
  state.answerGiven = null;
  state.currentAnswerOrder = null;
  render();
  MusicEngine.start();
}

// ============ EXAM MODE ============
function startExam() {
  // Pick 20 random questions from ALL questions (ignoring difficulty filter)
  const allIds = QUESTIONS.map((q, i) => i);
  const shuffled = allIds.sort(() => Math.random() - 0.5);
  state.examQuestions = shuffled.slice(0, 20);
  state.examAnswers = [];
  state.examIndex = 0;
  state.examMode = true;
  state.dailyMode = false;
  state.mistakesMode = false;
  state.currentQuestion = state.examQuestions[0];
  state.answerGiven = null;
  state.currentAnswerOrder = null;
  state.currentView = 'exam';
  render();
  MusicEngine.start();

  // Always use 15 seconds timer in exam mode (a bit more relaxed)
  // Actually, make it clean - no timer in exam mode unless user wants
}

function examAnswerQuestion(answerIndex) {
  const q = QUESTIONS[state.currentQuestion];
  const isCorrect = answerIndex === q.correct;
  state.answerGiven = answerIndex;
  state.examAnswers.push(isCorrect);

  if (isCorrect) {
    showCorrectFeedback();
    MusicEngine.playCorrectSound();
  } else {
    showWrongFeedback();
    MusicEngine.playWrongSound();
  }

  if (navigator.vibrate) {
    navigator.vibrate(isCorrect ? [100] : [150, 80, 150]);
  }

  render();

  // Auto-advance — 3 seconds when wrong (to see correct answer), 2 seconds when correct
  if (autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
  autoAdvanceTimer = setTimeout(() => {
    nextExamQuestion();
  }, isCorrect ? 2000 : 4000);
}

function nextExamQuestion() {
  if (autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
  state.examIndex++;

  if (state.examIndex >= state.examQuestions.length) {
    // Exam finished - show results
    state.currentView = 'exam-result';
    state.examMode = false;
    MusicEngine.stop();

    // Check for perfect exam achievement
    const correctCount = state.examAnswers.filter(a => a).length;
    if (correctCount === state.examQuestions.length) {
      state._lastPerfectExam = true;
      const newAch = checkAchievements();
      if (newAch.length > 0) {
        setTimeout(() => {
          newAch.forEach((ach, idx) => {
            setTimeout(() => showAchievementUnlock(ach), idx * 800);
          });
        }, 800);
      }
      state._lastPerfectExam = false;
    }

    saveState();
    render();
  } else {
    state.currentQuestion = state.examQuestions[state.examIndex];
    state.answerGiven = null;
  state.currentAnswerOrder = null;
    render();
    MusicEngine.start(); // resume tension for next question
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function exitExam() {
  state.examMode = false;
  state.examQuestions = [];
  state.examAnswers = [];
  state.examIndex = 0;
  MusicEngine.stop();
  goHome();
}

let autoAdvanceTimer = null;

function answerQuestion(answerIndex) {
  if (state.answerGiven !== null) return;

  // Stop the countdown when user answers
  stopCountdown();

  // Stop tension music and play result sound
  MusicEngine.stop();

  // In exam mode - handle differently
  if (state.examMode) {
    return examAnswerQuestion(answerIndex);
  }

  const q = QUESTIONS[state.currentQuestion];
  const isCorrect = answerIndex === q.correct;

  // Play result sound
  if (isCorrect) {
    MusicEngine.playCorrectSound();
  } else {
    MusicEngine.playWrongSound();
  }

  state.answerGiven = answerIndex;
  state.answered.push({
    questionId: state.currentQuestion,
    category: q.cat,
    correct: isCorrect,
    timestamp: Date.now(),
  });

  // If mistakes practice and got it right now - count as "fixed"
  if (state.mistakesMode && isCorrect) {
    state._mistakesFixed = (state._mistakesFixed || 0) + 1;
  }

  // If daily challenge - finalize streak and mark played
  if (state.dailyMode) {
    finalizeDailyChallenge(isCorrect);
  }

  // Update streak
  if (isCorrect) {
    state.currentStreak++;
    if (state.currentStreak > state.bestStreak) {
      state.bestStreak = state.currentStreak;
    }
  } else {
    state.currentStreak = 0;
  }

  // Update QUIZ-SESSION stats (separate from global stats)
  state.quizAnswered = (state.quizAnswered || 0) + 1;
  if (isCorrect) {
    state.quizCorrect = (state.quizCorrect || 0) + 1;
    state.quizCurrentStreak = (state.quizCurrentStreak || 0) + 1;
    if (state.quizCurrentStreak > (state.quizBestStreak || 0)) {
      state.quizBestStreak = state.quizCurrentStreak;
    }
  } else {
    state.quizCurrentStreak = 0;
  }
  // Add points for this answer (based on quiz streak, not global)
  state.quizScore = (state.quizScore || 0) + calculateAnswerPoints(isCorrect, state.quizCurrentStreak);

  // Show feedback
  if (isCorrect) {
    showCorrectFeedback();
    // Special streak celebration for milestones
    if (state.currentStreak === 5 || state.currentStreak === 10 ||
        state.currentStreak === 20 || state.currentStreak === 50) {
      setTimeout(() => showStreakMilestone(state.currentStreak), 800);
    }
  } else {
    showWrongFeedback();
  }

  // Haptic feedback (works on some mobile browsers)
  if (navigator.vibrate) {
    navigator.vibrate(isCorrect ? [100] : [150, 80, 150]);
  }

  saveState();
  render();

  // Check for newly unlocked achievements
  const newAch = checkAchievements();
  if (newAch.length > 0) {
    // Show after a small delay so streak toast doesn't overlap
    setTimeout(() => {
      newAch.forEach((ach, idx) => {
        setTimeout(() => showAchievementUnlock(ach), idx * 800);
      });
      saveState();
    }, 1200);
  }

  // Auto-advance to next question — 3 seconds when wrong (to see correct answer), 2 seconds when correct
  if (autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
  autoAdvanceTimer = setTimeout(() => {
    if (state.answerGiven !== null && state.currentView === 'question') {
      nextQuestion();
    }
  }, isCorrect ? 2000 : 4000);
}

function showStreakMilestone(streak) {
  const msg = document.createElement('div');
  msg.className = 'streak-toast';
  msg.innerHTML = `
    <div class="streak-fire">🔥</div>
    <div class="streak-msg">שרשרת של ${streak}!</div>
    <div class="streak-sub">המשך ככה!</div>
  `;
  document.body.appendChild(msg);
  setTimeout(() => msg.remove(), 2000);
}

function showCorrectFeedback() {
  // Green flash
  document.body.classList.add('success-flash');
  setTimeout(() => document.body.classList.remove('success-flash'), 700);

  // Big checkmark
  const overlay = document.createElement('div');
  overlay.className = 'answer-overlay correct';
  overlay.innerHTML = '<div class="answer-overlay-icon">✓</div>';
  document.body.appendChild(overlay);
  setTimeout(() => overlay.remove(), 1300);

  // Happy sound
  playSound('correct');
}

function showWrongFeedback() {
  // Screen shake
  document.body.classList.add('shake');
  setTimeout(() => document.body.classList.remove('shake'), 600);

  // Big X
  const overlay = document.createElement('div');
  overlay.className = 'answer-overlay wrong';
  overlay.innerHTML = '<div class="answer-overlay-icon">✕</div>';
  document.body.appendChild(overlay);
  setTimeout(() => overlay.remove(), 1300);

  // Sad sound
  playSound('wrong');
}

function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === 'correct') {
      // Happy chime: C - E - G
      osc.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
      osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.15); // E5
      osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.3); // G5
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.6);
      osc.start();
      osc.stop(ctx.currentTime + 0.6);
    } else {
      // Sad tone: going down
      osc.frequency.setValueAtTime(400, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.4);
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
      osc.start();
      osc.stop(ctx.currentTime + 0.4);
    }
  } catch (e) {
    // Audio not available - silent fallback
  }
}

function nextQuestion() {
  if (autoAdvanceTimer) {
    clearTimeout(autoAdvanceTimer);
    autoAdvanceTimer = null;
  }
  stopCountdown();

  // Daily mode: one question only, go home after
  if (state.dailyMode) {
    state.dailyMode = false;
    goHome();
    return;
  }

  // Mistakes mode: advance through the queue
  if (state.mistakesMode) {
    nextMistakeQuestion();
    return;
  }

  // If quiz has a length limit and we've reached it → finish the quiz
  if (state.quizLength && state.quizAnswered >= state.quizLength) {
    finishQuiz();
    return;
  }

  state.currentQuestion = pickRandomQuestion(state.currentCategory);
  state.answerGiven = null;
  state.currentAnswerOrder = null;
  // Learning mode: show explanation first
  state.showingExplanation = state.learningMode;
  render();

  // Resume tension music for the next question (unless in learning explanation phase)
  if (!state.showingExplanation) {
    MusicEngine.start();
  }

  // Scroll to top smoothly
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // Start timer if in timer mode (but not in learning mode)
  if (state.timerMode && !state.learningMode) {
    startCountdown();
  }
}

function finishQuiz() {
  // Stop everything and navigate to quiz results screen
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  stopCountdown();
  MusicEngine.stop();
  state.currentView = 'quiz-result';
  render();

  // Celebration haptic
  if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);
}

function confirmFinishQuiz() {

// Generate random 5-char room code (uppercase letters + digits)
function generateRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // Avoided I/O/0/1 confusion
  let code = '';
  for (let i = 0; i < 5; i++) {
    code += chars[Math.floor(Math.random() * chars.length)];
  }
  return code;
}

// Generate random player ID
function generatePlayerId() {
  return 'p_' + Math.random().toString(36).substring(2, 10);
}

// Wait for Firebase to be ready
async function waitForFirebase() {
  if (window.FB_READY) return;
  await new Promise(resolve => {
    document.addEventListener('firebase-ready', resolve, { once: true });
    setTimeout(resolve, 5000); // Failsafe: don't wait forever
  });
}

// Clean up all Firebase listeners for current room
function cleanupGroupListeners() {
  groupState.listeners.forEach(unsub => {
    try { unsub(); } catch (e) {}
  });
  groupState.listeners = [];
  if (groupState.countdownInterval) {
    clearInterval(groupState.countdownInterval);
    groupState.countdownInterval = null;
  }
  if (groupState.questionTimer) {
    clearTimeout(groupState.questionTimer);
    groupState.questionTimer = null;
  }
}

// Leave the room (player) or close the room (host)
async function leaveGroupRoom() {
  try {
    await waitForFirebase();
    if (groupState.roomCode) {
      if (groupState.isHost) {
        // Host closes room - delete it
        await window.FB.remove(`rooms/${groupState.roomCode}`);
      } else if (groupState.playerId) {
        // Player leaves - remove self
        await window.FB.remove(`rooms/${groupState.roomCode}/players/${groupState.playerId}`);
      }
    }
  } catch (e) {
    console.warn('Leave room error:', e);
  }
  cleanupGroupListeners();
  groupState.roomCode = null;
  groupState.isHost = false;
  groupState.playerId = null;
  groupState.playerName = null;
  groupState.currentQuestion = null;
  groupState.currentQuestionIndex = 0;
  groupState.myAnswer = null;
  groupState.gameQuestions = [];
  state.currentView = 'home';
  render();
}

// ============ HOST: Start Room ============
async function startAsHost() {
  const name = prompt('איך קוראים לך? (שם המנחה)');
  if (!name || !name.trim()) return;

  try {
    await waitForFirebase();
  } catch (e) {
    alert('בעיה בחיבור לשרת. בדוק את החיבור לאינטרנט.');
    return;
  }

  // Generate unique room code (try up to 5 times)
  let roomCode = null;
  for (let i = 0; i < 5; i++) {
    const candidate = generateRoomCode();
    try {
      const snapshot = await window.FB.get(`rooms/${candidate}`);
      if (!snapshot.exists()) {
        roomCode = candidate;
        break;
      }
    } catch (e) {
      console.error('Error checking room:', e);
    }
  }

  if (!roomCode) {
    alert('לא ניצלנו ליצור חדר. נסה שוב.');
    return;
  }

  // Pre-select 10 random questions for this game
  const shuffled = [...QUESTIONS].sort(() => Math.random() - 0.5);
  const selectedQuestions = shuffled.slice(0, 10).map((q, idx) => {
    // Create shuffled answer order for this question
    const order = [0, 1, 2, 3].sort(() => Math.random() - 0.5);
    return {
      idx: idx,
      q: q.q,
      answers: order.map(o => q.a[o]),
      correct: order.indexOf(q.correct),
      exp: q.exp,
      cat: q.cat
    };
  });

  groupState.roomCode = roomCode;
  groupState.isHost = true;
  groupState.playerId = 'host';
  groupState.playerName = name.trim();
  groupState.gameQuestions = selectedQuestions;

  // Create the room in Firebase
  const roomData = {
    code: roomCode,
    hostName: name.trim(),
    status: 'waiting',       // 'waiting' | 'playing' | 'finished'
    createdAt: Date.now(),
    currentQuestionIdx: -1,
    questions: selectedQuestions,
    players: {}
  };

  try {
    await window.FB.set(`rooms/${roomCode}`, roomData);
  } catch (e) {
    alert('שגיאה ביצירת החדר: ' + e.message);
    return;
  }

  state.currentView = 'group-host-lobby';
  render();
  subscribeToRoomUpdates();
}

// Subscribe to live updates from the room (used by both host and players)
function subscribeToRoomUpdates() {
  if (!groupState.roomCode) return;

  const unsub = window.FB.onValue(`rooms/${groupState.roomCode}`, (snapshot) => {
    const room = snapshot.val();
    if (!room) {
      // Room was deleted (host left)
      if (!groupState.isHost) {
        alert('החדר נסגר על ידי המנחה');
        leaveGroupRoom();
      }
      return;
    }

    // Update local state based on room changes
    const newIdx = room.currentQuestionIdx;
    const newStatus = room.status;

    if (newStatus === 'playing' && newIdx >= 0 && newIdx !== groupState.currentQuestionIndex) {
      groupState.currentQuestionIndex = newIdx;
      groupState.currentQuestion = room.questions[newIdx];
      groupState.myAnswer = null;
      groupState.timeLeft = 15;

      if (state.currentView !== 'group-play') {
        state.currentView = 'group-play';
      }
      render();
      startQuestionCountdown();
    } else if (newStatus === 'finished') {
      state.currentView = 'group-result';
      render();
    } else if (state.currentView === 'group-host-lobby' || state.currentView === 'group-player-lobby' || state.currentView === 'group-play') {
      // Re-render to show updated player list / answers
      render();
    }
  });

  groupState.listeners.push(unsub);
}

// Start the 15-second countdown for the current question
function startQuestionCountdown() {
  if (groupState.countdownInterval) clearInterval(groupState.countdownInterval);

  groupState.timeLeft = 15;
  groupState.countdownInterval = setInterval(() => {
    groupState.timeLeft--;
    const timerEl = document.getElementById('group-timer');
    if (timerEl) {
      timerEl.textContent = groupState.timeLeft;
      if (groupState.timeLeft <= 5) {
        timerEl.classList.add('urgent');
      }
    }
    if (groupState.timeLeft <= 0) {
      clearInterval(groupState.countdownInterval);
      groupState.countdownInterval = null;
      // Auto-submit "no answer" if user didn't answer
      if (groupState.myAnswer === null) {
        submitGroupAnswer(-1); // -1 = no answer
      }
      // Host checks if should advance
      if (groupState.isHost) {
        setTimeout(() => checkAdvanceQuestion(), 2000);
      }
    }
  }, 1000);
}

async function joinGroupRoom() {
  const codeInput = document.getElementById('room-code-input');
  const nameInput = document.getElementById('player-name-input');
  const code = (codeInput.value || '').trim().toUpperCase();
  const name = (nameInput.value || '').trim();

  if (code.length !== 5) {
    alert('הקוד חייב להיות באורך 5 תווים');
    return;
  }
  if (!name) {
    alert('אנא הקלד את השם שלך');
    return;
  }

  try {
    await waitForFirebase();
  } catch (e) {
    alert('בעיה בחיבור לשרת');
    return;
  }

  // Check room exists
  let room;
  try {
    const snapshot = await window.FB.get(`rooms/${code}`);
    if (!snapshot.exists()) {
      alert('החדר לא נמצא. בדוק את הקוד.');
      return;
    }
    room = snapshot.val();
  } catch (e) {
    alert('שגיאה בבדיקת החדר');
    return;
  }

  if (room.status !== 'waiting') {
    alert('המשחק כבר התחיל - לא ניתן להצטרף');
    return;
  }

  const existingPlayers = room.players || {};
  if (Object.keys(existingPlayers).length >= 15) {
    alert('החדר מלא (15 שחקנים מקסימום)');
    return;
  }

  // Join
  const playerId = generatePlayerId();
  groupState.roomCode = code;
  groupState.isHost = false;
  groupState.playerId = playerId;
  groupState.playerName = name;

  try {
    await window.FB.set(`rooms/${code}/players/${playerId}`, {
      name: name,
      score: 0,
      joinedAt: Date.now(),
      lastAnswer: null,
      lastAnswerTime: null
    });
    // Auto-remove on disconnect
    window.FB.onDisconnect(`rooms/${code}/players/${playerId}`).remove();
  } catch (e) {
    alert('שגיאה בהצטרפות לחדר');
    return;
  }

  state.currentView = 'group-player-lobby';
  render();
  subscribeToRoomUpdates();
}

async function startGroupGame() {
  // IMMEDIATE visual confirmation that click was registered
  console.log('[GroupGame] startGroupGame called! roomCode=', groupState.roomCode, 'FB=', !!window.FB);

  // WRAP EVERYTHING in one mega try/catch - no way for silent failure
  // First alert to confirm function was actually called
  let step = 'function called';
  try {
    step = 'checking roomCode';
    if (!groupState.roomCode) {
      alert('שלב 1: אין קוד חדר');
      return;
    }

    step = 'checking window.FB';
    if (!window.FB) {
      alert('שלב 2: Firebase לא נטען. רענן את הדף.');
      return;
    }

    step = 'showing start message';
    // Visual feedback immediately so user knows the click was registered
    const startBtn = document.getElementById('start-game-btn');
    if (startBtn) {
      startBtn.disabled = true;
      const startText = document.getElementById('start-game-text');
      if (startText) startText.textContent = 'מתחיל משחק...';
    }

    step = 'calling Firebase update';
    await window.FB.update(`rooms/${groupState.roomCode}`, {
      status: 'playing',
      currentQuestionIdx: 0,
      questionStartedAt: Date.now()
    });

    step = 'success';
    // Don't alert on success - the view will auto-change via the listener
  } catch (e) {
    const errMsg = e && e.message ? e.message : (e && e.toString ? e.toString() : 'שגיאה לא ידועה');
    alert('שגיאה בשלב "' + step + '":\n' + errMsg);
    console.error('startGroupGame error at step', step, ':', e);
    // Re-enable the button
    const startBtn = document.getElementById('start-game-btn');
    if (startBtn) startBtn.disabled = false;
  }
}

// ============ PLAY SCREEN (host + players, same view) ============
function renderGroupPlay() {
  const q = groupState.currentQuestion;
  if (!q) {
    return `<div class="group-waiting"><div class="group-waiting-emoji">⏳</div><div class="group-waiting-title">טוען שאלה...</div></div>`;
  }

  const answered = groupState.myAnswer !== null;
  const letters = ['א', 'ב', 'ג', 'ד'];

  return `
    <button class="back-btn" onclick="exitGroupMode()">← יציאה</button>

    <div class="group-screen">
      <div style="text-align:center; padding: 8px;">
        <div style="font-size:13px; color: var(--muted); font-weight:600;">
          שאלה ${groupState.currentQuestionIndex + 1} מתוך ${groupState.totalQuestions}
        </div>
      </div>

      ${!answered ? `
        <div class="group-timer ${groupState.timeLeft <= 5 ? 'urgent' : ''}" id="group-timer">${groupState.timeLeft}</div>
      ` : `
        <div style="text-align:center; padding: 12px;">
          <div style="font-size: 24px;">${groupState.myAnswer === q.correct ? '✅ צדקת!' : groupState.myAnswer === -1 ? '⏱️ לא ענית בזמן' : '❌ לא נכון'}</div>
          <div style="color: var(--muted); font-size: 13px; margin-top: 8px;">מחכים לשאר השחקנים...</div>
        </div>
      `}

      <div class="question-card">
        <h2 class="question-text">${q.q}</h2>
      </div>

      <div class="answers">
        ${q.answers.map((ans, idx) => {
          let cls = 'answer-btn';
          if (answered) {
            if (idx === q.correct) cls += ' correct-highlight';
            else if (idx === groupState.myAnswer) cls += ' wrong';
          }
          return `
            <button class="${cls}"
                    onclick="submitGroupAnswer(${idx})"
                    ${answered ? 'disabled' : ''}>
              <span class="answer-letter">${letters[idx]}</span>
              <span>${ans}</span>
            </button>
          `;
        }).join('')}
      </div>

      ${answered && groupState.isHost ? `
        <button class="group-big-btn" onclick="hostAdvanceNow()">שאלה הבאה ⬅️</button>
      ` : ''}
    </div>
  `;
}

async function submitGroupAnswer(answerIdx) {
  if (groupState.myAnswer !== null) return;
  groupState.myAnswer = answerIdx;

  const q = groupState.currentQuestion;
  if (!q) return;

  const isCorrect = answerIdx === q.correct;
  const timeBonus = groupState.timeLeft; // Faster = more points
  const points = isCorrect ? (50 + timeBonus * 3) : 0;

  try {
    if (groupState.isHost) {
      // Host doesn't score - just record
      await window.FB.update(`rooms/${groupState.roomCode}/hostAnswer`, {
        answer: answerIdx,
        correct: isCorrect
      });
    } else {
      const path = `rooms/${groupState.roomCode}/players/${groupState.playerId}`;
      const snapshot = await window.FB.get(path);
      const current = snapshot.val() || {};
      await window.FB.update(path, {
        lastAnswer: answerIdx,
        lastCorrect: isCorrect,
        score: (current.score || 0) + points,
        lastAnswerTime: Date.now()
      });
    }
  } catch (e) {
    console.error('Submit answer error:', e);
  }

  render();
}

// Host advances to next question (after all answered or timer ended)
async function checkAdvanceQuestion() {
  if (!groupState.isHost) return;
  try {
    const snapshot = await window.FB.get(`rooms/${groupState.roomCode}`);
    const room = snapshot.val();
    if (!room) return;
    const playerCount = Object.keys(room.players || {}).length;
    const answeredCount = Object.values(room.players || {}).filter(p => p.lastAnswer !== null && p.lastAnswer !== undefined).length;

    // Advance if all answered, or if timer is expired
    if (answeredCount >= playerCount || groupState.timeLeft <= 0) {
      hostAdvanceNow();
    }
  } catch (e) {
    console.error('Check advance error:', e);
  }
}

async function hostAdvanceNow() {
  if (!groupState.isHost) return;

  const nextIdx = groupState.currentQuestionIndex + 1;

  // Clear answers for next question
  try {
    const snapshot = await window.FB.get(`rooms/${groupState.roomCode}/players`);
    const players = snapshot.val() || {};
    const updates = {};
    Object.keys(players).forEach(pid => {
      updates[`${pid}/lastAnswer`] = null;
      updates[`${pid}/lastCorrect`] = null;
    });
    if (Object.keys(updates).length > 0) {
      await window.FB.update(`rooms/${groupState.roomCode}/players`, updates);
    }

    if (nextIdx >= groupState.totalQuestions) {
      // Game over!
      await window.FB.update(`rooms/${groupState.roomCode}`, {
        status: 'finished',
        currentQuestionIdx: -1
      });
    } else {
      await window.FB.update(`rooms/${groupState.roomCode}`, {
        currentQuestionIdx: nextIdx,
        questionStartedAt: Date.now()
      });
    }
  } catch (e) {
    console.error('Advance error:', e);
  }
}

// ============ RESULTS SCREEN ============
function renderGroupResult() {
  return `
    <div class="group-screen">
      <div class="group-header">
        <div class="group-header-icon">🏆</div>
        <div class="group-header-title">המשחק הסתיים!</div>
        <div class="group-header-sub">הנה התוצאות הסופיות</div>
      </div>

      <div id="final-leaderboard">
        <div class="group-waiting">
          <div class="group-waiting-emoji">📊</div>
          <div class="group-waiting-title">טוען תוצאות...</div>
        </div>
      </div>

      <button class="group-big-btn" onclick="leaveGroupRoom()">סיום - חזרה לבית</button>
    </div>
  `;
}

// ============ DOM UPDATE HELPER - Live update player list without full re-render ============
function updatePlayerListDOM(players) {
  const container = document.getElementById('player-items-container');
  const countBadge = document.getElementById('player-count-badge');
  if (!container || !countBadge) return;

  const playerArr = Object.values(players || {});
  countBadge.textContent = playerArr.length;

  if (playerArr.length === 0) {
    container.innerHTML = `<div class="empty-players">עדיין לא הצטרפו שחקנים... 😴</div>`;
    return;
  }

  container.innerHTML = playerArr
    .sort((a, b) => (a.joinedAt || 0) - (b.joinedAt || 0))
    .map(p => `<div class="player-item">🎮 ${p.name}</div>`)
    .join('');

  // Enable start button if in host lobby with at least 1 player
  const startBtn = document.getElementById('start-game-btn');
  const startText = document.getElementById('start-game-text');
  if (startBtn && groupState.isHost) {
    if (playerArr.length >= 1) {
      startBtn.disabled = false;
      if (startText) startText.textContent = `התחל משחק 🚀 (${playerArr.length} שחקנים)`;
    }
  }
}

// Update leaderboard on results screen
function updateLeaderboardDOM(players) {
  const container = document.getElementById('final-leaderboard');
  if (!container) return;

  const sorted = Object.values(players || {}).sort((a, b) => (b.score || 0) - (a.score || 0));

  if (sorted.length === 0) {
    container.innerHTML = '<div class="empty-players">לא היו שחקנים</div>';
    return;
  }

  // Top 3 = podium, rest = list
  const top3 = sorted.slice(0, 3);
  const rest = sorted.slice(3);

  let html = '';

  if (top3.length >= 1) {
    html += `<div class="podium">`;
    if (top3[1]) {
      html += `
        <div class="podium-step second">
          <div class="podium-emoji">🥈</div>
          <div class="podium-name">${top3[1].name}</div>
          <div class="podium-score">${top3[1].score || 0}</div>
        </div>
      `;
    }
    html += `
      <div class="podium-step first">
        <div class="podium-emoji">🥇</div>
        <div class="podium-name">${top3[0].name}</div>
        <div class="podium-score">${top3[0].score || 0}</div>
      </div>
    `;
    if (top3[2]) {
      html += `
        <div class="podium-step third">
          <div class="podium-emoji">🥉</div>
          <div class="podium-name">${top3[2].name}</div>
          <div class="podium-score">${top3[2].score || 0}</div>
        </div>
      `;
    }
    html += `</div>`;
  }

  if (rest.length > 0) {
    html += `<div class="leaderboard"><div class="leaderboard-title">שאר השחקנים</div>`;
    rest.forEach((p, i) => {
      html += `
        <div class="leaderboard-item">
          <div class="leaderboard-rank">#${i + 4}</div>
          <div class="leaderboard-name">${p.name}</div>
          <div class="leaderboard-score">${p.score || 0}</div>
        </div>
      `;
    });
    html += `</div>`;
  }

  container.innerHTML = html;
}

// Override subscribeToRoomUpdates to also update player list DOM
const _origSubscribe = subscribeToRoomUpdates;
window.subscribeToRoomUpdates = function() {
  if (!groupState.roomCode) return;
  const unsub = window.FB.onValue(`rooms/${groupState.roomCode}`, (snapshot) => {
    const room = snapshot.val();
    if (!room) {
      if (!groupState.isHost) {
        alert('החדר נסגר על ידי המנחה');
        leaveGroupRoom();
      }
      return;
    }

    const newIdx = room.currentQuestionIdx;
    const newStatus = room.status;

    // Update player list in lobby
    if (state.currentView === 'group-host-lobby' || state.currentView === 'group-player-lobby') {
      updatePlayerListDOM(room.players || {});
    }

    // Update leaderboard on results screen
    if (state.currentView === 'group-result') {
      updateLeaderboardDOM(room.players || {});
    }

    if (newStatus === 'playing' && newIdx >= 0 && newIdx !== groupState.currentQuestionIndex) {
      groupState.currentQuestionIndex = newIdx;
      groupState.currentQuestion = room.questions[newIdx];
      groupState.myAnswer = null;
      groupState.timeLeft = 15;

      if (state.currentView !== 'group-play') {
        state.currentView = 'group-play';
      }
      render();
      startQuestionCountdown();
    } else if (newStatus === 'finished' && state.currentView !== 'group-result') {
      state.currentView = 'group-result';
      render();
      setTimeout(() => updateLeaderboardDOM(room.players || {}), 100);
    }

    // Host: check if should auto-advance
    if (groupState.isHost && newStatus === 'playing') {
      const players = room.players || {};
      const playerCount = Object.keys(players).length;
      const answeredCount = Object.values(players).filter(p => p.lastAnswer !== null && p.lastAnswer !== undefined).length;
      if (answeredCount > 0 && answeredCount >= playerCount) {
        // All answered - advance in 2 seconds
        setTimeout(() => {
          if (groupState.isHost && groupState.myAnswer !== null) {
            hostAdvanceNow();
          }
        }, 2000);
      }
    }
  });
  groupState.listeners.push(unsub);
};

// Expose group mode functions globally
window.startAsHost = startAsHost;
window.startAsPlayer = startAsPlayer;
window.joinGroupRoom = joinGroupRoom;
window.startGroupGame = startGroupGame;
window.submitGroupAnswer = submitGroupAnswer;
window.hostAdvanceNow = hostAdvanceNow;
window.leaveGroupRoom = leaveGroupRoom;
window.exitGroupMode = exitGroupMode;
window.renderGroupMenu = renderGroupMenu;
window.renderGroupHostLobby = renderGroupHostLobby;
window.renderGroupJoin = renderGroupJoin;
window.renderGroupPlayerLobby = renderGroupPlayerLobby;
window.renderGroupPlay = renderGroupPlay;
window.renderGroupResult = renderGroupResult;

(async () => {
  await loadState();
  render();

  if ('serviceWorker' in navigator) {
    try {
      await navigator.serviceWorker.register('service-worker.js');
    } catch (e) {}
  }
})();
</script>
