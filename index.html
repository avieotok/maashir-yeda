<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>מעשיר את הידע</title>

<!-- PWA support -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1a1410">
<meta name="description" content="העשרת ידע בזמן הפנאי שלך - שאלות וחידונים במגוון תחומים">

<!-- iOS support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="מעשיר ידע">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<!-- Android/Chrome -->
<meta name="mobile-web-app-capable" content="yes">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=David+Libre:wght@400;500;700&family=Frank+Ruhl+Libre:wght@400;500;700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --paper: #f2ead8;
    --paper-dark: #e8dfc8;
    --ink: #1a1410;
    --burgundy: #8b2e3f;
    --burgundy-dark: #6b1f2c;
    --gold: #b8913a;
    --gold-light: #d4a851;
    --teal: #2a5158;
    --teal-light: #3d7078;
    --olive: #6b6135;
    --success: #3d7c4f;
    --success-light: #5fa875;
    --error: #c4423e;
    --error-light: #dc6461;
    --muted: #7a6e5a;
    --line: #c9bfa3;
    --shadow: 0 4px 20px rgba(26,20,16,0.12);
    --shadow-lg: 0 12px 40px rgba(26,20,16,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Heebo', sans-serif;
    font-size: 17px;
    line-height: 1.65;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  body {
    background-image:
      radial-gradient(circle at 20% 20%, rgba(184,145,58,0.06) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(139,46,63,0.05) 0%, transparent 45%);
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 28px 22px 80px;
    position: relative;
  }

  /* Screen shake animation for wrong answers */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
    20%, 40%, 60%, 80% { transform: translateX(10px); }
  }

  body.shake {
    animation: shake 0.5s ease-in-out;
  }

  /* Success flash animation */
  @keyframes successFlash {
    0% { background: transparent; }
    50% { background: rgba(61, 124, 79, 0.2); }
    100% { background: transparent; }
  }

  body.success-flash::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(61, 124, 79, 0.15);
    animation: successFlash 0.6s ease-out;
    pointer-events: none;
    z-index: 1000;
  }

  /* Copyright notice at top */
  .copyright-top {
    text-align: center;
    padding: 8px 16px;
    margin: -28px -22px 20px;
    background: linear-gradient(90deg, rgba(184,145,58,0.08) 0%, rgba(139,46,63,0.08) 100%);
    border-bottom: 1px solid var(--line);
    font-family: 'David Libre', serif;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.03em;
    font-style: italic;
  }

  @media (max-width: 540px) {
    .copyright-top {
      margin: -22px -14px 18px;
      font-size: 12px;
    }
  }

  /* Header */
  header {
    text-align: center;
    padding: 20px 0 32px;
    position: relative;
  }

  header::after {
    content: "❦";
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 22px;
    color: var(--gold);
    opacity: 0.6;
  }

  .brand-small {
    font-family: 'Heebo', sans-serif;
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .brand-title {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: clamp(32px, 6vw, 46px);
    font-weight: 900;
    line-height: 1.05;
    color: var(--ink);
  }

  .brand-title em {
    color: var(--burgundy);
    font-style: italic;
    font-weight: 500;
  }

  /* Tabs */
  .tabs {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-bottom: 24px;
    background: rgba(255,255,255,0.4);
    border-radius: 100px;
    padding: 5px;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.06);
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
  }

  .tab {
    flex: 1;
    background: transparent;
    border: none;
    padding: 11px 12px;
    border-radius: 100px;
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.25s;
  }

  .tab:hover { color: var(--ink); }

  .tab.active {
    background: var(--ink);
    color: var(--paper);
  }

  /* Category picker on home screen */
  .category-intro {
    text-align: center;
    margin-bottom: 28px;
  }

  .category-intro-title {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .category-intro-sub {
    color: var(--muted);
    font-size: 14px;
  }

  .categories-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }

  .category-card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 22px 16px;
    cursor: pointer;
    transition: all 0.25s;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .category-card::before {
    content: "";
    position: absolute;
    top: 0;
    right: 0;
    width: 100%;
    height: 4px;
    background: var(--gold);
    opacity: 0.8;
  }

  .category-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow);
    border-color: var(--gold);
  }

  .category-card-emoji {
    font-size: 36px;
    margin-bottom: 10px;
    line-height: 1;
  }

  .category-card-name {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 4px;
  }

  .category-card-count {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* Mixed category special style */
  .category-card.mixed {
    background: linear-gradient(135deg, var(--ink) 0%, var(--burgundy-dark) 100%);
    color: var(--paper);
  }

  .category-card.mixed .category-card-name { color: var(--paper); }
  .category-card.mixed .category-card-count { color: rgba(242,234,216,0.7); }
  .category-card.mixed::before { background: var(--gold-light); }

  /* Question area */
  .question-area {
    animation: fadeInUp 0.4s ease-out;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .question-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    font-size: 13px;
  }

  .question-category {
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .question-counter {
    font-family: 'Frank Ruhl Libre', serif;
    font-style: italic;
    color: var(--gold);
    font-size: 14px;
  }

  .question-card {
    background: linear-gradient(180deg, #fbf7ea 0%, #f4ecd6 100%);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 36px 28px;
    box-shadow: var(--shadow-lg);
    position: relative;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .question-card::before,
  .question-card::after {
    content: "";
    position: absolute;
    width: 40px;
    height: 40px;
    border: 2px solid var(--gold);
    opacity: 0.5;
  }

  .question-card::before {
    top: 12px;
    right: 12px;
    border-left: none;
    border-bottom: none;
  }

  .question-card::after {
    bottom: 12px;
    left: 12px;
    border-right: none;
    border-top: none;
  }

  .question-text {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: clamp(20px, 3.5vw, 26px);
    font-weight: 700;
    line-height: 1.4;
    color: var(--ink);
    text-align: center;
    position: relative;
    z-index: 1;
  }

  /* Answer buttons */
  .answers {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 24px;
  }

  .answer-btn {
    background: #fff;
    border: 2px solid var(--line);
    padding: 24px 28px;
    border-radius: 14px;
    font-family: 'Heebo', sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.25s;
    text-align: right;
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
    overflow: hidden;
    min-height: 70px;
  }

  .answer-btn:hover:not(:disabled) {
    border-color: var(--gold);
    transform: translateX(-4px);
    box-shadow: var(--shadow);
    background: linear-gradient(90deg, #fffdf5 0%, #fff 100%);
  }

  .answer-btn:disabled {
    cursor: default;
  }

  .answer-letter {
    flex-shrink: 0;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--paper-dark);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 22px;
    font-weight: 700;
    transition: all 0.25s;
  }

  .answer-btn.correct {
    background: rgba(61, 124, 79, 0.1);
    border-color: var(--success);
    color: var(--success);
  }

  .answer-btn.correct .answer-letter {
    background: var(--success);
    color: #fff;
  }

  .answer-btn.wrong {
    background: rgba(196, 66, 62, 0.1);
    border-color: var(--error);
    color: var(--error);
  }

  .answer-btn.wrong .answer-letter {
    background: var(--error);
    color: #fff;
  }

  /* Big check/X overlay */
  .answer-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 500;
    opacity: 0;
    animation: overlayShow 1.2s ease-out forwards;
  }

  @keyframes overlayShow {
    0% { opacity: 0; transform: scale(0.5); }
    20% { opacity: 1; transform: scale(1.1); }
    30% { transform: scale(1); }
    70% { opacity: 1; }
    100% { opacity: 0; transform: scale(1); }
  }

  .answer-overlay-icon {
    font-size: 160px;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.2));
  }

  .answer-overlay.correct .answer-overlay-icon {
    color: var(--success);
  }

  .answer-overlay.wrong .answer-overlay-icon {
    color: var(--error);
  }

  /* Explanation card (shown after answering) */
  .explanation {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 24px 26px;
    margin-bottom: 20px;
    animation: fadeInUp 0.4s ease-out;
    border-right: 4px solid var(--gold);
  }

  .explanation-label {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 8px;
  }

  .explanation-text {
    font-family: 'David Libre', serif;
    font-size: 17px;
    line-height: 1.7;
    color: var(--ink);
  }

  /* Next button */
  .next-btn {
    width: 100%;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 16px 24px;
    border-radius: 12px;
    font-family: 'Heebo', sans-serif;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .next-btn:hover {
    background: var(--burgundy-dark);
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }

  .next-btn svg { width: 18px; height: 18px; fill: currentColor; }

  /* Auto-advance progress bar */
  .auto-advance {
    margin-top: 16px;
    text-align: center;
    animation: fadeInUp 0.4s ease-out;
  }

  .auto-advance-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }

  .auto-advance-bar {
    height: 3px;
    background: var(--paper-dark);
    border-radius: 100px;
    overflow: hidden;
    max-width: 200px;
    margin: 0 auto;
  }

  .auto-advance-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold) 0%, var(--burgundy) 100%);
    border-radius: 100px;
    width: 100%;
    animation: countdownFill 2s linear forwards;
    transform-origin: right;
  }

  @keyframes countdownFill {
    from { transform: scaleX(1); }
    to { transform: scaleX(0); }
  }

  .skip-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    margin-top: 10px;
    text-decoration: underline;
    font-family: inherit;
  }

  .skip-btn:hover { color: var(--burgundy); }

  .back-btn {
    background: transparent;
    border: 1px solid var(--line);
    padding: 10px 20px;
    border-radius: 100px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    margin-bottom: 20px;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .back-btn:hover {
    border-color: var(--ink);
    color: var(--ink);
  }

  /* Stats view */
  .stats-section {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
  }

  .stats-title {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .stats-subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 24px;
  }

  .stats-main {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    background: var(--paper-dark);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .stats-main-item {
    background: #fff;
    padding: 20px 14px;
    text-align: center;
  }

  .stats-big-num {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 32px;
    font-weight: 700;
    line-height: 1;
    color: var(--ink);
  }

  .stats-big-num.success { color: var(--success); }
  .stats-big-num.error { color: var(--error); }

  .stats-big-lbl {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .score-display {
    text-align: center;
    padding: 30px 0;
  }

  .score-number {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 72px;
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, var(--burgundy) 0%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .score-label {
    color: var(--muted);
    font-size: 14px;
    margin-top: 8px;
  }

  /* Category breakdown */
  .cat-breakdown {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-top: 20px;
  }

  .cat-row {
    display: grid;
    grid-template-columns: 36px 1fr auto;
    align-items: center;
    gap: 14px;
  }

  .cat-emoji {
    font-size: 22px;
    text-align: center;
  }

  .cat-bar-wrap {
    background: var(--paper-dark);
    border-radius: 100px;
    height: 8px;
    overflow: hidden;
  }

  .cat-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold) 0%, var(--success) 100%);
    border-radius: 100px;
    transition: width 0.6s ease-out;
  }

  .cat-label {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .cat-count {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 15px;
    font-weight: 700;
    min-width: 40px;
    text-align: center;
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 50px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
    font-size: 12px;
    color: var(--muted);
  }

  .reset-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    text-decoration: underline;
    font-size: 12px;
    font-family: inherit;
    margin-right: 12px;
  }

  .reset-btn:hover { color: var(--burgundy); }

  .loading {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 60vh;
    color: var(--muted);
    font-family: 'David Libre', serif;
    font-size: 18px;
    font-style: italic;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--muted);
  }

  .empty-icon {
    font-size: 56px;
    margin-bottom: 14px;
    opacity: 0.5;
  }

  /* Mobile */
  @media (max-width: 540px) {
    .container { padding: 20px 14px 60px; }
    .question-card { padding: 28px 20px; }
    .answer-btn { padding: 16px 18px; font-size: 15px; }
    .categories-grid { grid-template-columns: repeat(2, 1fr); }
    .answer-overlay-icon { font-size: 120px; }
  }
</style>
</head>
<body>

<div class="container" id="app">
  <div class="loading">טוען...</div>
</div>

<script>
// ============ CATEGORIES & QUESTIONS ============
const CATEGORIES = {
  science: { name: "מדע ופלאי הטבע", emoji: "🧠" },
  history: { name: "היסטוריה", emoji: "🏛️" },
  geography: { name: "גיאוגרפיה ומדינות", emoji: "🌍" },
  tech: { name: "המצאות וטכנולוגיה", emoji: "💡" },
  culture: { name: "אמנות ותרבות", emoji: "🎭" },
  language: { name: "שפה ומילים", emoji: "📚" },
  nature: { name: "חיות וטבע", emoji: "🦁" },
  food: { name: "אוכל ובישול", emoji: "🍎" },
  bible: { name: "תנ״ך ומורשת יהודית", emoji: "📜" },
  music: { name: "מוזיקה וקולנוע", emoji: "🎬" },
};

const QUESTIONS = [

  // ===== SCIENCE (מדע ופלאי הטבע) =====
  { cat: "science", q: "איזה איבר בגוף הוא הצרכן האנרגטי הגדול ביותר?", a: ["הלב", "המוח"], correct: 1, exp: "למרות שהמוח הוא רק 2% ממשקל הגוף, הוא צורך 20% מהאנרגיה של הגוף." },
  { cat: "science", q: "כמה לבבות יש לתמנון?", a: ["שלושה", "אחד"], correct: 0, exp: "לתמנון יש שלושה לבבות - שניים לזימים ואחד לשאר הגוף. הדם שלו כחול!" },
  { cat: "science", q: "מה טמפרטורת הברק?", a: ["1,000°C", "30,000°C"], correct: 1, exp: "ברק מגיע לכ-30,000°C - פי 5 מטמפרטורת פני השמש!" },

// ============ STATE ============
let state = {
  answered: [],  // [{ questionId, correct, category, timestamp }]
  currentView: 'home', // 'home' | 'question' | 'stats'
  currentCategory: null, // selected category key, or 'mixed'
  currentQuestion: null, // current question index in QUESTIONS
  answerGiven: null, // index of answer given, or null
  lastQuestions: [], // IDs of recent questions to avoid repeats
};

// ============ STORAGE ============
async function loadState() {
  try {
    if (window.storage) {
      const result = await window.storage.get('quiz_app_state');
      if (result && result.value) {
        const saved = JSON.parse(result.value);
        state.answered = saved.answered || [];
        state.lastQuestions = saved.lastQuestions || [];
      }
    }
  } catch (e) {
    // First time - that's fine
  }
}

async function saveState() {
  try {
    if (window.storage) {
      await window.storage.set('quiz_app_state', JSON.stringify({
        answered: state.answered,
        lastQuestions: state.lastQuestions.slice(-30),
      }));
    }
  } catch (e) {
    console.error('Save error:', e);
  }
}

// ============ HELPERS ============
function getQuestionId(q) {
  return QUESTIONS.indexOf(q);
}

function pickRandomQuestion(category) {
  let pool;
  if (category === 'mixed') {
    pool = QUESTIONS.map((q, i) => i);
  } else {
    pool = QUESTIONS.map((q, i) => ({ q, i })).filter(x => x.q.cat === category).map(x => x.i);
  }

  // Exclude recently answered questions to avoid repetition
  const recent = new Set(state.lastQuestions);
  let freshPool = pool.filter(i => !recent.has(i));

  // If all have been seen recently, use the full pool (cycle starts again)
  if (freshPool.length === 0) {
    freshPool = pool;
    state.lastQuestions = [];
  }

  const chosen = freshPool[Math.floor(Math.random() * freshPool.length)];
  state.lastQuestions.push(chosen);
  if (state.lastQuestions.length > 30) state.lastQuestions.shift();

  return chosen;
}

function getCategoryCount(category) {
  if (category === 'mixed') return QUESTIONS.length;
  return QUESTIONS.filter(q => q.cat === category).length;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

    <nav class="tabs">
      <button class="tab ${view === 'home' ? 'active' : ''}" onclick="goHome()">שחק</button>
      <button class="tab ${view === 'stats' ? 'active' : ''}" onclick="switchView('stats')">ההישגים שלי</button>
    </nav>

    ${content}

    <div class="footer">
      משחק בכל זמן שיש לך פנאי
      <button class="reset-btn" onclick="resetData()">איפוס נתונים</button>
    </div>
  `;
}

function renderHome() {
  const totalAnswered = state.answered.length;
  const correctCount = state.answered.filter(a => a.correct).length;
  const accuracy = totalAnswered > 0 ? Math.round((correctCount / totalAnswered) * 100) : 0;

  return `
    <div class="category-intro">
      <div class="category-intro-title">בחר תחום ונתחיל</div>
      <div class="category-intro-sub">
        ${totalAnswered > 0
          ? `ענית על ${totalAnswered} שאלות עד עכשיו, דיוק של ${accuracy}%`
          : 'השאלה הראשונה שלך מחכה'}
      </div>
    </div>

    <div class="categories-grid">
      <div class="category-card mixed" onclick="startQuiz('mixed')">
        <div class="category-card-emoji">🎲</div>
        <div class="category-card-name">הכל מעורב</div>
        <div class="category-card-count">${QUESTIONS.length} שאלות מכל התחומים</div>
      </div>
      ${Object.entries(CATEGORIES).map(([key, cat]) => `
        <div class="category-card" onclick="startQuiz('${key}')">
          <div class="category-card-emoji">${cat.emoji}</div>
          <div class="category-card-name">${cat.name}</div>
          <div class="category-card-count">${getCategoryCount(key)} שאלות</div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderQuestion() {
  const q = QUESTIONS[state.currentQuestion];
  const category = CATEGORIES[q.cat];
  const answered = state.answerGiven !== null;
  const totalAnsweredInCategory = state.answered.filter(a =>
    state.currentCategory === 'mixed' ? true : a.category === state.currentCategory
  ).length;

  return `
    <button class="back-btn" onclick="goHome()">← חזרה לתחומים</button>

    <div class="question-area">
      <div class="question-meta">
        <span class="question-category">${category.emoji} ${category.name}</span>
        <span class="question-counter">שאלה ${totalAnsweredInCategory + 1}</span>
      </div>

      <div class="question-card">
        <h2 class="question-text">${q.q}</h2>
      </div>

      <div class="answers">
        ${q.a.map((ans, i) => {
          let cls = 'answer-btn';
          if (answered) {
            if (i === q.correct) cls += ' correct';
            else if (i === state.answerGiven) cls += ' wrong';
          }
          const letters = q.a.length === 2 ? ['א', 'ב'] : ['א', 'ב', 'ג', 'ד'];
          return `
            <button class="${cls}"
                    onclick="answerQuestion(${i})"
                    ${answered ? 'disabled' : ''}>
              <span class="answer-letter">${letters[i]}</span>
              <span>${ans}</span>
            </button>
          `;
        }).join('')}
      </div>

      ${answered ? `
        <div class="explanation">
          <div class="explanation-label">ההסבר</div>
          <div class="explanation-text">${q.exp}</div>
        </div>

        <div class="auto-advance">
          <div class="auto-advance-label">מיד לשאלה הבאה...</div>
          <div class="auto-advance-bar">
            <div class="auto-advance-fill"></div>
          </div>
          <button class="skip-btn" onclick="nextQuestion()">עבור מיד</button>
        </div>
      ` : ''}
    </div>
  `;
}

function renderStats() {
  const total = state.answered.length;
  const correct = state.answered.filter(a => a.correct).length;
  const wrong = total - correct;
  const accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;

  // Per category stats
  const catStats = {};
  Object.keys(CATEGORIES).forEach(key => {
    const inCat = state.answered.filter(a => a.category === key);
    catStats[key] = {
      total: inCat.length,
      correct: inCat.filter(a => a.correct).length,
    };
  });

  const maxCatCount = Math.max(1, ...Object.values(catStats).map(s => s.total));

  if (total === 0) {
    return `
      <div class="empty-state">
        <div class="empty-icon">🎯</div>
        <div style="margin-bottom: 20px;">עוד לא ענית על אף שאלה</div>
        <button class="next-btn" onclick="goHome()" style="max-width: 280px; margin: 0 auto;">
          התחל לשחק
        </button>
      </div>
    `;
  }

  return `
    <div class="stats-section">
      <div class="stats-title">ההישגים שלך</div>
      <div class="stats-subtitle">סיכום כל המשחקים</div>

      <div class="score-display">
        <div class="score-number">${accuracy}%</div>
        <div class="score-label">אחוז הצלחה</div>
      </div>

      <div class="stats-main">
        <div class="stats-main-item">
          <div class="stats-big-num">${total}</div>
          <div class="stats-big-lbl">שאלות</div>
        </div>
        <div class="stats-main-item">
          <div class="stats-big-num success">${correct}</div>
          <div class="stats-big-lbl">נכונות</div>
        </div>
        <div class="stats-main-item">
          <div class="stats-big-num error">${wrong}</div>
          <div class="stats-big-lbl">שגויות</div>
        </div>
      </div>
    </div>

    <div class="stats-section">
      <div class="stats-title">פירוט לפי תחום</div>
      <div class="stats-subtitle">כמה שאלות ענית בכל תחום</div>

      <div class="cat-breakdown">
        ${Object.entries(CATEGORIES).map(([key, cat]) => {
          const s = catStats[key];
          const percent = (s.total / maxCatCount) * 100;
          const catAccuracy = s.total > 0 ? Math.round((s.correct / s.total) * 100) : 0;
          return `
            <div class="cat-row">
              <div class="cat-emoji">${cat.emoji}</div>
              <div>
                <div class="cat-bar-wrap">
                  <div class="cat-bar-fill" style="width: ${percent}%"></div>
                </div>
                <div class="cat-label">${cat.name} ${s.total > 0 ? `· ${catAccuracy}% נכון` : ''}</div>
              </div>
              <div class="cat-count">${s.correct}/${s.total}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

// ============ ACTIONS ============
function startQuiz(category) {
  state.currentCategory = category;
  state.currentQuestion = pickRandomQuestion(category);
  state.answerGiven = null;
  state.currentView = 'question';
  render();
}

let autoAdvanceTimer = null;

function answerQuestion(answerIndex) {
  if (state.answerGiven !== null) return;

  const q = QUESTIONS[state.currentQuestion];
  const isCorrect = answerIndex === q.correct;

  state.answerGiven = answerIndex;
  state.answered.push({
    questionId: state.currentQuestion,
    category: q.cat,
    correct: isCorrect,
    timestamp: Date.now(),
  });

  // Show feedback
  if (isCorrect) {
    showCorrectFeedback();
  } else {
    showWrongFeedback();
  }

  // Haptic feedback (works on some mobile browsers)
  if (navigator.vibrate) {
    navigator.vibrate(isCorrect ? [100] : [150, 80, 150]);
  }

  saveState();
  render();

  // Auto-advance to next question after 2 seconds
  if (autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
  autoAdvanceTimer = setTimeout(() => {
    if (state.answerGiven !== null && state.currentView === 'question') {
      nextQuestion();
    }
  }, 2000);
}

function showCorrectFeedback() {
  // Green flash
  document.body.classList.add('success-flash');
  setTimeout(() => document.body.classList.remove('success-flash'), 700);

  // Big checkmark
  const overlay = document.createElement('div');
  overlay.className = 'answer-overlay correct';
  overlay.innerHTML = '<div class="answer-overlay-icon">✓</div>';
  document.body.appendChild(overlay);
  setTimeout(() => overlay.remove(), 1300);

  // Happy sound
  playSound('correct');
}

function showWrongFeedback() {
  // Screen shake
  document.body.classList.add('shake');
  setTimeout(() => document.body.classList.remove('shake'), 600);

  // Big X
  const overlay = document.createElement('div');
  overlay.className = 'answer-overlay wrong';
  overlay.innerHTML = '<div class="answer-overlay-icon">✕</div>';
  document.body.appendChild(overlay);
  setTimeout(() => overlay.remove(), 1300);

  // Sad sound
  playSound('wrong');
}

function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === 'correct') {
      // Happy chime: C - E - G
      osc.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
      osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.15); // E5
      osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.3); // G5
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.6);
      osc.start();
      osc.stop(ctx.currentTime + 0.6);
    } else {
      // Sad tone: going down
      osc.frequency.setValueAtTime(400, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.4);
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
      osc.start();
      osc.stop(ctx.currentTime + 0.4);
    }
  } catch (e) {
    // Audio not available - silent fallback
  }
}

function nextQuestion() {
  if (autoAdvanceTimer) {
    clearTimeout(autoAdvanceTimer);
    autoAdvanceTimer = null;
  }
  state.currentQuestion = pickRandomQuestion(state.currentCategory);
  state.answerGiven = null;
  render();

  // Scroll to top smoothly
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goHome() {
  if (autoAdvanceTimer) {
    clearTimeout(autoAdvanceTimer);
    autoAdvanceTimer = null;
  }
  state.currentView = 'home';
  state.currentCategory = null;
  state.currentQuestion = null;
  state.answerGiven = null;
  render();
}

function switchView(view) {
  if (autoAdvanceTimer) {
    clearTimeout(autoAdvanceTimer);
    autoAdvanceTimer = null;
  }
  state.currentView = view;
  state.answerGiven = null;
  render();
}

async function resetData() {
  if (confirm('האם לאפס את כל הנתונים? פעולה זו בלתי הפיכה.')) {
    state.answered = [];
    state.lastQuestions = [];
    await saveState();
    goHome();
  }
}

// ============ INIT ============
(async () => {
  await loadState();
  render();

  if ('serviceWorker' in navigator) {
    try {
      await navigator.serviceWorker.register('service-worker.js');
    } catch (e) {}
  }
})();
</script>
</body>
</html>
