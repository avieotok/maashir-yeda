// ============ QUIZ SCORING ============
function calculateAnswerPoints(isCorrect, currentStreak) {
  // 10 points per correct. +5 bonus when hitting milestones of streak 3, 5, 10.
  if (!isCorrect) return 0;
  let pts = 10;
  if (currentStreak === 3) pts += 5;       // hitting 3-in-a-row
  else if (currentStreak === 5) pts += 15; // hitting 5-in-a-row
  else if (currentStreak === 10) pts += 30; // hitting 10-in-a-row
  else if (currentStreak > 0 && currentStreak % 5 === 0) pts += 15; // every 5 after
  return pts;
}

function startQuiz(category, length) {
  // If called without an explicit length, show the length picker first.
  if (length === undefined) {
    pickQuizLength(category);
    return;
  }

  // Clear any pending operations from previous question
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  stopCountdown();
  MusicEngine.stop();

  // Reset per-session quiz stats
  state.quizLength = length;          // 20, 40, or null
  state.quizAnswered = 0;
  state.quizCorrect = 0;
  state.quizCurrentStreak = 0;
  state.quizBestStreak = 0;
  state.quizScore = 0;

  state.currentCategory = category;
  state.currentQuestion = pickRandomQuestion(category);
  state.answerGiven = null;
  state.currentAnswerOrder = null;
  state.currentView = 'question';
  state.examMode = false;
  state.dailyMode = false;
  state.mistakesMode = false;
  // Learning mode: show explanation first
  state.showingExplanation = state.learningMode;
  render();

  // Start tension music (unless in learning mode showing explanation)
  if (!state.showingExplanation) {
    MusicEngine.start();
  }

  // Start timer if in timer mode (but not in learning mode)
  if (state.timerMode && !state.learningMode) {
    startCountdown();
  }
}

// ============ DAILY CHALLENGE GAMEPLAY ============
function playDailyChallenge() {
  const today = getTodayString();
  if (state.dailyChallenge.lastPlayedDate === today) {
    showInfoToast('כבר שיחקת היום! חזור מחר 📅');
    return;
  }
  const qId = getDailyQuestionId();
  state.currentQuestion = qId;
  state.currentCategory = QUESTIONS[qId].cat;
  state.answerGiven = null;
  state.currentAnswerOrder = null;
  state.currentView = 'question';
  state.examMode = false;
  state.mistakesMode = false;
  state.dailyMode = true;
  state.showingExplanation = false; // daily always direct - no learning mode
  render();
  MusicEngine.start();
}

function finalizeDailyChallenge(isCorrect) {
  const today = getTodayString();
  const yesterday = getYesterdayString();
  const dc = state.dailyChallenge;

  // Update streak
  if (dc.lastPlayedDate === yesterday) {
    dc.dailyStreak = (dc.dailyStreak || 0) + 1;
  } else {
    dc.dailyStreak = 1;
  }
  if (dc.dailyStreak > (dc.bestDailyStreak || 0)) {
    dc.bestDailyStreak = dc.dailyStreak;
  }
  dc.lastPlayedDate = today;
  dc.lastQuestionId = state.currentQuestion;
  dc.lastCorrect = isCorrect;

  // Note: dailyMode is reset inside nextQuestion after showing the answer
  saveState();
}

// ============ MISTAKES PRACTICE ============
function startMistakesPractice() {
  const ids = getMistakeQuestionIds();
  if (ids.length === 0) {
    showInfoToast('אין טעויות לתרגול כרגע 🎉');
    return;
  }
  // Shuffle
  const shuffled = [...ids].sort(() => Math.random() - 0.5);
  state.mistakesQueue = shuffled;
  state.mistakesMode = true;
  state.dailyMode = false;
  state.examMode = false;
  state.currentQuestion = state.mistakesQueue[0];
  state.currentCategory = QUESTIONS[state.currentQuestion].cat;
  state.answerGiven = null;
  state.currentAnswerOrder = null;
  state.currentView = 'question';
  state.showingExplanation = false;
  state._mistakesFixed = state._mistakesFixed || 0;
  render();
  MusicEngine.start();
}

function nextMistakeQuestion() {
  // Remove current from queue
  state.mistakesQueue.shift();
  if (state.mistakesQueue.length === 0) {
    state.mistakesMode = false;
    MusicEngine.stop();
    showInfoToast('🎉 סיימת לתרגל את כל הטעויות!');
    goHome();
    return;
  }
  state.currentQuestion = state.mistakesQueue[0];
  state.currentCategory = QUESTIONS[state.currentQuestion].cat;
  state.answerGiven = null;
  state.currentAnswerOrder = null;
  render();
  MusicEngine.start();
}

// ============ EXAM MODE ============
function startExam() {
  // Pick 20 random questions from ALL questions (ignoring difficulty filter)
  const allIds = QUESTIONS.map((q, i) => i);
  const shuffled = allIds.sort(() => Math.random() - 0.5);
  state.examQuestions = shuffled.slice(0, 20);
  state.examAnswers = [];
  state.examIndex = 0;
  state.examMode = true;
  state.dailyMode = false;
  state.mistakesMode = false;
  state.currentQuestion = state.examQuestions[0];
  state.answerGiven = null;
  state.currentAnswerOrder = null;
  state.currentView = 'exam';
  render();
  MusicEngine.start();

  // Always use 15 seconds timer in exam mode (a bit more relaxed)
  // Actually, make it clean - no timer in exam mode unless user wants
}

function examAnswerQuestion(answerIndex) {
  const q = QUESTIONS[state.currentQuestion];
  const isCorrect = answerIndex === q.correct;
  state.answerGiven = answerIndex;
  state.examAnswers.push(isCorrect);

  if (isCorrect) {
    showCorrectFeedback();
    MusicEngine.playCorrectSound();
  } else {
    showWrongFeedback();
    MusicEngine.playWrongSound();
  }

  if (navigator.vibrate) {
    navigator.vibrate(isCorrect ? [100] : [150, 80, 150]);
  }

  render();

  // Auto-advance — 3 seconds when wrong (to see correct answer), 2 seconds when correct
  if (autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
  autoAdvanceTimer = setTimeout(() => {
    nextExamQuestion();
  }, isCorrect ? 2000 : 4000);
}

function nextExamQuestion() {
  if (autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
  state.examIndex++;

  if (state.examIndex >= state.examQuestions.length) {
    // Exam finished - show results
    state.currentView = 'exam-result';
    state.examMode = false;
    MusicEngine.stop();

    // Save exam score to Firebase history
    const total = state.examQuestions.length;
    const correct = state.examAnswers.filter(a => a).length;
    const percentage = Math.round((correct / total) * 100);
    if (typeof saveUserScore === 'function') {
      saveUserScore({
        type: 'exam',
        mode: 'exam',
        category: 'mixed',
        categoryLabel: 'מבחן כללי',
        correct: correct,
        total: total,
        percentage: percentage
      });
    }

    // Check for perfect exam achievement
    const correctCount = correct;
    if (correctCount === state.examQuestions.length) {
      state._lastPerfectExam = true;
      const newAch = checkAchievements();
      if (newAch.length > 0) {
        setTimeout(() => {
          newAch.forEach((ach, idx) => {
            setTimeout(() => showAchievementUnlock(ach), idx * 800);
          });
        }, 800);
      }
      state._lastPerfectExam = false;
    }

    saveState();
    render();
  } else {
    state.currentQuestion = state.examQuestions[state.examIndex];
    state.answerGiven = null;
  state.currentAnswerOrder = null;
    render();
    MusicEngine.start(); // resume tension for next question
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function exitExam() {
  state.examMode = false;
  state.examQuestions = [];
  state.examAnswers = [];
  state.examIndex = 0;
  MusicEngine.stop();
  goHome();
}

let autoAdvanceTimer = null;

function answerQuestion(answerIndex) {
  if (state.answerGiven !== null) return;

  // Stop the countdown when user answers
  stopCountdown();

  // Stop tension music and play result sound
  MusicEngine.stop();

  // In exam mode - handle differently
  if (state.examMode) {
    return examAnswerQuestion(answerIndex);
  }

  const q = QUESTIONS[state.currentQuestion];
  const isCorrect = answerIndex === q.correct;

  // Play result sound
  if (isCorrect) {
    MusicEngine.playCorrectSound();
  } else {
    MusicEngine.playWrongSound();
  }

  state.answerGiven = answerIndex;
  state.answered.push({
    questionId: state.currentQuestion,
    category: q.cat,
    correct: isCorrect,
    timestamp: Date.now(),
  });

  // If mistakes practice and got it right now - count as "fixed"
  if (state.mistakesMode && isCorrect) {
    state._mistakesFixed = (state._mistakesFixed || 0) + 1;
  }

  // If daily challenge - finalize streak and mark played
  if (state.dailyMode) {
    finalizeDailyChallenge(isCorrect);
  }

  // Update streak
  if (isCorrect) {
    state.currentStreak++;
    if (state.currentStreak > state.bestStreak) {
      state.bestStreak = state.currentStreak;
    }
  } else {
    state.currentStreak = 0;
  }

  // Track daily challenge progress
  if (typeof trackChallengeProgress === 'function') {
    trackChallengeProgress(isCorrect, q.cat, false);
  }

  // Update QUIZ-SESSION stats (separate from global stats)
  state.quizAnswered = (state.quizAnswered || 0) + 1;
  if (isCorrect) {
    state.quizCorrect = (state.quizCorrect || 0) + 1;
    state.quizCurrentStreak = (state.quizCurrentStreak || 0) + 1;
    if (state.quizCurrentStreak > (state.quizBestStreak || 0)) {
      state.quizBestStreak = state.quizCurrentStreak;
    }
  } else {
    state.quizCurrentStreak = 0;
  }
  // Add points for this answer (based on quiz streak, not global)
  state.quizScore = (state.quizScore || 0) + calculateAnswerPoints(isCorrect, state.quizCurrentStreak);

  // Show feedback
  if (isCorrect) {
    showCorrectFeedback();
    // Special streak celebration for milestones
    if (state.currentStreak === 5 || state.currentStreak === 10 ||
        state.currentStreak === 20 || state.currentStreak === 50) {
      setTimeout(() => showStreakMilestone(state.currentStreak), 800);
    }
  } else {
    showWrongFeedback();
  }

  // Haptic feedback (works on some mobile browsers)
  if (navigator.vibrate) {
    navigator.vibrate(isCorrect ? [100] : [150, 80, 150]);
  }

  saveState();
  render();

  // Check for newly unlocked achievements
  const newAch = checkAchievements();
  if (newAch.length > 0) {
    // Show after a small delay so streak toast doesn't overlap
    setTimeout(() => {
      newAch.forEach((ach, idx) => {
        setTimeout(() => showAchievementUnlock(ach), idx * 800);
      });
      saveState();
    }, 1200);
  }

  // Auto-advance to next question — 3 seconds when wrong (to see correct answer), 2 seconds when correct
  if (autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
  autoAdvanceTimer = setTimeout(() => {
    if (state.answerGiven !== null && state.currentView === 'question') {
      nextQuestion();
    }
  }, isCorrect ? 2000 : 4000);
}

function showStreakMilestone(streak) {
  const msg = document.createElement('div');
  msg.className = 'streak-toast';
  msg.innerHTML = `
    <div class="streak-fire">🔥</div>
    <div class="streak-msg">שרשרת של ${streak}!</div>
    <div class="streak-sub">המשך ככה!</div>
  `;
  document.body.appendChild(msg);
  setTimeout(() => msg.remove(), 2000);
}

function showCorrectFeedback() {
  // Green flash
  document.body.classList.add('success-flash');
  setTimeout(() => document.body.classList.remove('success-flash'), 700);

  // Big checkmark
  const overlay = document.createElement('div');
  overlay.className = 'answer-overlay correct';
  overlay.innerHTML = '<div class="answer-overlay-icon">✓</div>';
  document.body.appendChild(overlay);
  setTimeout(() => overlay.remove(), 1300);

  // Happy sound
  playSound('correct');
}

function showWrongFeedback() {
  // Screen shake
  document.body.classList.add('shake');
  setTimeout(() => document.body.classList.remove('shake'), 600);

  // Big X
  const overlay = document.createElement('div');
  overlay.className = 'answer-overlay wrong';
  overlay.innerHTML = '<div class="answer-overlay-icon">✕</div>';
  document.body.appendChild(overlay);
  setTimeout(() => overlay.remove(), 1300);

  // Sad sound
  playSound('wrong');
}

function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === 'correct') {
      // Happy chime: C - E - G
      osc.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
      osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.15); // E5
      osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.3); // G5
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.6);
      osc.start();
      osc.stop(ctx.currentTime + 0.6);
    } else {
      // Sad tone: going down
      osc.frequency.setValueAtTime(400, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.4);
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
      osc.start();
      osc.stop(ctx.currentTime + 0.4);
    }
  } catch (e) {
    // Audio not available - silent fallback
  }
}

function nextQuestion() {
  if (autoAdvanceTimer) {
    clearTimeout(autoAdvanceTimer);
    autoAdvanceTimer = null;
  }
  stopCountdown();

  // Daily mode: one question only, go home after
  if (state.dailyMode) {
    state.dailyMode = false;
    goHome();
    return;
  }

  // Mistakes mode: advance through the queue
  if (state.mistakesMode) {
    nextMistakeQuestion();
    return;
  }

  // If quiz has a length limit and we've reached it → finish the quiz
  if (state.quizLength && state.quizAnswered >= state.quizLength) {
    finishQuiz();
    return;
  }

  // Holiday quiz mode - pick next holiday question
  if (state._holidayQuiz && state._holidayQuiz.active && state._holidayQuestions) {
    state._holidayQuizIndex = (state._holidayQuizIndex || 0) + 1;
    if (state._holidayQuizIndex >= state._holidayQuestions.length) {
      // Out of holiday questions - finish
      finishQuiz();
      return;
    }
    state.currentQuestion = QUESTIONS.indexOf(state._holidayQuestions[state._holidayQuizIndex]);
    state.answerGiven = null;
    state.currentAnswerOrder = null;
    state.showingExplanation = state.learningMode;
    render();
    if (!state.showingExplanation) {
      MusicEngine.start();
    }
    return;
  }

  state.currentQuestion = pickRandomQuestion(state.currentCategory);
  state.answerGiven = null;
  state.currentAnswerOrder = null;
  // Learning mode: show explanation first
  state.showingExplanation = state.learningMode;
  render();

  // Resume tension music for the next question (unless in learning explanation phase)
  if (!state.showingExplanation) {
    MusicEngine.start();
  }

  // Scroll to top smoothly
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // Start timer if in timer mode (but not in learning mode)
  if (state.timerMode && !state.learningMode) {
    startCountdown();
  }
}

function finishQuiz() {
  // Stop everything and navigate to quiz results screen
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  stopCountdown();
  MusicEngine.stop();

  // Save score to Firebase
  const answered = state.quizAnswered || 0;
  const correct = state.quizCorrect || 0;
  const percentage = answered > 0 ? Math.round((correct / answered) * 100) : 0;

  let cat, catLabel, mode;
  if (state._holidayQuiz && state._holidayQuiz.active) {
    const holiday = state._holidayQuiz.holiday;
    cat = 'holiday_' + holiday.id;
    catLabel = `${holiday.emoji} חידון ${holiday.name}`;
    mode = 'holiday';
  } else {
    cat = state.currentCategory;
    const catInfo = CATEGORIES[cat];
    catLabel = catInfo ? catInfo.name : 'מעורב';
    mode = 'quiz';
  }

  saveUserScore({
    type: mode,
    mode: mode,
    category: cat || 'mixed',
    categoryLabel: catLabel,
    correct: correct,
    total: answered,
    percentage: percentage,
    score: state.quizScore || 0
  });

  // Reset holiday state
  if (state._holidayQuiz) {
    state._holidayQuiz = null;
    state._holidayQuestions = null;
    state._holidayQuizIndex = 0;
  }

  state.currentView = 'quiz-result';
  render();

  // Celebration haptic
  if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);
}

// Save user score to Firebase - for admin to see later
async function saveUserScore(scoreData) {
  try {
    const reg = (typeof getRegistrationStatus === 'function') ? (getRegistrationStatus() || {}) : {};
    if (!reg.id) return;  // No registration - no saving
    if (!window.FB_READY || !window.FB) return;

    const userScore = {
      ...scoreData,
      regId: reg.id,
      firstName: reg.firstName || '',
      lastName: reg.lastName || '',
      phone: reg.phone || '',
      timestamp: Date.now(),
      isDev: reg.isDev || false
    };

    // Save in user-specific location (latest score per user)
    await window.FB.update(`userScores/${reg.id}`, {
      latestScore: userScore,
      lastPlayedAt: Date.now()
    });

    // Also save in history with unique ID
    const historyId = 'score_' + Date.now() + '_' + Math.random().toString(36).substring(2, 6);
    await window.FB.set(`userScores/${reg.id}/history/${historyId}`, userScore);
  } catch (e) {
    console.warn('Failed to save score:', e);
  }
}

function confirmFinishQuiz() {
  // User clicked finish during unlimited/mid-quiz
  if (state.quizAnswered === 0) {

function switchView(view) {
  // Guard: if user is in register flow, don't let them navigate elsewhere
  // (except to admin panel via URL, which bypasses this)
  const currentView = state.currentView;
  if (['register', 'register-pending', 'register-blocked'].includes(currentView)) {
    // Allow staying in register views OR navigating to duel views for guest mode
    const allowedForGuests = ['register', 'register-pending', 'register-blocked', 'duel-join', 'duel-player-lobby', 'duel-play', 'duel-result'];
    if (!allowedForGuests.includes(view)) {
      return; // Block the navigation
    }
    // Only allow duel views if in guest mode
    if (view.startsWith('duel-') && !state.guestMode) {
      return;
    }
  }

  if (autoAdvanceTimer) {
    clearTimeout(autoAdvanceTimer);
    autoAdvanceTimer = null;
  }
  stopCountdown();
  state.currentView = view;
  state.answerGiven = null;
  state.currentAnswerOrder = null;
  render();
}

// Generate random 5-char room code (uppercase letters + digits)
function generateRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // Avoided I/O/0/1 confusion
  let code = '';
  for (let i = 0; i < 5; i++) {
    code += chars[Math.floor(Math.random() * chars.length)];
  }
  return code;
}

// Wait for Firebase to be ready
async function waitForFirebase() {
  if (window.FB_READY) return;
  await new Promise(resolve => {
    document.addEventListener('firebase-ready', resolve, { once: true });
    setTimeout(resolve, 5000); // Failsafe: don't wait forever
  });
}

// Clean up all Firebase listeners for current room
function cleanupGroupListeners() {
  groupState.listeners.forEach(unsub => {
    try { unsub(); } catch (e) {}
  });
  groupState.listeners = [];
  if (groupState.countdownInterval) {
    clearInterval(groupState.countdownInterval);
    groupState.countdownInterval = null;
  }
  if (groupState.questionTimer) {
    clearTimeout(groupState.questionTimer);
    groupState.questionTimer = null;
  }
}

// Leave the room (player) or close the room (host)
async function leaveGroupRoom() {
  try {
    await waitForFirebase();
    if (groupState.roomCode) {
      if (groupState.isHost) {
        // Host closes room - delete it
        await window.FB.remove(`rooms/${groupState.roomCode}`);
      } else if (groupState.playerId) {
        // Player leaves - remove self
        await window.FB.remove(`rooms/${groupState.roomCode}/players/${groupState.playerId}`);
      }
    }
  } catch (e) {
    console.warn('Leave room error:', e);
  }
  cleanupGroupListeners();
  groupState.roomCode = null;
  groupState.isHost = false;
  groupState.playerId = null;
  groupState.playerName = null;
  groupState.currentQuestion = null;
  groupState.currentQuestionIndex = 0;
  groupState.myAnswer = null;
  groupState.gameQuestions = [];
  state.currentView = 'home';
  render();
}

  // Generate unique room code (try up to 5 times)
  let roomCode = null;
  for (let i = 0; i < 5; i++) {
    const candidate = generateRoomCode();
    try {
      const snapshot = await window.FB.get(`rooms/${candidate}`);
      if (!snapshot.exists()) {
        roomCode = candidate;
        break;
      }
    } catch (e) {
      console.error('Error checking room:', e);
    }
  }

  if (!roomCode) {
    alert('לא ניצלנו ליצור חדר. נסה שוב.');
    return;
  }

  // Filter questions based on host's category choice
  let sourceQuestions = [];
  const isYouth = hostSetup.pool === 'youth';
  const activeCats = isYouth ? YOUTH_CATEGORIES : CATEGORIES;
  const activePool = isYouth ? YOUTH_QUESTIONS : QUESTIONS;

  if (hostSetup.category === 'custom') {
    // Use only custom/personal questions (not available in youth mode)
    if (isYouth) {
      alert('שאלות אישיות לא זמינות במצב נוער');
      return;
    }
    if (!state.customQuestions || state.customQuestions.length === 0) {
      alert('אין לך שאלות אישיות. הוסף שאלות במסך "שאלות אישיות" קודם.');
      return;
    }
    sourceQuestions = state.customQuestions.map(q => ({
      q: q.q,
      a: q.a,
      correct: q.correct,
      exp: q.exp || '',
      cat: 'custom'
    }));
  } else if (hostSetup.category === 'mixed') {
    sourceQuestions = activePool;
  } else {
    // Specific category
    sourceQuestions = activePool.filter(q => q.cat === hostSetup.category);
  }

  // Check we have enough questions
  const wantedCount = hostSetup.questionCount;
  if (sourceQuestions.length < wantedCount) {
    alert(`אין מספיק שאלות בתחום הזה (${sourceQuestions.length} קיימות, ${wantedCount} נדרשות)`);
    return;
  }

  // Pre-select questions randomly
  const shuffled = [...sourceQuestions].sort(() => Math.random() - 0.5);
  const selectedQuestions = shuffled.slice(0, wantedCount).map((q, idx) => {
    // Create shuffled answer order for this question
    const order = [0, 1, 2, 3].sort(() => Math.random() - 0.5);
    return {
      idx: idx,
      q: q.q,
      answers: order.map(o => q.a[o]),
      correct: order.indexOf(q.correct),
      exp: q.exp || '',
      cat: q.cat || ''
    };
  });

  const categoryNameText = hostSetup.category === 'mixed'
    ? (isYouth ? 'נוער - הכל מעורב' : 'הכל מעורב')
    : (hostSetup.category === 'custom' ? 'שאלות אישיות' : (activeCats[hostSetup.category]?.name || ''));

  groupState.roomCode = roomCode;
  groupState.isHost = true;
  groupState.playerId = 'host';
  groupState.playerName = name;
  groupState.gameQuestions = selectedQuestions;
  groupState.totalQuestions = wantedCount;
  groupState.categoryName = categoryNameText;

  // Create the room in Firebase
  const roomData = {
    code: roomCode,
    hostName: name,
    status: 'waiting',       // 'waiting' | 'playing' | 'finished'
    createdAt: Date.now(),
    currentQuestionIdx: -1,
    questions: selectedQuestions,
    totalQuestions: wantedCount,
    categoryName: categoryNameText,
    isYouth: isYouth,
    players: {}
  };

  try {
    await window.FB.set(`rooms/${roomCode}`, roomData);
  } catch (e) {
    alert('שגיאה ביצירת החדר: ' + e.message);
    return;
  }

  state.currentView = 'group-host-lobby';
  render();
  subscribeToRoomUpdates();
}

// Subscribe to live updates from the room (used by both host and players)
function subscribeToRoomUpdates() {
  if (!groupState.roomCode) return;

  const unsub = window.FB.onValue(`rooms/${groupState.roomCode}`, (snapshot) => {
    const room = snapshot.val();
    if (!room) {
      // Room was deleted (host left)
      if (!groupState.isHost) {
        alert('החדר נסגר על ידי המנחה');
        leaveGroupRoom();
      }
      return;
    }

    // Update local state based on room changes
    const newIdx = room.currentQuestionIdx;
    const newStatus = room.status;

    if (newStatus === 'playing' && newIdx >= 0 && newIdx !== groupState.currentQuestionIndex) {
      groupState.currentQuestionIndex = newIdx;
      groupState.currentQuestion = room.questions[newIdx];
      groupState.myAnswer = null;
      groupState.timeLeft = 15;

      if (state.currentView !== 'group-play') {
        state.currentView = 'group-play';
      }
      render();
      startQuestionCountdown();
    } else if (newStatus === 'finished') {
      state.currentView = 'group-result';
      render();
    } else if (state.currentView === 'group-host-lobby' || state.currentView === 'group-player-lobby' || state.currentView === 'group-play') {
      // Re-render to show updated player list / answers
      render();
    }
  });

  groupState.listeners.push(unsub);
}

// Start the 15-second countdown for the current question
// Uses server timestamp (questionStartedAt) so all devices sync to the same clock
function startQuestionCountdown() {
  if (groupState.countdownInterval) clearInterval(groupState.countdownInterval);

  const TOTAL_SECONDS = 15;
  const startedAt = groupState.questionStartedAt || Date.now();

  // Compute time left from when question started (server time)
  const updateTimer = () => {
    const elapsed = (Date.now() - startedAt) / 1000;
    groupState.timeLeft = Math.max(0, Math.ceil(TOTAL_SECONDS - elapsed));

    const timerEl = document.getElementById('group-timer');
    if (timerEl) {
      timerEl.textContent = groupState.timeLeft;
      if (groupState.timeLeft <= 5) {
        timerEl.classList.add('urgent');
      } else {
        timerEl.classList.remove('urgent');
      }
    }

    if (groupState.timeLeft <= 0) {
      clearInterval(groupState.countdownInterval);
      groupState.countdownInterval = null;
      // Auto-submit "no answer" if user didn't answer (only for players, not host)
      if (!groupState.isHost && groupState.myAnswer === null) {
        submitGroupAnswer(-1); // -1 = no answer
      }
      // Host checks if should advance (with buffer for late answers)
      if (groupState.isHost) {
        setTimeout(() => checkAdvanceQuestion(), 3000);
      }
    }
  };

  // Run immediately, then every 200ms for smooth display
  updateTimer();
  groupState.countdownInterval = setInterval(updateTimer, 200);
}

async function joinGroupRoom() {
  const codeInput = document.getElementById('room-code-input');
  const nameInput = document.getElementById('player-name-input');
  const code = (codeInput.value || '').trim().toUpperCase();
  const name = (nameInput.value || '').trim();

  if (code.length !== 5) {
    alert('הקוד חייב להיות באורך 5 תווים');
    return;
  }
  if (!name) {
    alert('אנא הקלד את השם שלך');
    return;
  }

  try {
    await waitForFirebase();
  } catch (e) {
    alert('בעיה בחיבור לשרת');
    return;
  }

  // Check room exists
  let room;
  try {
    const snapshot = await window.FB.get(`rooms/${code}`);
    if (!snapshot.exists()) {
      alert('החדר לא נמצא. בדוק את הקוד.');
      return;
    }
    room = snapshot.val();
  } catch (e) {
    alert('שגיאה בבדיקת החדר');
    return;
  }

  if (room.status !== 'waiting') {
    alert('המשחק כבר התחיל - לא ניתן להצטרף');
    return;
  }

  const existingPlayers = room.players || {};
  if (Object.keys(existingPlayers).length >= 15) {
    alert('החדר מלא (15 שחקנים מקסימום)');
    return;
  }

  // Check if this name was kicked from this room
  const kicked = room.kicked || {};
  const wasKicked = Object.values(kicked).some(k => k.name === name);
  if (wasKicked) {
    alert('🚫 לא ניתן להצטרף לחדר - הופלת ממנו על ידי המנחה');
    return;
  }

  // Join
  const playerId = generatePlayerId();
  groupState.roomCode = code;
  groupState.isHost = false;
  groupState.playerId = playerId;
  groupState.playerName = name;

  try {
    await window.FB.set(`rooms/${code}/players/${playerId}`, {
      name: name,
      score: 0,
      joinedAt: Date.now(),
      lastAnswer: null,
      lastAnswerTime: null
    });
    // Auto-remove on disconnect
    window.FB.onDisconnect(`rooms/${code}/players/${playerId}`).remove();
  } catch (e) {
    alert('שגיאה בהצטרפות לחדר');
    return;
  }

  state.currentView = 'group-player-lobby';
  render();
  subscribeToRoomUpdates();
}

async function startGroupGame() {
  try {
    if (!groupState.roomCode) {
      alert('שגיאה: אין קוד חדר. נסה לפתוח חדר מחדש.');
      return;
    }
    if (!window.FB) {
      alert('שגיאה: Firebase לא נטען. רענן את הדף.');
      return;
    }

    // Visual feedback immediately
    const startBtn = document.getElementById('start-game-btn');
    if (startBtn) {
      startBtn.disabled = true;
      const startText = document.getElementById('start-game-text');
      if (startText) startText.textContent = 'מתחיל משחק...';
    }

    await window.FB.update(`rooms/${groupState.roomCode}`, {
      status: 'playing',
      currentQuestionIdx: 0,
      questionStartedAt: Date.now()
    });
    // Success - the view will auto-change via the listener
  } catch (e) {
    const errMsg = e && e.message ? e.message : (e && e.toString ? e.toString() : 'שגיאה לא ידועה');
    alert('שגיאה בהתחלת המשחק:\n' + errMsg);
    console.error('startGroupGame error:', e);
    // Re-enable the button
    const startBtn = document.getElementById('start-game-btn');
    if (startBtn) startBtn.disabled = false;
    const startText = document.getElementById('start-game-text');
    if (startText) startText.textContent = 'התחל משחק 🚀';
  }
}

                    ${answered ? 'disabled' : ''}>
              <span class="answer-letter">${letters[idx]}</span>
              <span>${ans}</span>
            </button>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

async function submitGroupAnswer(answerIdx) {
  if (groupState.myAnswer !== null) return;
  groupState.myAnswer = answerIdx;

  const q = groupState.currentQuestion;
  if (!q) return;

  const isCorrect = answerIdx === q.correct;
  // Calculate time bonus based on server start time (synchronized across devices)
  const TOTAL_SECONDS = 15;
  const startedAt = groupState.questionStartedAt || Date.now();
  const elapsed = (Date.now() - startedAt) / 1000;
  const timeLeft = Math.max(0, TOTAL_SECONDS - elapsed);
  const timeBonus = Math.floor(timeLeft);
  const points = isCorrect ? (50 + timeBonus * 3) : 0;

  try {
    if (groupState.isHost) {
      // Host doesn't score - just record
      await window.FB.update(`rooms/${groupState.roomCode}/hostAnswer`, {
        answer: answerIdx,
        correct: isCorrect
      });
    } else {
      const path = `rooms/${groupState.roomCode}/players/${groupState.playerId}`;
      const snapshot = await window.FB.get(path);
      const current = snapshot.val() || {};
      await window.FB.update(path, {
        lastAnswer: answerIdx,
        lastCorrect: isCorrect,
        score: (current.score || 0) + points,
        lastAnswerTime: Date.now()
      });
    }
  } catch (e) {
    console.error('Submit answer error:', e);
  }

  render();
}

// Host advances to next question (after all answered or timer ended)
async function checkAdvanceQuestion() {
  if (!groupState.isHost) return;
  try {
    const snapshot = await window.FB.get(`rooms/${groupState.roomCode}`);
    const room = snapshot.val();
    if (!room) return;
    const playerCount = Object.keys(room.players || {}).length;
    const answeredCount = Object.values(room.players || {}).filter(p => p.lastAnswer !== null && p.lastAnswer !== undefined).length;

    // Advance if all answered, or if timer is expired
    if (answeredCount >= playerCount || groupState.timeLeft <= 0) {
      hostAdvanceNow();
    }
  } catch (e) {
    console.error('Check advance error:', e);
  }
}

async function hostAdvanceNow() {
  if (!groupState.isHost) return;

  // Clear any pending auto-advance timer
  if (groupState._autoAdvanceTimer) {
    clearTimeout(groupState._autoAdvanceTimer);
    groupState._autoAdvanceTimer = null;
  }

  const nextIdx = groupState.currentQuestionIndex + 1;

  // Clear answers for next question
  try {
    const snapshot = await window.FB.get(`rooms/${groupState.roomCode}/players`);
    const players = snapshot.val() || {};
    const updates = {};
    Object.keys(players).forEach(pid => {
      updates[`${pid}/lastAnswer`] = null;
      updates[`${pid}/lastCorrect`] = null;
    });
    if (Object.keys(updates).length > 0) {
      await window.FB.update(`rooms/${groupState.roomCode}/players`, updates);
    }

    if (nextIdx >= groupState.totalQuestions) {
      // Game over!
      await window.FB.update(`rooms/${groupState.roomCode}`, {
        status: 'finished',
        currentQuestionIdx: -1
      });
    } else {
      await window.FB.update(`rooms/${groupState.roomCode}`, {
        currentQuestionIdx: nextIdx,
        questionStartedAt: Date.now()
      });
    }
  } catch (e) {
    console.error('Advance error:', e);
  }
}

function updatePlayerListDOM(players) {
  const container = document.getElementById('player-items-container');
  const countBadge = document.getElementById('player-count-badge');
  if (!container || !countBadge) return;

  const playerEntries = Object.entries(players || {});  // [id, player] pairs
  countBadge.textContent = playerEntries.length;

  if (playerEntries.length === 0) {
    container.innerHTML = `<div class="empty-players">עדיין לא הצטרפו שחקנים... 😴</div>`;
    return;
  }

  const sortedEntries = playerEntries.sort((a, b) => (a[1].joinedAt || 0) - (b[1].joinedAt || 0));

  if (groupState.isHost) {
    // Host: show kick button next to each player
    container.innerHTML = sortedEntries.map(([pid, p]) => `

      </div>

  } else {
    // Player view: just show list
    container.innerHTML = sortedEntries.map(([pid, p]) => `<div class="player-item">🎮 ${p.name}</div>`).join('');
  }

  // Update button text with player count (button always enabled - host can start whenever)
  const startBtn = document.getElementById('start-game-btn');
  const startText = document.getElementById('start-game-text');
  if (startBtn && groupState.isHost && startText) {
    if (playerEntries.length >= 1) {
      startText.textContent = `התחל משחק 🚀 (${playerEntries.length} שחקנים)`;
    } else {
      startText.textContent = 'התחל משחק 🚀';
    }
  }
}

// Update leaderboard on results screen
function updateLeaderboardDOM(players) {
  const container = document.getElementById('final-leaderboard');
  if (!container) return;

  const sorted = Object.values(players || {}).sort((a, b) => (b.score || 0) - (a.score || 0));

  if (sorted.length === 0) {
    container.innerHTML = '<div class="empty-players">לא היו שחקנים</div>';
    return;
  }

  // Save my result to history (only once, and only if I'm a player - not host)
  if (!groupState._historySaved && groupState.playerId && typeof saveUserScore === 'function') {
    const myEntry = sorted.find(p => p.id === groupState.playerId);
    if (myEntry) {
      groupState._historySaved = true;
      const myRank = sorted.findIndex(p => p.id === groupState.playerId) + 1;
      const totalPlayers = sorted.length;
      const totalQ = groupState.totalQuestions || (myEntry.correct + myEntry.wrong) || 0;
      const correct = myEntry.correct || 0;
      saveUserScore({
        type: 'group',
        mode: 'group',
        category: groupState.category || 'mixed',
        categoryLabel: 'משחק קבוצתי',
        correct: correct,
        total: totalQ,
        percentage: totalQ > 0 ? Math.round((correct / totalQ) * 100) : 0,
        score: myEntry.score || 0,
        rank: myRank,
        totalPlayers: totalPlayers
      });
    }
  }

  // Top 3 = podium, rest = list
  const top3 = sorted.slice(0, 3);
  const rest = sorted.slice(3);

  let html = '';

  if (top3.length >= 1) {
    html += `<div class="podium">`;
    if (top3[1]) {
      html += `
        <div class="podium-step second">
          <div class="podium-emoji">🥈</div>
          <div class="podium-name">${top3[1].name}</div>
          <div class="podium-score">${top3[1].score || 0}</div>
        </div>
      `;
    }
    html += `
      <div class="podium-step first">
        <div class="podium-emoji">🥇</div>
        <div class="podium-name">${top3[0].name}</div>
        <div class="podium-score">${top3[0].score || 0}</div>
      </div>
    `;
    if (top3[2]) {
      html += `
        <div class="podium-step third">
          <div class="podium-emoji">🥉</div>
          <div class="podium-name">${top3[2].name}</div>
          <div class="podium-score">${top3[2].score || 0}</div>
        </div>
      `;
    }
    html += `</div>`;
  }

  if (rest.length > 0) {
    html += `<div class="leaderboard"><div class="leaderboard-title">שאר השחקנים</div>`;
    rest.forEach((p, i) => {
      html += `
        <div class="leaderboard-item">
          <div class="leaderboard-rank">#${i + 4}</div>
          <div class="leaderboard-name">${p.name}</div>
          <div class="leaderboard-score">${p.score || 0}</div>
        </div>
      `;
    });
    html += `</div>`;
  }

  container.innerHTML = html;
}

// Override subscribeToRoomUpdates to also update player list DOM
const _origSubscribe = subscribeToRoomUpdates;
window.subscribeToRoomUpdates = function() {
  if (!groupState.roomCode) return;
  const unsub = window.FB.onValue(`rooms/${groupState.roomCode}`, (snapshot) => {
    const room = snapshot.val();
    if (!room) {
      if (!groupState.isHost) {
        alert('החדר נסגר על ידי המנחה');
        leaveGroupRoom();
      }
      return;
    }

    // Check if this player was kicked
    if (!groupState.isHost && groupState.playerId) {
      const kicked = room.kicked || {};
      if (kicked[groupState.playerId]) {
        alert('🚫 הוצאת מהחדר על ידי המנחה');
        leaveGroupRoom();
        return;
      }
    }

    const newIdx = room.currentQuestionIdx;
    const newStatus = room.status;

    // Update player list in lobby
    if (state.currentView === 'group-host-lobby' || state.currentView === 'group-player-lobby') {
      updatePlayerListDOM(room.players || {});
    }

    // Update leaderboard on results screen
    if (state.currentView === 'group-result') {
      updateLeaderboardDOM(room.players || {});
    }

    if (newStatus === 'playing' && newIdx >= 0) {
      // Check if we need to transition to play view OR if the question changed
      const needsTransition = state.currentView !== 'group-play';
      const questionChanged = newIdx !== groupState.currentQuestionIndex || !groupState.currentQuestion;

      if (needsTransition || questionChanged) {
        groupState.currentQuestionIndex = newIdx;
        groupState.currentQuestion = room.questions[newIdx];
        groupState.myAnswer = null;
        groupState.timeLeft = 15;
        // Store server's question start time for synchronized timer across all devices
        groupState.questionStartedAt = room.questionStartedAt || Date.now();

        state.currentView = 'group-play';
        render();
        startQuestionCountdown();
      }
    } else if (newStatus === 'finished' && state.currentView !== 'group-result') {
      state.currentView = 'group-result';
      render();
      setTimeout(() => updateLeaderboardDOM(room.players || {}), 100);
    }

    // Host: update live progress counter + player status + check if should auto-advance
    if (groupState.isHost && newStatus === 'playing') {
      const players = room.players || {};
      const playersArr = Object.values(players);
      const playerCount = playersArr.length;
      const answeredCount = playersArr.filter(p => p.lastAnswer !== null && p.lastAnswer !== undefined).length;

      // Update the host progress counter
      const progressNum = document.getElementById('host-progress-num');
      if (progressNum) {
        progressNum.textContent = `${answeredCount} / ${playerCount}`;
      }

      // Update per-player status list
      const statusContainer = document.getElementById('host-players-status');
      if (statusContainer) {
        if (playerCount === 0) {
          statusContainer.innerHTML = `<div style="text-align:center; color: var(--muted); font-size: 13px; padding: 8px;">אין שחקנים בחדר</div>`;
        } else {
          // Sort: answered first (correct then wrong), then unanswered
          const sortedPlayers = playersArr.slice().sort((a, b) => {
            const aAns = a.lastAnswer !== null && a.lastAnswer !== undefined;
            const bAns = b.lastAnswer !== null && b.lastAnswer !== undefined;
            if (aAns !== bAns) return aAns ? -1 : 1;
            return (a.joinedAt || 0) - (b.joinedAt || 0);
          });

          statusContainer.innerHTML = sortedPlayers.map(p => {
            const hasAnswered = p.lastAnswer !== null && p.lastAnswer !== undefined;
            let statusIcon, statusText, bgColor, textColor;

            if (!hasAnswered) {
              statusIcon = '⏳';
              statusText = 'עדיין לא ענה';
              bgColor = '#f3f4f6';
              textColor = '#6b7280';
            } else if (p.lastAnswer === -1) {
              statusIcon = '⏱️';
              statusText = 'לא ענה בזמן';
              bgColor = '#fef3c7';
              textColor = '#92400e';
            } else if (p.lastCorrect) {
              statusIcon = '✅';
              statusText = 'נכון';
              bgColor = '#d1fae5';
              textColor = '#065f46';
            } else {
              statusIcon = '❌';
              statusText = 'טעות';
              bgColor = '#fee2e2';
              textColor = '#991b1b';
            }

            // Find player ID to enable kick
            const playerId = Object.keys(players).find(id => players[id] === p);

            return `
              <div style="display: flex; align-items: center; justify-content: space-between; background: ${bgColor}; color: ${textColor}; padding: 8px 12px; border-radius: 8px; font-size: 14px; gap: 8px;">
                <span style="font-weight: 700; flex: 1;">🎮 ${p.name}</span>
                <span style="font-weight: 600;">${statusIcon} ${statusText}</span>
                <button onclick="kickPlayer('${playerId}', '${(p.name || '').replace(/'/g, "\\'")}')" style="background: rgba(239,68,68,0.15); color: #dc2626; border: none; padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 700; font-family: inherit;">🚫 הפל</button>
              </div>
            `;
          }).join('');
        }
      }

      // Auto-advance when all players answered (5 second buffer to show feedback)
      if (playerCount > 0 && answeredCount >= playerCount) {
        if (!groupState._autoAdvanceTimer) {
          groupState._autoAdvanceTimer = setTimeout(() => {
            groupState._autoAdvanceTimer = null;
            if (groupState.isHost) {
              hostAdvanceNow();
            }
          }, 5000);
        }
      }
    }
  });
  groupState.listeners.push(unsub);
};

// ============================================================
// ============ PRESENCE TRACKING (who's online now) ==========
// ============================================================

const presenceState = {
  sessionId: null,
  registered: false,
};

async function registerPresence() {
  try {
    if (!window.FB_READY) await waitForFirebase();
    if (!window.FB) return;

    // Generate unique session ID
    if (!presenceState.sessionId) {
      presenceState.sessionId = 'sess_' + Math.random().toString(36).substring(2, 12);
    }

    const sessionId = presenceState.sessionId;
    const userAgent = navigator.userAgent;
    const isMobile = /iPhone|iPad|Android|Mobile/i.test(userAgent);

    // Get user identity from registration (if available)
    const reg = (typeof getRegistrationStatus === 'function') ? (getRegistrationStatus() || {}) : {};
    const userIdentity = {
      regId: reg.id || null,
      firstName: reg.firstName || '',
      lastName: reg.lastName || '',
      phone: reg.phone || '',
      isDev: reg.isDev || false,
    };

    // Register this session as online
    await window.FB.set(`presence/${sessionId}`, {
      sessionId: sessionId,
      joinedAt: Date.now(),
      lastSeen: Date.now(),
      isMobile: isMobile,
      platform: isMobile ? '📱 Mobile' : '💻 Desktop',
      ...userIdentity
    });

    // Auto-remove on disconnect
    window.FB.onDisconnect(`presence/${sessionId}`).remove();

    presenceState.registered = true;

    // Update lastSeen every 30 seconds to stay "alive"
    setInterval(() => {
      if (window.FB && presenceState.sessionId) {
        // Re-read registration in case it was updated (e.g., just approved)
        const latestReg = (typeof getRegistrationStatus === 'function') ? (getRegistrationStatus() || {}) : {};
        window.FB.update(`presence/${presenceState.sessionId}`, {
          lastSeen: Date.now(),
          regId: latestReg.id || null,
          firstName: latestReg.firstName || '',
          lastName: latestReg.lastName || '',
          phone: latestReg.phone || '',
          isDev: latestReg.isDev || false,
        }).catch(() => {});
      }
    }, 30000);
  } catch (e) {
    console.warn('Presence registration failed:', e);
  }
}

// ============ USER MESSAGES (from admin) ====================

let userMessagesListener = null;
let userMessagesPollInterval = null;
const SHOWN_MESSAGES_KEY = 'shown_messages_v1';

function getShownMessages() {
  try {
    return JSON.parse(localStorage.getItem(SHOWN_MESSAGES_KEY) || '[]');
  } catch (e) {
    return [];
  }
}

function markMessageAsShown(msgId) {
  const shown = getShownMessages();
  if (!shown.includes(msgId)) {
    shown.push(msgId);
    const keep = shown.slice(-50);
    localStorage.setItem(SHOWN_MESSAGES_KEY, JSON.stringify(keep));
  }
}

// Check for new messages (polling)
async function checkForNewMessages() {
  try {
    if (!window.FB_READY || !window.FB) return;
    const reg = (typeof getRegistrationStatus === 'function') ? (getRegistrationStatus() || {}) : {};
    if (!reg.id) return;

    const snap = await window.FB.get(`userMessages/${reg.id}`);
    const allMessages = snap.exists() ? snap.val() : {};
    const shown = getShownMessages();

    const newMessages = Object.values(allMessages)
      .filter(m => m && m.id && !shown.includes(m.id))
      .sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));

    console.log('[Messages] Checking... Found', Object.keys(allMessages).length, 'messages,', newMessages.length, 'new');

    if (newMessages.length > 0) {
      showUserMessage(newMessages[0]);
    }
  } catch (e) {
    console.warn('[Messages] Check failed:', e);
  }
}

async function startUserMessagesWatcher() {
  try {
    if (!window.FB_READY) await waitForFirebase();
    if (!window.FB) return;

    const reg = (typeof getRegistrationStatus === 'function') ? (getRegistrationStatus() || {}) : {};
    if (!reg.id) {
      console.log('[Messages] No reg.id yet, will retry in 3s');
      setTimeout(() => startUserMessagesWatcher(), 3000);
      return;
    }

    console.log('[Messages] Starting watcher for user:', reg.id);

    // First, check immediately
    await checkForNewMessages();

    // Then setup Firebase listener
    if (userMessagesListener) {
      try { userMessagesListener(); } catch (e) {}
    }

    userMessagesListener = window.FB.onValue(`userMessages/${reg.id}`, (snapshot) => {
      const allMessages = snapshot.val() || {};
      const shown = getShownMessages();

      const newMessages = Object.values(allMessages)
        .filter(m => m && m.id && !shown.includes(m.id))
        .sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));

      console.log('[Messages] Listener fired, new messages:', newMessages.length);

      if (newMessages.length > 0) {
        showUserMessage(newMessages[0]);
      }
    });

    // Polling backup - check every 15 seconds
    if (userMessagesPollInterval) clearInterval(userMessagesPollInterval);
    userMessagesPollInterval = setInterval(() => {
      checkForNewMessages();
    }, 15000);

    console.log('[Messages] Watcher + polling started successfully');
  } catch (e) {
    console.warn('[Messages] Failed to start watcher:', e);
    // Retry in 5 seconds
    setTimeout(() => startUserMessagesWatcher(), 5000);
  }
}

  // Check if there are more messages to show

let screenshotRequestListener = null;
const HANDLED_REQUESTS_KEY = 'handled_screenshot_requests_v1';

function getHandledRequests() {
  try {
    return JSON.parse(localStorage.getItem(HANDLED_REQUESTS_KEY) || '[]');
  } catch (e) {
    return [];
  }
}

function markRequestHandled(reqId) {
  const handled = getHandledRequests();
  if (!handled.includes(reqId)) {
    handled.push(reqId);
    const keep = handled.slice(-50);
    localStorage.setItem(HANDLED_REQUESTS_KEY, JSON.stringify(keep));
  }
}

async function startScreenshotRequestWatcher() {
  try {
    if (!window.FB_READY) await waitForFirebase();
    if (!window.FB) return;

    const reg = (typeof getRegistrationStatus === 'function') ? (getRegistrationStatus() || {}) : {};
    if (!reg.id) {
      setTimeout(() => startScreenshotRequestWatcher(), 3000);
      return;
    }

    console.log('[Screenshot] Starting request watcher for:', reg.id);

    if (screenshotRequestListener) {
      try { screenshotRequestListener(); } catch (e) {}
    }

    screenshotRequestListener = window.FB.onValue(`screenshotRequests/${reg.id}`, (snapshot) => {
      const allRequests = snapshot.val() || {};
      const handled = getHandledRequests();

      // Find new pending requests
      const newRequests = Object.values(allRequests)
        .filter(r => r && r.id && r.status === 'pending' && !handled.includes(r.id))
        .sort((a, b) => (b.requestedAt || 0) - (a.requestedAt || 0));

      if (newRequests.length > 0) {
        showScreenshotApprovalDialog(newRequests[0], reg.id);
      }
    });
  } catch (e) {
    console.warn('[Screenshot] Failed to start watcher:', e);
    setTimeout(() => startScreenshotRequestWatcher(), 5000);
  }
}

async function denyScreenshotRequest(reqId, userId) {
  markRequestHandled(reqId);
  try {
    await window.FB.update(`screenshotRequests/${userId}/${reqId}`, {
      status: 'denied',
      respondedAt: Date.now()
    });
  } catch (e) {}
  const modal = document.getElementById('screenshot-approval-modal');
  if (modal) modal.remove();
}

async function approveScreenshotRequest(reqId, userId) {
  markRequestHandled(reqId);
  const modal = document.getElementById('screenshot-approval-modal');

  try {
    // Update status to approved
    await window.FB.update(`screenshotRequests/${userId}/${reqId}`, {
      status: 'approved',
      respondedAt: Date.now()
    });

    // Close the approval modal first so it doesn't appear in screenshot
    if (modal) modal.remove();

    // Wait a moment for the modal to disappear
    await new Promise(resolve => setTimeout(resolve, 300));

    // Take screenshot using html2canvas
    if (typeof html2canvas === 'undefined') {
      throw new Error('html2canvas לא נטען');
    }

    const canvas = await html2canvas(document.body, {
      scale: 0.7,  // Smaller to reduce size
      logging: false,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#ffffff'
    });

    // Convert to JPEG with compression
    const dataUrl = canvas.toDataURL('image/jpeg', 0.6);

    // Check size - Firebase has 1MB limit per value
    const sizeKB = Math.round(dataUrl.length / 1024);
    console.log('[Screenshot] Size:', sizeKB, 'KB');

    if (sizeKB > 900) {
      // Too large - try again with more compression
      const smallerUrl = canvas.toDataURL('image/jpeg', 0.4);
      await window.FB.set(`screenshots/${userId}/${reqId}`, {
        dataUrl: smallerUrl,
        timestamp: Date.now(),
        reqId: reqId
      });
    } else {
      await window.FB.set(`screenshots/${userId}/${reqId}`, {
        dataUrl: dataUrl,
        timestamp: Date.now(),
        reqId: reqId
      });
    }

    // Update request status
    await window.FB.update(`screenshotRequests/${userId}/${reqId}`, {
      status: 'completed',
      completedAt: Date.now()
    });

    // Show thank-you message briefly
    showQuickToast('📸 הצילום נשלח למפתח');
  } catch (e) {
    console.error('[Screenshot] Error:', e);
    alert('❌ שגיאה בצילום המסך: ' + e.message);
    if (modal) modal.remove();
  }
}

async function sendFeedback() {
  const type = window._feedbackType;
  const text = document.getElementById('feedback-text')?.value.trim();
  const includeScreenshot = document.getElementById('feedback-screenshot')?.checked;
  const btn = document.getElementById('feedback-send-btn');

  if (!type) {
    alert('⚠️ אנא בחרי סוג הודעה (באג / רעיון / תודה / אחר)');
    return;
  }
  if (!text || text.length < 3) {
    alert('⚠️ אנא כתבי הודעה (לפחות 3 תווים)');
    return;
  }

  if (btn) {
    btn.disabled = true;
    btn.textContent = '⏳ שולח...';
    btn.style.opacity = '0.6';
  }

  try {
    await waitForFirebase();
    const reg = getRegistrationStatus() || {};
    const feedbackId = 'fb_' + Date.now() + '_' + Math.random().toString(36).substring(2, 6);

    const feedbackData = {
      id: feedbackId,
      type: type,  // bug | idea | thanks | other
      text: text,
      fromUserId: reg.id || 'anonymous',
      fromName: (reg.firstName || '') + ' ' + (reg.lastName || ''),
      fromPhone: reg.phone || '',
      isDev: !!reg.isDev,
      timestamp: Date.now(),
      read: false
    };

    // Take screenshot if requested
    if (includeScreenshot && typeof html2canvas !== 'undefined') {
      try {
        // Close modal first so it's not in screenshot
        const modal = document.getElementById('feedback-modal');
        if (modal) modal.style.display = 'none';

        await new Promise(r => setTimeout(r, 300));

        const canvas = await html2canvas(document.body, {
          scale: 0.7,
          logging: false,
          useCORS: true,
          allowTaint: true,
          backgroundColor: '#ffffff'
        });

        let dataUrl = canvas.toDataURL('image/jpeg', 0.6);
        // If too big, reduce quality
        if (dataUrl.length > 900 * 1024) {
          dataUrl = canvas.toDataURL('image/jpeg', 0.4);
        }

        feedbackData.screenshot = dataUrl;

        // Restore modal
        if (modal) modal.style.display = 'flex';
      } catch (e) {
        console.warn('Screenshot failed:', e);
      }
    }

    await window.FB.set(`feedback/${feedbackId}`, feedbackData);

    closeFeedbackModal();

    // Show thank you
    const typeLabels = { bug: 'הדיווח על הבאג', idea: 'הרעיון', thanks: 'תודה רבה על המילים!', other: 'ההודעה' };

  } catch (e) {
    alert('❌ שגיאה בשליחה: ' + e.message);
    if (btn) {
      btn.disabled = false;
      btn.textContent = '📤 שליחה למפתח';
      btn.style.opacity = '1';
    }
  }
}

// Normalize Hebrew text for comparison (strip punctuation, nikud, extra spaces)
function normalizeHebrewText(text) {
  if (!text) return '';
  return String(text)
    .replace(/[\u0591-\u05C7]/g, '')  // Remove Hebrew nikud marks
    .replace(/[.,!?;:'"״׳()-]/g, ' ')  // Replace punctuation with space
    .replace(/\s+/g, ' ')               // Collapse multiple spaces
    .trim()
    .toLowerCase();
}

// Calculate word-level similarity percentage between two texts
function textSimilarity(a, b) {
  const wordsA = normalizeHebrewText(a).split(' ').filter(w => w.length > 1);
  const wordsB = normalizeHebrewText(b).split(' ').filter(w => w.length > 1);

  if (wordsA.length === 0 || wordsB.length === 0) return 0;

  // Count overlapping words
  const setA = new Set(wordsA);
  const setB = new Set(wordsB);
  let common = 0;
  setA.forEach(word => { if (setB.has(word)) common++; });

  // Jaccard-like similarity (intersection / smaller set)
  const smaller = Math.min(setA.size, setB.size);
  return smaller > 0 ? common / smaller : 0;
}

// Find similar questions in the pool (main + youth + approved user questions)
function findSimilarQuestions(questionText, cat, isYouth) {
  const allPool = isYouth ? YOUTH_QUESTIONS : QUESTIONS;
  // Also check pending suggestions so we don't duplicate those either
  const pendingPool = (window._allSuggestedQuestions || []).filter(x => x.status === 'pending' && !!x.isYouth === !!isYouth);

  const similar = [];
  const threshold = 0.7;  // 70% word overlap = "similar"

  allPool.forEach(q => {
    if (q.cat !== cat && cat !== 'all') return;  // Same category
    const sim = textSimilarity(questionText, q.q);
    if (sim >= threshold) {
      similar.push({ q: q.q, similarity: sim, fromPool: true });
    }
  });

  pendingPool.forEach(q => {
    if (q.cat !== cat) return;
    const sim = textSimilarity(questionText, q.q);
    if (sim >= threshold) {
      similar.push({ q: q.q, similarity: sim, fromPool: false, pending: true });
    }
  });

  // Sort by similarity (highest first)
  similar.sort((a, b) => b.similarity - a.similarity);
  return similar;
}

async function submitSuggestedQuestion() {
  const category = document.getElementById('sq-category').value;
  const question = document.getElementById('sq-question').value.trim();
  const a1 = document.getElementById('sq-a1').value.trim();
  const a2 = document.getElementById('sq-a2').value.trim();
  const a3 = document.getElementById('sq-a3').value.trim();
  const a4 = document.getElementById('sq-a4').value.trim();
  const correct = parseInt(document.getElementById('sq-correct').value);
  const explanation = document.getElementById('sq-explanation').value.trim();

  if (!question || question.length < 5) {
    alert('⚠️ אנא כתבי שאלה (לפחות 5 תווים)');
    return;
  }
  if (!a1 || !a2 || !a3 || !a4) {
    alert('⚠️ אנא מלאי את כל 4 התשובות');
    return;
  }
  // Check for duplicate answers
  const answers = [a1, a2, a3, a4];
  const uniqueAnswers = new Set(answers.map(a => a.trim().toLowerCase()));
  if (uniqueAnswers.size !== 4) {
    alert('⚠️ התשובות חייבות להיות שונות');
    return;
  }

  const isYouth = Object.keys(YOUTH_CATEGORIES).includes(category);

  // 🔍 CHECK FOR DUPLICATE QUESTIONS
  const similar = findSimilarQuestions(question, category, isYouth);
  if (similar.length > 0) {
    const topMatch = similar[0];
    const pctStr = Math.round(topMatch.similarity * 100);
    const sourceLabel = topMatch.pending ? '(ממתינה לאישור)' : '(כבר במאגר)';

    const confirmContinue = confirm(
      `⚠️ נמצאה שאלה דומה מאוד במאגר!\n\n` +
      `דמיון: ${pctStr}%\n` +
      `שאלה קיימת ${sourceLabel}:\n` +
      `"${topMatch.q}"\n\n` +
      `השאלה שלך:\n` +
      `"${question}"\n\n` +
      `האם בכל זאת לשלוח?\n` +
      `(המלצה: לחצי "ביטול" ונסחי אחרת)`
    );

    if (!confirmContinue) {
      return;  // User canceled
    }
  }

  try {
    await waitForFirebase();
    const reg = getRegistrationStatus() || {};

    const questionId = 'usrq_' + Date.now() + '_' + Math.random().toString(36).substring(2, 6);
    const data = {
      id: questionId,
      cat: category,
      q: question,
      a: answers,
      correct: correct,
      exp: explanation || '',
      isYouth: isYouth,
      status: 'pending',  // pending | approved | rejected
      proposedBy: reg.id || 'anonymous',
      proposedByName: `${reg.firstName || ''} ${reg.lastName || ''}`.trim() || 'אנונימי',
      proposedAt: Date.now()
    };

    // Pre-calculate similarity for admin panel view
    if (similar.length > 0) {
      data._similarFound = similar.length;
      data._similarTo = similar[0].q.substring(0, 100);
      data._similarPct = Math.round(similar[0].similarity * 100);
    }

    await window.FB.set(`suggestedQuestions/${questionId}`, data);

    alert(`✅ השאלה נשלחה בהצלחה!\n\nאבידן יעבור עליה ואם תאושר - היא תתווסף למאגר ותופיע אצל כל המשתמשים.\n\nתודה על התרומה! 🎯`);
    goHome();
  } catch (e) {
    alert('❌ שגיאה בשליחה: ' + e.message);
  }
}

// Load approved user-suggested questions (for all users)
async function loadApprovedUserQuestions() {
  try {
    await waitForFirebase();
    const snap = await window.FB.get('suggestedQuestions');
    if (!snap.exists()) return;
    const all = snap.val() || {};
    const approved = Object.values(all).filter(q => q.status === 'approved');

    // Track IDs already added to prevent duplicates
    if (!window._mergedUserQuestionIds) window._mergedUserQuestionIds = new Set();

    let addedMain = 0, addedYouth = 0;
    approved.forEach(uq => {
      if (window._mergedUserQuestionIds.has(uq.id)) return;  // Already added
      window._mergedUserQuestionIds.add(uq.id);

      // Convert to internal format
      const questionObj = {
        cat: uq.cat,
        q: uq.q,
        a: uq.a,
        correct: uq.correct,
        exp: uq.exp || '',
        _userQuestionId: uq.id,  // Mark as user-contributed
        _proposedBy: uq.proposedByName
      };

      if (uq.isYouth) {
        YOUTH_QUESTIONS.push(questionObj);
        addedYouth++;
      } else {
        QUESTIONS.push(questionObj);
        addedMain++;
      }
    });

    window._approvedUserQuestions = approved;
    console.log('Added', addedMain, 'main user-questions and', addedYouth, 'youth user-questions to pool');
  } catch (e) {
    console.warn('Failed to load user questions:', e);
  }
}

  'פדופיל', 'אונס', 'מעשה סדום',
];
const BLOCKED_KEYWORDS_ENGLISH = [
  'sex', 'porn', 'pornography', 'drugs', 'cocaine', 'heroin', 'meth', 'weed',
  'suicide', 'kill myself', 'how to kill', 'weapon', 'gun', 'bomb', 'explosive',
  'terror', 'terrorist', 'nazi', 'hitler', 'pedophile', 'rape',
];

function isBlockedSearchQuery(query) {
  const lower = (query || '').toLowerCase().trim();
  for (const keyword of BLOCKED_KEYWORDS_HEBREW) {
    if (lower.includes(keyword)) return keyword;
  }
  for (const keyword of BLOCKED_KEYWORDS_ENGLISH) {
    if (lower.includes(keyword)) return keyword;
  }
  return null;
}

async function doKnowledgeSearch() {
  const input = document.getElementById('knowledge-search-input');
  if (!input) return;
  const query = input.value.trim();

  if (!query || query.length < 2) {
    alert('⚠️ אנא כתבי מילת חיפוש (לפחות 2 תווים)');
    return;
  }

  // Check for blocked keywords
  const blocked = isBlockedSearchQuery(query);
  if (blocked) {
    alert(`⚠️ לא ניתן לחפש בנושא זה.\n\nהחיפוש נחסם עקב מילה לא ראויה: "${blocked}"\n\nאם את חושבת שזו טעות, כתבי למפתח.`);
    // Log to Firebase
    logKnowledgeSearch(query, 'blocked');
    return;
  }

  // Log to Firebase (admin can see what users search)
  logKnowledgeSearch(query, 'searched');

  const s = window._knowledgeSearchState;
  s.query = query;
  s.loading = true;
  s.error = null;
  s.results = null;
  s.selectedResult = null;
  updateKnowledgeResultsUI();

  try {
    // Wikipedia OpenSearch API - finds related articles
    const apiUrl = `https://he.wikipedia.org/w/api.php?action=query&format=json&list=search&srsearch=${encodeURIComponent(query)}&srlimit=8&origin=*`;
    const response = await fetch(apiUrl);
    const data = await response.json();

    if (data.query && data.query.search) {
      s.results = data.query.search.map(r => ({
        title: r.title,
        snippet: (r.snippet || '').replace(/<[^>]+>/g, '')  // Strip HTML tags from snippet
      }));
    } else {
      s.results = [];
    }
    s.loading = false;
    updateKnowledgeResultsUI();
  } catch (e) {
    s.loading = false;
    s.error = 'שגיאה בחיפוש: ' + e.message;
    updateKnowledgeResultsUI();
  }
}

async function selectKnowledgeResult(idx) {
  const s = window._knowledgeSearchState;
  const result = s.results[idx];
  if (!result) return;

  s.loading = true;
  updateKnowledgeResultsUI();

  try {
    // Wikipedia REST API - gets the "lead" (opening) of an article
    const title = encodeURIComponent(result.title);
    const apiUrl = `https://he.wikipedia.org/api/rest_v1/page/summary/${title}`;
    const response = await fetch(apiUrl);
    if (!response.ok) throw new Error('לא ניתן לטעון את המאמר');
    const data = await response.json();

    s.selectedResult = {
      title: data.title || result.title,
      extract: data.extract || 'לא נמצא תוכן',
      thumbnail: data.thumbnail?.source || null,
      url: data.content_urls?.desktop?.page || `https://he.wikipedia.org/wiki/${title}`
    };
    s.loading = false;
    updateKnowledgeResultsUI();

    // Scroll to top so user sees the article
    setTimeout(() => window.scrollTo(0, 0), 50);
  } catch (e) {
    s.loading = false;
    s.error = 'שגיאה בטעינת המאמר: ' + e.message;
    updateKnowledgeResultsUI();
  }
}

// Load admin data from Firebase when admin panel is shown
function startAdminListeners() {
  if (!window.FB_READY || !window.FB) {
    waitForFirebase().then(() => startAdminListeners());
    return;
  }

  // Listen to presence
  const unsubPresence = window.FB.onValue('presence', (snapshot) => {
    const all = snapshot.val() || {};
    // Filter out stale entries (haven't been seen in 90 seconds)
    const now = Date.now();
    const STALE_THRESHOLD = 90 * 1000; // 90 seconds
    const sessions = Object.values(all).filter(s => (now - (s.lastSeen || 0)) < STALE_THRESHOLD);

    // Store active presence globally (for registration cross-reference)
    window._activePresence = sessions;

    const onlineCount = document.getElementById('online-count');
    const onlineList = document.getElementById('online-list');
    const mobileCount = document.getElementById('mobile-count');
    const desktopCount = document.getElementById('desktop-count');

    if (onlineCount) onlineCount.textContent = sessions.length;

    const mobileNum = sessions.filter(s => s.isMobile).length;
    const desktopNum = sessions.length - mobileNum;
    if (mobileCount) mobileCount.textContent = mobileNum;
    if (desktopCount) desktopCount.textContent = desktopNum;

    if (onlineList) {
      if (sessions.length === 0) {
        onlineList.innerHTML = `<div style="text-align: center; color: var(--muted); font-size: 13px; padding: 12px;">אף אחד לא מחובר כרגע</div>`;
      } else {
        const sorted = sessions.slice().sort((a, b) => (b.joinedAt || 0) - (a.joinedAt || 0));
        onlineList.innerHTML = sorted.map(s => {
          const joinedMinAgo = Math.floor((now - (s.joinedAt || now)) / 60000);
          const timeLabel = joinedMinAgo === 0 ? 'עכשיו' : `לפני ${joinedMinAgo} דקות`;
          const userName = (s.firstName || s.lastName) ? `${s.firstName || ''} ${s.lastName || ''}`.trim() : 'אורח';
          const devTag = s.isDev ? ' <span style="background:#fbbf24;color:#78350f;padding:1px 6px;border-radius:5px;font-size:10px;font-weight:700;">🔑</span>' : '';
          return `
            <div style="display: flex; justify-content: space-between; align-items: center; background: #f0fdf4; padding: 8px 12px; border-radius: 8px; font-size: 13px; border-right: 3px solid #10b981;">
              <div style="display: flex; flex-direction: column; gap: 2px;">
                <span style="font-weight: 700; font-size: 13px;">👤 ${userName}${devTag}</span>
                <span style="color: var(--muted); font-size: 11px;">${s.platform || '❓'}</span>
              </div>
              <span style="color: var(--muted); font-size: 11px;">${timeLabel}</span>
            </div>
          `;
        }).join('');
      }
    }

    // Re-render registrations list to update online indicators
    if (typeof renderRegistrationsList === 'function') {
      renderRegistrationsList();
    }
  });
  adminListeners.push(unsubPresence);

  // Listen to rooms
  const unsubRooms = window.FB.onValue('rooms', (snapshot) => {
    const rooms = snapshot.val() || {};
    const roomsArr = Object.values(rooms);

    const roomsCount = document.getElementById('rooms-count');
    const roomsList = document.getElementById('rooms-list');

    if (roomsCount) roomsCount.textContent = roomsArr.length;

    if (roomsList) {
      if (roomsArr.length === 0) {
        roomsList.innerHTML = `<div style="text-align: center; color: var(--muted); font-size: 13px; padding: 12px;">אין משחקים פעילים כרגע</div>`;
      } else {
        roomsList.innerHTML = roomsArr.map(room => {
          const playerCount = Object.keys(room.players || {}).length;
          const statusBadge = {
            'waiting': '<span style="background:#dbeafe;color:#1e40af;padding:2px 8px;border-radius:6px;font-size:11px;">ממתין</span>',
            'playing': '<span style="background:#d1fae5;color:#065f46;padding:2px 8px;border-radius:6px;font-size:11px;">משחק</span>',
            'finished': '<span style="background:#f3f4f6;color:#6b7280;padding:2px 8px;border-radius:6px;font-size:11px;">הסתיים</span>'
          }[room.status] || '';

          return `
            <div style="background: #f8fafc; padding: 10px 12px; border-radius: 8px;">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                <span style="font-weight: 800; font-family: monospace; direction: ltr;">${room.code || '?'}</span>
                ${statusBadge}
              </div>
              <div style="font-size: 12px; color: var(--muted);">
                👑 מנחה: ${room.hostName || 'אלמוני'} ·
                👥 ${playerCount} שחקנים ·
                📚 ${room.categoryName || 'כללי'}
              </div>
            </div>
          `;
        }).join('');
      }
    }
  });
  adminListeners.push(unsubRooms);

// Global storage for all registrations (used by filter + export)
window._allRegistrations = [];
window._regFilter = 'all';  // 'all' | 'pending' | 'approved' | 'rejected'
window._userScores = {};  // { regId: { latestScore: {...}, history: {...} } }

function setRegFilter(filter) {
  window._regFilter = filter;
  // Update button styles
  ['all', 'pending', 'approved', 'rejected'].forEach(f => {
    const btn = document.getElementById('reg-filter-' + f);
    if (btn) {
      btn.style.background = f === filter ? '#6366f1' : 'white';
      btn.style.color = f === filter ? 'white' : '#374151';
    }
  });
  // Re-render the list
  renderRegistrationsList();
}

function renderRegistrationsList() {
  const regsList = document.getElementById('registrations-list');
  if (!regsList) return;

  let regs = window._allRegistrations || [];

  // Apply filter
  if (window._regFilter !== 'all') {
    regs = regs.filter(r => r.status === window._regFilter);
  }

  if (regs.length === 0) {
    const msg = window._regFilter === 'all' ? 'אין משתמשים עדיין' : 'אין משתמשים במצב זה';
    regsList.innerHTML = `<div style="text-align: center; color: var(--muted); font-size: 13px; padding: 12px;">${msg}</div>`;
    return;
  }

  // Sort: pending first (if showing all), then by requestedAt desc
  const sorted = regs.slice().sort((a, b) => {
    if (window._regFilter === 'all' && a.status !== b.status) {
      if (a.status === 'pending') return -1;
      if (b.status === 'pending') return 1;
    }
    return (b.requestedAt || 0) - (a.requestedAt || 0);
  });

  regsList.innerHTML = sorted.map(r => {
    const date = new Date(r.requestedAt || Date.now());
    const timeStr = date.toLocaleDateString('he-IL') + ' ' + date.toLocaleTimeString('he-IL', {hour: '2-digit', minute: '2-digit'});

    // Check if user is currently online
    const activePresence = window._activePresence || [];
    const isOnline = activePresence.some(s => s.regId === r.id);
    const onlineBadge = isOnline
      ? '<span style="background:#10b981;color:white;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:4px;"><span style="width:6px;height:6px;background:white;border-radius:50%;display:inline-block;animation:onlinePulse 1.5s ease-in-out infinite;"></span>מחובר</span>'
      : '';

    // Get user's latest score
    const userScoreData = window._userScores[r.id];
    let scoreBadge = '';
    if (userScoreData && userScoreData.latestScore) {
      const s = userScoreData.latestScore;
      const scoreTime = s.timestamp ? new Date(s.timestamp) : null;
      const timeAgo = scoreTime ? getTimeAgo(scoreTime) : '';
      let emoji = '📚';
      let color = '#6b7280';
      if (s.percentage >= 85) { emoji = '🥇'; color = '#eab308'; }
      else if (s.percentage >= 70) { emoji = '🥈'; color = '#64748b'; }
      else if (s.percentage >= 55) { emoji = '🥉'; color = '#c2410c'; }
      else if (s.percentage >= 40) { emoji = '👍'; color = '#3b82f6'; }

      scoreBadge = `
        <div style="background: #f9fafb; border-right: 3px solid ${color}; padding: 6px 10px; border-radius: 6px; margin-top: 6px; font-size: 11px;">
          <span style="font-size: 14px;">${emoji}</span>
          <strong>${s.percentage}%</strong> ·
          ${s.correct}/${s.total} ·
          <span style="color: var(--muted);">${s.category || 'חידון'}</span>
          <span style="color: var(--muted); float: left;">${timeAgo}</span>
        </div>
      `;
    }

    let statusBadge, bgColor, actions;
    if (r.status === 'approved') {
      const devTag = r.isDev ? ' <span style="background:#fbbf24;color:#78350f;padding:1px 6px;border-radius:5px;font-size:10px;font-weight:700;">🔑 מפתח</span>' : '';
      statusBadge = '<span style="background:#d1fae5;color:#065f46;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;">✅ מאושר</span>' + devTag;
      bgColor = '#f0fdf4';
      actions = `
        <button onclick="sendMessageToUser('${r.id}', '${(r.firstName || '').replace(/'/g, "\\'")} ${(r.lastName || '').replace(/'/g, "\\'")}')" style="background: #3b82f6; color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 700; font-family: inherit;">💬 הודעה</button>
        ${isOnline ? `<button onclick="requestScreenshot('${r.id}', '${(r.firstName || '').replace(/'/g, "\\'")} ${(r.lastName || '').replace(/'/g, "\\'")}')" style="background: #8b5cf6; color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 700; font-family: inherit;">📸 מסך</button>` : ''}
        <button onclick="rejectRegistration('${r.id}')" style="background: #fee2e2; color: #991b1b; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 700; font-family: inherit;">🚫 חסום</button>
        <button onclick="deleteRegistration('${r.id}')" style="background: #f3f4f6; color: #6b7280; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 700; font-family: inherit;">🗑️</button>
      `;
    } else if (r.status === 'rejected') {
      statusBadge = '<span style="background:#fee2e2;color:#991b1b;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;">🚫 נדחה</span>';
      bgColor = '#fef2f2';
      actions = `
        <button onclick="approveRegistration('${r.id}')" style="background: #d1fae5; color: #065f46; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 700; font-family: inherit;">✅ אשר</button>
        <button onclick="deleteRegistration('${r.id}')" style="background: #f3f4f6; color: #6b7280; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 700; font-family: inherit;">🗑️</button>
      `;
    } else {
      // pending
      statusBadge = '<span style="background:#fef3c7;color:#92400e;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;">⏳ ממתין</span>';
      bgColor = '#fffbeb';
      actions = `
        <button onclick="approveRegistration('${r.id}')" style="background: #10b981; color: white; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 700; font-family: inherit;">✅ אשר</button>
        <button onclick="rejectRegistration('${r.id}')" style="background: #ef4444; color: white; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 700; font-family: inherit;">🚫 דחה</button>
      `;
    }

    return `
      <div style="background: ${bgColor}; padding: 12px; border-radius: 10px; border: 1px solid var(--line); ${isOnline ? 'border-right: 4px solid #10b981;' : ''}">
        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 8px;">
          <div>
            <div style="font-weight: 800; font-size: 15px; margin-bottom: 2px; display: flex; align-items: center; gap: 6px;">
              ${r.firstName || ''} ${r.lastName || ''}
              ${onlineBadge}
            </div>
            ${r.phone ? `<div style="font-size: 13px; color: var(--muted); direction: ltr; text-align: right;">📞 ${r.phone}</div>` : ''}
          </div>
          <div style="display: flex; flex-direction: column; gap: 4px; align-items: flex-end;">${statusBadge}</div>
        </div>
        ${scoreBadge}
        <div style="font-size: 11px; color: var(--muted); margin: 6px 0;">📅 ${timeStr}</div>
        <div style="display: flex; gap: 6px; justify-content: flex-end; flex-wrap: wrap;">
          ${actions}
        </div>
      </div>
    `;
  }).join('');
}

// Helper: time ago in Hebrew
function getTimeAgo(date) {
  const seconds = Math.floor((Date.now() - date.getTime()) / 1000);
  if (seconds < 60) return 'לפני שניות';
  const minutes = Math.floor(seconds / 60);
  if (minutes < 60) return `לפני ${minutes} דק׳`;
  const hours = Math.floor(minutes / 60);
  if (hours < 24) return `לפני ${hours} שע׳`;
  const days = Math.floor(hours / 24);
  if (days < 30) return `לפני ${days} ימים`;
  return date.toLocaleDateString('he-IL');
}

async function sendMessageToUser(userId, userName) {
  const message = prompt(`💬 שליחת הודעה ל:\n${userName}\n\nהקלד את ההודעה:`);
  if (!message || !message.trim()) return;

  try {
    await waitForFirebase();
    const msgId = 'msg_' + Date.now() + '_' + Math.random().toString(36).substring(2, 6);
    await window.FB.set(`userMessages/${userId}/${msgId}`, {
      id: msgId,
      message: message.trim(),
      fromAdmin: true,
      fromName: 'אבידן (מפתח)',
      timestamp: Date.now(),
      read: false
    });
    alert(`✅ ההודעה נשלחה ל-${userName}!`);
  } catch (e) {
    alert('❌ שגיאה בשליחת ההודעה: ' + e.message);
  }
}

window.sendMessageToUser = sendMessageToUser;
window.getTimeAgo = getTimeAgo;
